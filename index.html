<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --grid-color: rgba(255, 255, 255, 0.03);
            --card-bg: rgba(255, 255, 255, 0.06); 
            --card-border: rgba(255, 255, 255, 0.1);
            --hotbar-bg: rgba(0, 0, 0, 0.95);
            --pill-color: rgba(255, 255, 255, 0.1);
            --font-premium: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: var(--font-mono);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Фиксируем всё тело */
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР (Viewport) */
        .app-viewport {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .screen {
            display: none;
            padding: 20px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 30px; }
        .logo-box { 
            background: #fff; border-radius: 22px; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px;
        }
        .logo-box img { width: 55px; height: auto; }
        h1 { font-size: 10px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

        /* КНОПКИ ГЛАВНОЙ */
        .btn-main {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 22px; padding: 28px; font-family: var(--font-premium);
            font-weight: 700; font-size: 17px; text-align: center;
            text-transform: uppercase; color: #fff; margin-bottom: 15px; cursor: pointer;
        }

        /* СЛАЙДЕР ФОТО (CAROUSEL) */
        .slider-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .photo-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border-radius: 25px;
            background: #1a1a1c;
            border: 1px solid var(--card-border);
            -ms-overflow-style: none; /* hide scrollbar */
            scrollbar-width: none;
        }
        .photo-slider::-webkit-scrollbar { display: none; }

        .slide {
            flex: 0 0 100%;
            height: 280px;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .dots {
            display: flex; justify-content: center; gap: 8px; margin-top: 12px;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.3); }

        /* КАРТОЧКА КАТАЛОГА */
        .product-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 25px; margin-bottom: 20px; overflow: hidden;
        }
        .preview-img { width: 100%; height: 180px; object-fit: cover; background: #1a1a1c; }
        .product-info { padding: 18px; }

        /* ТЕСТЫ */
        .test-line {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 14px;
            border-radius: 14px; margin-bottom: 10px; font-size: 12px;
        }
        .bar-bg { width: 60px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .bar-fill { height: 100%; background: #fff; border-radius: 2px; }

        /* HOT BAR */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: var(--hotbar-bg); backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(255,255,255,0.1); display: flex;
            justify-content: space-around; z-index: 10000;
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: rgba(255,255,255,0.4); }
        .tab-item.active { color: #fff; }
        .pill { position: absolute; width: 60px; height: 35px; background: var(--pill-color); border-radius: 20px; top: 15px; z-index: -1; opacity: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-item.active .pill { opacity: 1; }
        .tab-icon { width: 22px; height: 22px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--icon); margin-bottom: 25px; }
        .tab-label { position: absolute; bottom: 15px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .back-btn { font-size: 11px; opacity: 0.4; padding: 10px 0; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .buy-btn { background: #fff; color: #000; border: none; padding: 22px; border-radius: 20px; font-family: var(--font-premium); font-weight: 700; width: 100%; margin-top: 20px; font-size: 16px; }

        .cart-item { background: var(--card-bg); padding: 18px; border-radius: 22px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="app-viewport" id="scroll-root">
    
    <div id="shop" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>
        <div class="btn-main" onclick="openCatalog('gpu')">Видеокарты</div>
        <div class="btn-main" onclick="openCatalog('cpu')">Процессоры</div>
    </div>

    <div id="catalog" class="screen">
        <div class="back-btn" onclick="showScreen('shop')">← НАЗАД</div>
        <div class="header" style="margin: 10px 0;"><h1 id="cat-title">КАТАЛОГ</h1></div>
        <div id="catalog-list"></div>
    </div>

    <div id="details" class="screen">
        <div class="back-btn" onclick="showScreen('catalog')">← К СПИСКУ</div>
        <div id="details-content"></div>
    </div>

    <div id="cart" class="screen">
        <div class="header"><h1>STORAGE // CART</h1></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; opacity:0.2; margin-top:50px;">[ ПУСТО ]</div>
    </div>

</div>

<div class="tab-bar">
    <div class="tab-item active" onclick="switchTab(this, 'shop')">
        <div class="pill"></div>
        <div class="tab-icon" style="--icon: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="tab-label">Шоп</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'cart')">
        <div class="pill"></div>
        <div class="tab-icon" style="--icon: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="tab-label">Корзина</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // БАЗА ДАННЫХ С МАССИВОМ ФОТО
    const data = {
        'gpu': [
            { 
                id: 1, name: 'RX 580 4GB', price: 5800, 
                imgs: ['photo_2026-04-01_13-15-04.jpg', 'https://via.placeholder.com/400x280/1a1a1c/ffffff?text=BACK+PLATE', 'https://via.placeholder.com/400x280/1a1a1c/ffffff?text=PORTS'],
                desc: 'Бюджетный топ для 1080p.', 
                full: 'Проверенная временем видеокарта. Тихая работа и отличный потенциал для разгона.', 
                tests: [{n:'CS2', v:'120 FPS', p:80}, {n:'Dota 2', v:'140 FPS', p:90}] 
            },
            { 
                id: 2, name: 'RTX 3060 12GB', price: 23000, 
                imgs: ['https://via.placeholder.com/400x280/1a1a1c/ffffff?text=RTX+3060+Front'], 
                desc: 'RTX + DLSS за свои деньги.', 
                full: 'Мощный чип и 12 ГБ видеопамяти — хватит на долго.', 
                tests: [{n:'Cyberpunk', v:'60 FPS', p:85}, {n:'RDR 2', v:'75 FPS', p:80}] 
            }
        ],
        'cpu': [
            { 
                id: 3, name: 'Ryzen 5 5600X', price: 13500, 
                imgs: ['photo_2026-04-01_13-21-49.jpg', 'https://via.placeholder.com/400x280/1a1a1c/ffffff?text=BOX+PACK'],
                desc: 'Король гейминга на AM4.', 
                full: '6 ядер, 12 потоков. Идеальный баланс для любой современной сборки.', 
                tests: [{n:'Cinebench', v:'11500', p:85}, {n:'Gaming', v:'Elite', p:95}] 
            }
        ]
    };

    let cart = [];

    function showScreen(id) {
        // КЛЮЧЕВОЙ МОМЕНТ: Сбрасываем скролл контейнера
        const root = document.getElementById('scroll-root');
        root.scrollTo(0, 0); 
        
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });

        const target = document.getElementById(id);
        target.style.display = 'block';
        setTimeout(() => target.classList.add('active'), 20);

        if(id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function switchTab(el, id) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        showScreen(id);
    }

    function openCatalog(cat) {
        const list = document.getElementById('catalog-list');
        document.getElementById('cat-title').innerText = cat.toUpperCase() + ' // КАТАЛОГ';
        list.innerHTML = '';
        data[cat].forEach(p => {
            list.innerHTML += `
                <div class="product-card" onclick="openDetails('${cat}', ${p.id})">
                    <img src="${p.imgs[0]}" class="preview-img">
                    <div class="product-info">
                        <div style="font-family:var(--font-premium); font-size:18px; margin-bottom:5px;">${p.name}</div>
                        <div style="font-size:12px; opacity:0.5; margin-bottom:15px;">${p.desc}</div>
                        <div style="font-family:var(--font-premium); font-size:17px;">${p.price.toLocaleString()} ₽</div>
                    </div>
                </div>
            `;
        });
        showScreen('catalog');
    }

    function openDetails(cat, id) {
        const p = data[cat].find(x => x.id === id);
        const cont = document.getElementById('details-content');
        
        // Рендерим слайды
        let slidesHtml = p.imgs.map(src => `<div class="slide"><img src="${src}"></div>`).join('');
        let dotsHtml = p.imgs.map((_, i) => `<div class="dot ${i===0?'active':''}" id="dot-${i}"></div>`).join('');
        
        let tHtml = p.tests.map(t => `
            <div class="test-line">
                <span>${t.n}</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <b>${t.v}</b>
                    <div class="bar-bg"><div class="bar-fill" style="width:${t.p}%"></div></div>
                </div>
            </div>
        `).join('');

        cont.innerHTML = `
            <div class="slider-wrapper">
                <div class="photo-slider" id="product-slider" onscroll="updateDots(this)">
                    ${slidesHtml}
                </div>
                <div class="dots">${dotsHtml}</div>
            </div>
            
            <h2 style="font-family:var(--font-premium); font-size:26px; margin-bottom:12px;">${p.name}</h2>
            <p style="font-size:14px; color:rgba(255,255,255,0.6); line-height:1.7; margin-bottom:25px;">${p.full}</p>
            <div style="font-size:10px; opacity:0.3; margin-bottom:15px; letter-spacing:2px;">TECHNICAL BENCHMARKS</div>
            ${tHtml}
            <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">В КОРЗИНУ — ${p.price.toLocaleString()} ₽</button>
        `;
        showScreen('details');
    }

    // Обновление точек слайдера
    function updateDots(el) {
        const scrollIndex = Math.round(el.scrollLeft / el.offsetWidth);
        document.querySelectorAll('.dot').forEach((d, i) => {
            d.classList.toggle('active', i === scrollIndex);
        });
    }

    function addToCart(name, price) {
        cart.push({name, price, uid: Date.now()});
        tg.HapticFeedback.notificationOccurred('success');
        tg.MainButton.setText(`ОФОРМИТЬ: ${cart.length} ТОВ.`).show();
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const empty = document.getElementById('cart-empty');
        list.innerHTML = '';
        if(cart.length === 0) { empty.style.display = 'block'; tg.MainButton.hide(); return; }
        empty.style.display = 'none';
        cart.forEach(i => {
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-family:var(--font-premium); font-size:15px; margin-bottom:4px;">${i.name}</div>
                        <div style="font-size:13px; opacity:0.5;">${i.price.toLocaleString()} ₽</div>
                    </div>
                    <div style="color:#ff453a; font-size:11px; font-weight:700; padding:10px;" onclick="removeItem(${i.uid})">УДАЛИТЬ</div>
                </div>
            `;
        });
    }

    function removeItem(uid) {
        cart = cart.filter(x => x.uid !== uid);
        renderCart();
        if(cart.length > 0) tg.MainButton.setText(`ОФОРМИТЬ: ${cart.length}`);
    }
</script>

</body>
</html>
