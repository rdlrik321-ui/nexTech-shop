<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --grid: rgba(255, 255, 255, 0.03);
            --card: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
            --hotbar-bg: rgba(0, 0, 0, 0.96);
            --pill-color: rgba(255, 255, 255, 0.1);
            --font-main: 'Inter', sans-serif;
            --font-code: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: var(--font-code);
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР СКРОЛЛА */
        #app-viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; overflow-x: hidden; padding-bottom: 110px;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; padding: 20px; width: 100%; opacity: 0; transform: translateY(10px); transition: opacity 0.4s ease, transform 0.4s ease; }
        .screen.active { display: block; opacity: 1; transform: translateY(0); }

        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 30px; }
        .logo-box { 
            background: #fff; border-radius: 22px; width: 85px; height: 85px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px;
        }
        .logo-box img { width: 50px; }

        /* UI ELEMENTS */
        .btn-main {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 22px; padding: 28px; font-family: var(--font-main);
            font-weight: 700; font-size: 17px; text-align: center;
            text-transform: uppercase; color: #fff; margin-bottom: 15px; cursor: pointer;
        }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 25px; margin-bottom: 20px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        .preview-img { width: 100%; height: 180px; object-fit: cover; }
        
        /* ТЕСТЫ FPS С ПОЛОСКОЙ */
        .test-line { 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 14px;
            border-radius: 12px; margin-bottom: 8px; font-size: 12px;
        }
        .bar-bg { width: 60px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .bar-fill { height: 100%; background: #fff; border-radius: 2px; }

        /* SLIDER */
        .slider-wrap { position: relative; width: 100%; margin-bottom: 20px; border-radius: 25px; overflow: hidden; border: 1px solid var(--border); }
        .photo-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; background: #1a1a1c; }
        .photo-slider::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; height: 280px; scroll-snap-align: center; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 8px; margin-top: -25px; position: relative; padding-bottom: 15px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.3); }

        /* HOT BAR */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: var(--hotbar-bg); backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; z-index: 1000;
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: rgba(255,255,255,0.4); }
        .tab-item.active { color: #fff; }
        .pill { position: absolute; width: 60px; height: 35px; background: var(--pill-color); border-radius: 18px; top: 15px; opacity: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-item.active .pill { opacity: 1; }
        .tab-icon { width: 22px; height: 22px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 25px; }
        .tab-label { position: absolute; bottom: 15px; font-size: 9px; font-weight: 700; text-transform: uppercase; }

        /* КНОПКИ */
        .action-btn { background: #fff; color: #000; border: none; padding: 22px; border-radius: 20px; font-family: var(--font-main); font-weight: 700; width: 100%; font-size: 16px; margin-top: 15px; cursor: pointer; transition: background 0.2s; }
        .action-btn:active { background: #e0e0e0; }
        .back-btn { font-size: 11px; opacity: 0.4; padding: 15px 0; cursor: pointer; text-transform: uppercase; display: inline-block; }

        .cart-item { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        /* АНИМАЦИЯ ПОЛЕТА (ПЛАВНАЯ) */
        .fly-item {
            position: fixed; z-index: 9999; pointer-events: none;
            width: 60px; height: 60px; border-radius: 15px;
            background-size: cover; background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            /* Удлинили время и сделали кривую Безье плавнее */
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
    </style>
</head>
<body>

<div id="app-viewport">
    
    <div id="shop" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <div style="font-size: 10px; letter-spacing: 5px; opacity: 0.4;">NEXTECH // TERMINAL</div>
        </div>
        <div class="btn-main" onclick="openCat('gpu')">Видеокарты</div>
        <div class="btn-main" onclick="openCat('cpu')">Процессоры</div>
    </div>

    <div id="catalog" class="screen">
        <div class="back-btn" onclick="showScreen('shop')">← НАЗАД</div>
        <h1 id="cat-title" style="margin-bottom:20px;">КАТАЛОГ</h1>
        <div id="cat-list"></div>
    </div>

    <div id="details" class="screen">
        <div class="back-btn" onclick="showScreen('catalog')">← К СПИСКУ</div>
        <div id="details-content"></div>
    </div>

    <div id="cart" class="screen">
        <div class="header"><h1>STORAGE // CART</h1></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; opacity:0.2; margin-top:50px;">ПУСТО</div>
    </div>

    <div id="profile" class="screen">
        <div class="header"><h1>USER // PROFILE</h1></div>
        <div class="btn-main" style="padding:20px; font-size:14px; text-align:left;">Мои заказы <span style="float:right; opacity:0.3;">0</span></div>
        <div class="btn-main" style="padding:20px; font-size:14px; opacity:0.5;">Поддержка</div>
    </div>
</div>

<div class="tab-bar">
    <div id="tab-home" class="tab-item active" onclick="switchTab(this, 'shop')">
        <div class="pill"></div>
        <div class="tab-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="tab-label">Шоп</span>
    </div>
    <div id="tab-cart" class="tab-item" onclick="switchTab(this, 'cart')">
        <div class="pill"></div>
        <div class="tab-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="tab-label">Корзина</span>
    </div>
    <div id="tab-profile" class="tab-item" onclick="switchTab(this, 'profile')">
        <div class="pill"></div>
        <div class="tab-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="tab-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const data = {
        'gpu': [
            { id: 1, name: 'RX 580 4GB', price: 5800, 
              imgs: ['photo_2026-04-01_13-15-04.jpg', 'https://via.placeholder.com/600x400/1a1a1c/ffffff?text=COOLING', 'https://via.placeholder.com/600x400/1a1a1c/ffffff?text=PORTS'],
              full: 'Легендарная карта. Заменена термопаста, тихая.',
              fps: [{n:'Cyberpunk', v:'35 FPS', p:30}, {n:'CS2 (High)', v:'110 FPS', p:80}]
            },
            { id: 2, name: 'RTX 3060 12GB', price: 23500, 
              imgs: ['https://via.placeholder.com/600x400/1a1a1c/ffffff?text=RTX+3060'], 
              full: 'RTX & DLSS. Состояние новой.',
              fps: [{n:'Cyberpunk (RT On)', v:'60 FPS', p:90}, {n:'RDR 2', v:'75 FPS', p:85}]
            }
        ],
        'cpu': [
            { id: 3, name: 'Ryzen 5 5600X', price: 13200, 
              imgs: ['photo_2026-04-01_13-21-49.jpg', 'https://via.placeholder.com/600x400/1a1a1c/ffffff?text=AMD+SOCKET'],
              full: 'BOX версия. Идеален для AM4.',
              fps: [{n:'Cinebench R23', v:'11500 pts', p:85}, {n:'Игровая нагрузка', v:'Elite', p:95}]
            }
        ]
    };

    let cart = [];

    function showScreen(id) {
        // Жесткий сброс скролла контейнера
        document.getElementById('app-viewport').scrollTo(0, 0); 

        document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
        const target = document.getElementById(id);
        target.style.display = 'block';
        setTimeout(() => target.classList.add('active'), 20);
        if(id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function switchTab(el, id) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        showScreen(id);
    }

    function openCat(cat) {
        const list = document.getElementById('cat-list');
        document.getElementById('cat-title').innerText = cat.toUpperCase() + ' // TERMINAL';
        list.innerHTML = '';
        data[cat].forEach(p => {
            list.innerHTML += `
                <div class="product-card" onclick="openItem('${cat}', ${p.id})">
                    <img src="${p.imgs[0]}" class="preview-img">
                    <div style="padding:18px;">
                        <div style="font-family:var(--font-main); font-size:17px; margin-bottom:5px;">${p.name}</div>
                        <div style="font-family:var(--font-main); font-size:16px;">${p.price.toLocaleString()} ₽</div>
                    </div>
                </div>`;
        });
        showScreen('catalog');
    }

    function openItem(cat, id) {
        const p = data[cat].find(x => x.id === id);
        const cont = document.getElementById('details-content');
        let slides = p.imgs.map(img => `<div class="slide"><img src="${img}"></div>`).join('');
        let dots = p.imgs.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
        
        cont.innerHTML = `
            <div class="slider-wrapper">
                <div class="photo-slider" onscroll="updateSliderDots(this)">${slides}</div>
                <div class="dots">${dots}</div>
            </div>
            <h2 style="font-family:var(--font-main); font-size:26px;">${p.name}</h2>
            <p style="opacity:0.5; margin:15px 0 25px; line-height:1.6; font-size:14px;">${p.full}</p>
            <div style="font-size:10px; opacity:0.3; margin-bottom:12px; letter-spacing:2px;">ИГРОВЫЕ ТЕСТЫ</div>
            ${p.fps.map(f => `
                <div class="test-line">
                    <span>${f.n}</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <b>${f.v}</b>
                        <div class="bar-bg"><div class="bar-fill" style="width:${f.p}%"></div></div>
                    </div>
                </div>
            `).join('')}
            <button class="action-btn" id="buy-btn" onclick="animateAndAddToCart('${p.imgs[0]}', '${p.name}', ${p.price})">В КОРЗИНУ — ${p.price.toLocaleString()} ₽</button>`;
        showScreen('details');
    }

    function updateSliderDots(el) {
        const i = Math.round(el.scrollLeft / el.offsetWidth);
        el.parentElement.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
    }

    // АНИМАЦИЯ ПОЛЕТА (ПЛАВНАЯ)
    function animateAndAddToCart(imgSrc, name, price) {
        const btn = document.getElementById('buy-btn');
        const cartTab = document.getElementById('tab-cart');
        const rect = btn.getBoundingClientRect();
        const cartRect = cartTab.getBoundingClientRect();

        // Создаем клон для полета
        const flyer = document.createElement('div');
        flyer.className = 'fly-item';
        flyer.style.backgroundImage = `url(${imgSrc})`;
        // Центрируем клон над кнопкой
        flyer.style.left = rect.left + (rect.width/2) - 30 + 'px';
        flyer.style.top = rect.top + 'px';
        document.body.appendChild(flyer);

        // Запускаем полет по дуге (setTimeout для CSS)
        setTimeout(() => {
            // Центрируем клон в иконке корзины
            flyer.style.left = cartRect.left + (cartRect.width/2) - 30 + 'px';
            flyer.style.top = cartRect.top + 'px';
            // Добавляем вращение и уменьшение
            flyer.style.transform = 'scale(0.3) rotate(720deg)';
            flyer.style.opacity = '0';
        }, 100); // Даем время CSS применить начальную позицию

        // Завершение анимации
        setTimeout(() => {
            flyer.remove();
            cart.push({name, price, uid: Date.now()});
            tg.HapticFeedback.notificationOccurred('success');
            // Если MainButton активна, обновляем ее
            if(shoppingCart.length > 0) tg.MainButton.setText(`ОФОРМИТЬ (${cart.length})`);
        }, 1300); // 1.2с анимации + 0.1с задержка
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        if(cart.length === 0) { document.getElementById('cart-empty').style.display = 'block'; return; }
        document.getElementById('cart-empty').style.display = 'none';
        
        let total = 0;
        cart.forEach(i => {
            total += i.price;
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-family:var(--font-main); font-size:15px; margin-bottom:4px;">${i.name}</div>
                        <div style="font-size:13px; opacity:0.5;">${i.price.toLocaleString()} ₽</div>
                    </div>
                    <div onclick="removeItem(${i.uid})" style="color:#ff3b30; font-size:11px; font-weight:700; padding:10px;">УДАЛИТЬ</div>
                </div>`;
        });
        list.innerHTML += `<div style="text-align:right; margin:20px; font-size:18px;">ИТОГО: <b>${total.toLocaleString()} ₽</b></div><button class="action-btn" style="background:#34c759; color:#fff;" onclick="alert('Оплата временно недоступна')">ОФОРМИТЬ ЗАКАЗ</button>`;
    }

    function removeItem(uid) {
        cart = cart.filter(i => i.uid !== uid);
        renderCart();
    }
</script>

</body>
</html>
