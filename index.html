<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d0f; --line: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; 
        }
        .app-container { width: 100%; max-width: 400px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .logo-box { background: #fff; border-radius: 20px; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; margin: 40px 0 20px 0; }
        .logo-box img { width: 60%; }
        h1 { font-size: 10px; letter-spacing: 4px; opacity: 0.3; text-transform: uppercase; margin-bottom: 30px; text-align: center; }

        .menu-grid { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .btn-item { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 18px; padding: 25px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .btn-item:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        .btn-item h2 { margin: 0; font-size: 16px; pointer-events: none; }

        .content-page { display: none; width: 100%; flex-direction: column; }
        .item-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 20px; text-align: center; }
        .item-card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        
        .btn-buy { background: #fff; color: #000; border: none; padding: 18px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .btn-back { background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; align-self: flex-start; cursor: pointer; display: none; }
        
        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: 800; display: none; width: 80%; text-align: center; z-index: 9999; box-shadow: 0 10px 30px #000; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="main-ui">
        <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png"></div>
        <h1>NEXTECH // TERMINAL</h1>
        
        <div class="menu-grid">
            <div class="btn-item" onclick="navTo('gpu')"><h2>ВИДЕОКАРТЫ</h2></div>
            <div class="btn-item" onclick="navTo('cpu')"><h2>ПРОЦЕССОРЫ</h2></div>
        </div>
    </div>

    <button class="btn-back" id="back-link" onclick="navHome()">← НАЗАД</button>

    <div class="content-page" id="page-gpu">
        <div class="item-card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/gpu_photo.jpg">
            <h3>Sapphire RX 580</h3>
            <p style="opacity: 0.6;">8GB GDDR5 | FurMark 72°C</p>
            <div style="font-size: 24px; font-weight: 800;">5,800 ₽</div>
            <button class="btn-buy" onclick="addToCart('RX 580', 5800)">В КОРЗИНУ</button>
        </div>
    </div>

    <div class="content-page" id="page-cpu">
        <div class="item-card">
            <h3>AMD Ryzen 5 5600X</h3>
            <p style="opacity: 0.6;">6 ядер / 12 потоков</p>
            <div style="font-size: 24px; font-weight: 800;">12,500 ₽</div>
