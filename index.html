<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* ТВОЙ ОРИГИНАЛЬНЫЙ ФОН И СЕТКА */
        body {
            background-color: #000;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #fff;
            margin: 0;
            font-family: sans-serif;
        }

        /* ТВОЙ ЛОГОТИП */
        .header-logo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 20px 0;
        }
        .header-logo span { color: #0088cc; }

        /* ТВОИ ВКЛАДКИ (ВИДЕОКАРТЫ / ПРОЦЕССОРЫ) */
        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 5px 15px;
            border: 1px solid #333;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .tab.active { border-color: #0088cc; background: rgba(0,136,204,0.1); }

        /* ТВОЯ СЕТКА КАТАЛОГА */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 10px 100px 10px;
        }

        .product-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid #222;
            border-radius: 10px;
            overflow: hidden;
        }

        /* ЛИСТАЛКА ФОТО (ВСТРОЕНА В ТВОЙ БЛОК) */
        .swiper { width: 100%; height: 120px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .item-info { padding: 10px; }
        .item-name { font-size: 14px; font-weight: bold; margin: 0; }
        .item-price { color: #4cd137; font-size: 16px; margin: 5px 0; }
        
        /* ДОП ИНФА ДЛЯ ПОКУПАТЕЛЯ */
        .item-desc { font-size: 11px; color: #888; margin-bottom: 10px; }

        .add-btn {
            width: 100%;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
            font-size: 12px;
        }

        /* ТВОЕ МЕНЮ С БОЛЬШИМИ ИКОНКАМИ */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #000;
            display: flex;
            border-top: 1px solid #222;
        }
        .menu-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
        }
        .menu-item i { font-size: 28px; } /* ИКОНКИ 28PX */
        .menu-item span { font-size: 10px; margin-top: 2px; }
        .menu-item.active { color: #0088cc; }

        /* ОТМЕНА ЗАКАЗА В ПРОФИЛЕ */
        .order-block {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            margin: 10px;
        }
        .cancel-btn {
            width: 100%;
            padding: 8px;
            background: rgba(255,0,0,0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255,0,0,0.2);
            margin-top: 10px;
            border-radius: 5px;
        }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="header-logo">nex<span>Tech</span></div>

    <div id="shop" class="page active">
        <div class="category-tabs">
            <div class="tab active">Видеокарты</div>
            <div class="tab">Процессоры</div>
        </div>

        <div class="main-grid">
            <div class="product-item">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide"><img src="img1.jpg"></div>
                        <div class="swiper-slide"><img src="img2.jpg"></div>
                    </div>
                    <div class="swiper-pagination"></div>
                </div>
                <div class="item-info">
                    <p class="item-name">RX 580 8GB</p>
                    <p class="item-price">5 800 ₽</p>
                    <div class="item-desc">Samsung память, 67°C в FurMark. Гарантия 3 дня.</div>
                    <button class="add-btn" onclick="add()">В корзину</button>
                </div>
            </div>
            </div>
    </div>

    <div id="profile" class="page">
        <div class="order-block" id="order1">
            <p>Заказ #1 — 5 800 ₽</p>
            <button class="cancel-btn" onclick="cancel(1)">Отменить заказ</button>
        </div>
    </div>

    <div class="bottom-menu">
        <div class="menu-item active" onclick="nav('shop', this)">
            <i class="fa-solid fa-house"></i>
            <span>Шоп</span>
        </div>
        <div class="menu-item" onclick="nav('profile', this)">
            <i class="fa-solid fa-user"></i>
            <span>Профиль</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        new Swiper(".mySwiper", {
            pagination: { el: ".swiper-pagination", dynamicBullets: true },
        });

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        function cancel(id) {
            tg.showConfirm("Отменить заказ?", (ok) => {
                if(ok) {
                    document.getElementById('order'+id).innerHTML = "Заказ отменен";
                    tg.HapticFeedback.notificationOccurred('success');
                }
            });
        }

        function add() {
            tg.HapticFeedback.impactOccurred('medium');
            alert("В корзине!");
        }
    </script>
</body>
</html>
