<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --card: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --success: #34c759;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        #app {
            height: 100vh;
            overflow-y: auto;
            padding-bottom: 110px;
            scroll-behavior: auto;
        }

        .screen {
            display: none;
            padding: 20px;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .header { text-align: center; margin: 40px 0 20px; }
        .logo-wrapper {
            background: #fff; width: 80px; height: 80px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-wrapper img { width: 50px; }
        .brand { font-size: 10px; letter-spacing: 4px; opacity: 0.4; }

        /* КАТЕГОРИИ */
        .category-btn {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 22px; padding: 30px; font-family: 'Inter';
            font-size: 18px; text-transform: uppercase; margin-bottom: 12px;
            cursor: pointer; transition: 0.2s;
        }

        /* КАРТОЧКА ТОВАРА */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 25px; margin-bottom: 15px; overflow: hidden; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #1a1a1c; }
        .card-body { padding: 15px; }

        /* СЛАЙДЕР В ДЕТАЛЯХ */
        .slider-container { position: relative; width: 100%; border-radius: 25px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--border); }
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; height: 280px; scroll-snap-align: center; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 6px; margin-top: -30px; position: relative; z-index: 10; padding-bottom: 20px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.4); }

        /* HOTBAR */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.4); position: relative; z-index: 2;
        }
        .nav-item.active { color: #fff; }
        
        /* ТА САМАЯ ПИЛЮЛЯ (СКОЛЬЗЯЩАЯ) */
        .nav-pill {
            position: absolute; top: 15px; height: 35px; width: 60px;
            background: rgba(255,255,255,0.1); border-radius: 18px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1; pointer-events: none;
        }

        .nav-icon { width: 22px; height: 22px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--icon); margin-bottom: 25px; }
        .nav-label { position: absolute; bottom: 15px; font-size: 9px; font-weight: 700; text-transform: uppercase; }

        /* КНОПКИ */
        .btn-back { font-size: 11px; opacity: 0.4; padding: 10px 0; text-transform: uppercase; cursor: pointer; }
        .btn-pay {
            background: #fff; color: #000; border: none; padding: 20px; width: 100%;
            border-radius: 20px; font-family: 'Inter'; font-weight: 700; font-size: 16px; margin-top: 15px;
        }
        .btn-real-pay { background: var(--success); color: #fff; }

        /* КОРЗИНА */
        .cart-row { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-shop" class="screen" style="display: block; opacity: 1;">
        <div class="header">
            <div class="logo-wrapper"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <div class="brand">NEXTECH // MAIN</div>
        </div>
        <div class="category-btn" onclick="loadCategory('gpu')">Видеокарты</div>
        <div class="category-btn" onclick="loadCategory('cpu')">Процессоры</div>
    </div>

    <div id="screen-catalog" class="screen">
        <div class="btn-back" onclick="nav('shop')">← Назад</div>
        <h2 id="cat-name" style="margin: 15px 0; font-size: 14px; opacity: 0.5;">КАТАЛОГ</h2>
        <div id="catalog-items"></div>
    </div>

    <div id="screen-item" class="screen">
        <div class="btn-back" onclick="nav('catalog')">← К списку</div>
        <div id="item-content"></div>
    </div>

    <div id="screen-cart" class="screen">
        <div class="header"><div class="brand">CART // STORAGE</div></div>
        <div id="cart-content"></div>
        <div id="cart-empty" style="text-align:center; opacity:0.3; margin-top:50px;">ЗДЕСЬ ПОКА ПУСТО</div>
    </div>

    <div id="screen-profile" class="screen">
        <div class="header"><div class="brand">USER // TERMINAL</div></div>
        <div class="category-btn" style="padding: 20px; font-size: 14px;">Мои заказы</div>
        <div class="category-btn" style="padding: 20px; font-size: 14px; opacity: 0.5;">Поддержка</div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-pill" id="pill"></div>
    <div class="nav-item active" onclick="switchTab(0, 'shop', this)">
        <div class="nav-icon" style="--icon: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="nav-label">Шоп</span>
    </div>
    <div class="nav-item" onclick="switchTab(1, 'cart', this)">
        <div class="nav-icon" style="--icon: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="nav-label">Корзина</span>
    </div>
    <div class="nav-item" onclick="switchTab(2, 'profile', this)">
        <div class="nav-icon" style="--icon: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="nav-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const db = {
        gpu: [
            { id: 1, name: 'RX 580 4GB', price: 5800, imgs: ['photo_2026-04-01_13-15-04.jpg', 'https://via.placeholder.com/400x280/1a1a1c/ffffff?text=Ports'], desc: 'Классика Full HD.', full: 'Карта в отличном состоянии, обслужена. Тянет CS2, Dota 2, Rust.' },
            { id: 2, name: 'RTX 3060 12GB', price: 23000, imgs: ['https://via.placeholder.com/400x280/1a1a1c/ffffff?text=RTX+3060'], desc: 'DLSS & Ray Tracing.', full: 'Мощная карта для современных игр в 1080p и 1440p.' }
        ],
        cpu: [
            { id: 3, name: 'Ryzen 5 5600X', price: 13500, imgs: ['photo_2026-04-01_13-21-49.jpg', 'https://via.placeholder.com/400x280/1a1a1c/ffffff?text=Socket+AM4'], desc: 'Игровой монстр.', full: '6 ядер, 12 потоков. Идеален для стримов и игр.' }
        ]
    };

    let cart = [];

    // Навигация между вкладками (с пилюлей)
    function switchTab(index, screenId, el) {
        const pill = document.getElementById('pill');
        const tabWidth = document.body.clientWidth / 3;
        const offset = (tabWidth - 60) / 2;
        pill.style.transform = `translateX(${index * tabWidth + offset}px)`;

        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        nav(screenId);
    }

    // Универсальный переход между экранами
    function nav(id) {
        document.getElementById('app').scrollTo(0, 0); // ПРИНУДИТЕЛЬНЫЙ ВЕРХ
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        const target = document.getElementById('screen-' + id);
        target.style.display = 'block';
        if(id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function loadCategory(cat) {
        const container = document.getElementById('catalog-items');
        document.getElementById('cat-name').innerText = cat.toUpperCase() + ' // КАТАЛОГ';
        container.innerHTML = '';
        db[cat].forEach(p => {
            container.innerHTML += `
                <div class="card" onclick="showItem('${cat}', ${p.id})">
                    <img src="${p.imgs[0]}" class="card-img">
                    <div class="card-body">
                        <div style="font-family:'Inter'; font-size:18px;">${p.name}</div>
                        <div style="font-size:12px; opacity:0.5; margin-top:5px;">${p.desc}</div>
                        <div style="margin-top:10px; font-weight:700;">${p.price.toLocaleString()} ₽</div>
                    </div>
                </div>`;
        });
        nav('catalog');
    }

    function showItem(cat, id) {
        const p = db[cat].find(x => x.id === id);
        const cont = document.getElementById('item-content');
        const slides = p.imgs.map(s => `<div class="slide"><img src="${s}"></div>`).join('');
        const dots = p.imgs.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');

        cont.innerHTML = `
            <div class="slider-container">
                <div class="slider" onscroll="updateDots(this)">${slides}</div>
                <div class="dots">${dots}</div>
            </div>
            <h2 style="font-family:'Inter'; font-size:24px;">${p.name}</h2>
            <p style="font-size:14px; opacity:0.6; line-height:1.6; margin: 15px 0;">${p.full}</p>
            <button class="btn-pay" onclick="addToCart('${p.name}', ${p.price})">ДОБАВИТЬ — ${p.price.toLocaleString()} ₽</button>
        `;
        nav('item');
    }

    function updateDots(el) {
        const index = Math.round(el.scrollLeft / el.offsetWidth);
        el.parentElement.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === index));
    }

    function addToCart(name, price) {
        cart.push({name, price, uid: Date.now()});
        tg.HapticFeedback.notificationOccurred('success');
        tg.MainButton.setText(`В КОРЗИНЕ: ${cart.length}`).show();
    }

    function renderCart() {
        const cont = document.getElementById('cart-content');
        const empty = document.getElementById('cart-empty');
        cont.innerHTML = '';
        if(cart.length === 0) { empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        
        let total = 0;
        cart.forEach(i => {
            total += i.price;
            cont.innerHTML += `<div class="cart-row"><div>${i.name}<br><small>${i.price} ₽</small></div><div onclick="removeCart(${i.uid})" style="color:#ff3b30; font-size:10px;">УДАЛИТЬ</div></div>`;
        });

        cont.innerHTML += `
            <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:15px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>ИТОГО:</span><b>${total.toLocaleString()} ₽</b></div>
                <button class="btn-pay btn-real-pay" onclick="pay()">ОФОРМИТЬ И ОПЛАТИТЬ</button>
            </div>`;
    }

    function removeCart(uid) {
        cart = cart.filter(x => x.uid !== uid);
        renderCart();
        if(cart.length === 0) tg.MainButton.hide();
    }

    function pay() {
        tg.HapticFeedback.notificationOccurred('warning');
        alert("Заказ принят! Оплата будет подключена скоро.");
    }

    // Инициализация пилюли
    window.onload = () => {
        const tabWidth = document.body.clientWidth / 3;
        document.getElementById('pill').style.transform = `translateX(${(tabWidth - 60) / 2}px)`;
    };
</script>

</body>
</html>
