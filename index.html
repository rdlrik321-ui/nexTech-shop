<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212; 
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
        }

        body {
            background: radial-gradient(circle at top, #1e1e1e 0%, #121212 100%);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }

        .logo-block {
            background: #ffffff;
            border-radius: 25px;
            padding: 15px;
            width: 100px; height: 100px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-block img { width: 100%; height: auto; object-fit: contain; }

        h1 { font-weight: 200; letter-spacing: 3px; text-transform: uppercase; font-size: 13px; opacity: 0.5; margin-bottom: 30px; text-align: center; }

        .catalog-starter { width: 100%; display: grid; gap: 12px; }

        .category-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
        }
        .category-card:active { transform: scale(0.97); background: rgba(255,255,255,0.07); }
        .category-card h2 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: 1px; pointer-events: none; }

        .product-section { display: none; width: 100%; flex-direction: column; gap: 15px; }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
        }

        .btn {
            background: #ffffff; color: #000; border: none;
            padding: 12px 30px; border-radius: 15px;
            font-weight: 800; text-transform: uppercase; font-size: 11px;
            cursor: pointer;
        }

        .back-btn {
            align-self: flex-start; background: none; border: none; color: #fff;
            font-size: 24px; cursor: pointer; opacity: 0.5; display: none; margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-block" id="ui-logo">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png">
        </div>
        
        <button class="back-btn" id="ui-back" onclick="showHome()">‹ Назад</button>
        <h1 id="ui-title">NEXTECH // TERMINAL</h1>

        <div class="catalog-starter" id="ui-home">
            <div class="category-card" onclick="openCategory('gpu-page')">
                <h2>ВИДЕОКАРТЫ</h2>
            </div>
            <div class="category-card" onclick="openCategory('cpu-page')">
                <h2>ПРОЦЕССОРЫ</h2>
            </div>
        </div>

        <div class="product-section" id="gpu-page">
            <div class="card">
                <div style="margin-bottom: 10px;">Sapphire Nitro+ RX 580</div>
                <div style="font-size: 20px; font-weight: 700; margin-bottom: 15px;">5,800 ₽</div>
                <button class="btn" onclick="sendOrder('RX 580', 5800)">В корзину</button>
            </div>
        </div>

        <div class="product-section" id="cpu-page">
            <div class="card">
                <div style="margin-bottom: 10px;">AMD Ryzen 5 5600X</div>
