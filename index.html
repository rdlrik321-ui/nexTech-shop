<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root { 
    --bg: #0d0d0f; 
    --card: rgba(255,255,255,0.03); 
    --brd: rgba(255,255,255,0.08); 
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    background-color: var(--bg);
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 30px 30px;
    color: #fff;
    font-family: -apple-system, sans-serif;
    margin: 0;
    overflow: hidden;
}

/* КОНТЕЙНЕР */
.container {
    position: relative;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    height: 100vh;
}

/* СТРАНИЦЫ */
.page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 20px;

    display: flex;
    flex-direction: column;
    align-items: center;

    opacity: 0;
    transform: translateX(30px);
    pointer-events: none;

    transition: 0.25s ease;
}

.page.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
}

.page.back {
    transform: translateX(-30px);
}

/* ЛОГО */
.logo-box {
    background: #fff;
    border-radius: 20px;
    width: 75px;
    height: 75px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 40px 0 15px 0;
}

h1 {
    font-size: 10px;
    letter-spacing: 4px;
    opacity: 0.4;
    text-transform: uppercase;
    margin-bottom: 30px;
}

/* КНОПКИ */
.menu-btn {
    background: var(--card);
    border: 1px solid var(--brd);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 12px;
    width: 100%;
    text-align: center;
    cursor: pointer;
    transition: 0.15s;
    backdrop-filter: blur(10px);
}

.menu-btn:active {
    transform: scale(0.96);
    background: rgba(255,255,255,0.08);
}

.menu-btn b {
    font-size: 15px;
    letter-spacing: 1px;
}

/* КАРТОЧКА */
.card {
    background: var(--card);
    border: 1px solid var(--brd);
    border-radius: 24px;
    padding: 20px;
    text-align: center;
    width: 100%;
}

.card img {
    width: 100%;
    border-radius: 16px;
    margin-bottom: 15px;
    border: 1px solid var(--brd);
}

.btn-back {
    align-self: flex-start;
    background: none;
    border: none;
    color: #fff;
    opacity: 0.5;
    font-size: 13px;
    margin-bottom: 10px;
    cursor: pointer;
}

.price {
    font-size: 24px;
    font-weight: 800;
    margin: 10px 0;
}

.desc {
    font-size: 13px;
    opacity: 0.6;
}

.buy-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 18px;
    border-radius: 14px;
    font-weight: 800;
    width: 100%;
    margin-top: 20px;
    cursor: pointer;
}

/* КОРЗИНА */
.cart-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    color: #000;
    padding: 16px;
    border-radius: 30px;
    font-weight: 800;
    display: none;
    width: 85%;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<!-- ГЛАВНАЯ -->
<div id="home-screen" class="page active">
    <div class="logo-box">
        <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png" width="45">
    </div>
    <h1>NEXTECH // TERMINAL</h1>

    <div class="menu-btn" onclick="nav('gpu')"><b>ВИДЕОКАРТЫ</b></div>
    <div class="menu-btn" onclick="nav('cpu')"><b>ПРОЦЕССОРЫ</b></div>
</div>

<!-- GPU -->
<div id="pg-gpu" class="page">
    <button class="btn-back" onclick="nav('home')">← НАЗАД</button>

    <div class="card">
        <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/gpu_photo.jpg">
        <div><b>Sapphire Nitro+ RX 580</b></div>
        <div class="desc">8GB | Отличное состояние</div>
        <div class="price">5,800 ₽</div>
        <button class="buy-btn" onclick="add('RX 580',5800)">В КОРЗИНУ</button>
    </div>
</div>
