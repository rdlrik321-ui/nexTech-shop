<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --card: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 25px 25px;
            color: #fff; font-family: 'Roboto Mono', monospace;
            height: 100vh; overflow: hidden;
        }

        #viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; overflow-x: hidden; padding-bottom: 110px;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 30px; }
        .logo-box { 
            background: #fff; border-radius: 26px; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); margin-bottom: 15px;
        }
        .logo-box img { width: 50px; }
        .brand-text { font-size: 10px; letter-spacing: 6px; opacity: 0.4; font-weight: 700; text-transform: uppercase; }

        /* SEARCH */
        .search-wrap { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 5px 0 15px; }
        .search-input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 18px 24px; color: #fff; font-family: 'Roboto Mono';
            font-size: 14px; outline: none; backdrop-filter: blur(10px);
        }

        /* КАТЕГОРИИ */
        .btn-cat {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 35px 25px; font-family: 'Inter';
            font-weight: 900; font-size: 20px; text-transform: uppercase;
            margin-bottom: 15px; cursor: pointer; text-align: center;
        }

        /* ТОВАРЫ */
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; margin-bottom: 20px; overflow: hidden; }
        .p-img { width: 100%; height: 210px; object-fit: cover; background: #1a1a1c; }
        .p-info { padding: 22px; }
        .p-title { font-family: 'Inter'; font-size: 22px; font-weight: 900; margin-bottom: 6px; }
        .p-price { font-size: 18px; font-weight: 700; color: #fff; }

        /* FPS МЕТРЫ */
        .fps-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .fps-bar { width: 60px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .fps-fill { height: 100%; background: #fff; }

        /* СЛАЙДЕР */
        .slider { position: relative; border-radius: 28px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--border); }
        .slider-inner { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slide { flex: 0 0 100%; height: 300px; scroll-snap-align: center; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 8px; margin-top: -30px; position: relative; padding-bottom: 20px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.4); }

        /* НАВИГАЦИЯ (TAB BAR) */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 95px;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); position: relative; }
        .nav-item.active { color: #fff; }
        .nav-pill { position: absolute; width: 60px; height: 36px; background: rgba(255,255,255,0.1); border-radius: 18px; top: 16px; opacity: 0; transition: 0.3s; }
        .nav-item.active .nav-pill { opacity: 1; }
        .nav-icon { width: 22px; height: 22px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 28px; }
        .nav-label { position: absolute; bottom: 18px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        .badge { 
            position: absolute; top: 12px; right: 22%; background: var(--danger); 
            color: #fff; font-size: 9px; font-weight: 800; min-width: 17px; height: 17px; 
            border-radius: 10px; display: none; align-items: center; justify-content: center; 
            border: 2px solid #000; 
        }

        /* КНОПКИ */
        .btn-buy { background: #fff; color: #000; border: none; padding: 24px; border-radius: 22px; font-family: 'Inter'; font-weight: 900; font-size: 17px; width: 100%; margin-top: 20px; }
        .btn-back { font-size: 11px; opacity: 0.4; padding: 15px 0; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        .cart-card { background: var(--card); padding: 20px; border-radius: 22px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="viewport">
    
    <div id="scr-home" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <div class="brand-text">NEXTECH // PREMIUM</div>
        </div>
        <div class="btn-cat" onclick="openCat('gpu')">ВИДЕОКАРТЫ // GPU</div>
        <div class="btn-cat" onclick="openCat('cpu')">ПРОЦЕССОРЫ // CPU</div>
    </div>

    <div id="scr-catalog" class="screen">
        <div class="btn-back" onclick="navigate('home')">← НА ГЛАВНУЮ</div>
        <div class="search-wrap">
            <input type="text" class="search-input" id="search-input" placeholder="Поиск по складу..." oninput="renderCatalog()">
        </div>
        <div id="catalog-list"></div>
    </div>

    <div id="scr-item" class="screen">
        <div class="btn-back" onclick="navigate('catalog')">← К СПИСКУ</div>
        <div id="item-details"></div>
    </div>

    <div id="scr-cart" class="screen">
        <div class="header"><div class="brand-text">STORAGE // КОРЗИНА</div></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; padding:80px; opacity:0.2;">[ КОРЗИНА ПУСТА ]</div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><div class="brand-text">USER // PROFILE</div></div>
        <div class="btn-cat" style="padding: 22px; text-align: left; font-size: 14px;">ИСТОРИЯ ЗАКАЗОВ</div>
        <div class="btn-cat" style="padding: 22px; text-align: left; font-size: 14px;">МОИ БОНУСЫ</div>
        <div class="btn-cat" style="padding: 22px; text-align: left; font-size: 14px;">ПОДДЕРЖКА</div>
    </div>

</div>

<div class="nav">
    <div class="nav-item active" onclick="tab(this, 'home')">
        <div class="nav-pill"></div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="nav-label">Шоп</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'cart')">
        <div class="nav-pill"></div>
        <div id="cart-badge" class="badge">0</div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="nav-label">Корзина</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'profile')">
        <div class="nav-pill"></div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="nav-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('#0d0d0f');

    const db = {
        'gpu': [
            { id: 1, name: 'RX 580 4GB NITRO+', price: 5800, imgs: ['photo_2026-04-01_13-15-04.jpg', 'https://via.placeholder.com/600x400/161618/fff?text=Backplate'], desc: 'Обслужена, заменены термопрокладки. Идеально для бюджетного гейминга в 1080p.', tests: [{n:'Dota 2', v:'95 FPS', p:75}, {n:'CS2', v:'120 FPS', p:85}] },
            { id: 2, name: 'RTX 3060 12GB', price: 23500, imgs: ['https://via.placeholder.com/600x400/161618/fff?text=RTX+3060'], desc: 'Топовое состояние, на пломбах. Любые проверки на месте.', tests: [{n:'Cyberpunk', v:'65 FPS', p:90}, {n:'RDR 2', v:'70 FPS', p:80}] }
        ],
        'cpu': [
            { id: 3, name: 'RYZEN 5 5600X', price: 13200, imgs: ['photo_2026-04-01_13-21-49.jpg'], desc: 'Мощный игровой процессор. BOX версия.', tests: [{n:'Multi-core', v:'Elite', p:95}] }
        ]
    };

    let cart = [];
    let curCat = '';

    function navigate(id) {
        document.getElementById('viewport').scrollTo(0,0);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-'+id).classList.add('active');
        if(id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function tab(el, id) {
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        navigate(id);
    }

    function openCat(cat) {
        curCat = cat;
        renderCatalog();
        navigate('catalog');
    }

    function renderCatalog() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const list = document.getElementById('catalog-list');
        list.innerHTML = '';
        db[curCat].filter(p => p.name.toLowerCase().includes(q)).forEach(p => {
            list.innerHTML += `
                <div class="p-card" onclick="openItem('${curCat}', ${p.id})">
                    <img src="${p.imgs[0]}" class="p-img">
                    <div class="p-info">
                        <div class="p-title">${p.name}</div>
                        <div class="p-price">${p.price.toLocaleString()} ₽</div>
                    </div>
                </div>`;
        });
    }

    function openItem(cat, id) {
        const p = db[cat].find(x => x.id === id);
        const area = document.getElementById('item-details');
        let slides = p.imgs.map(s => `<div class="slide"><img src="${s}"></div>`).join('');
        let dots = p.imgs.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
        
        area.innerHTML = `
            <div class="slider">
                <div class="slider-inner" onscroll="updateDots(this)">${slides}</div>
                <div class="dots">${dots}</div>
            </div>
            <h2 style="font-family:'Inter'; font-size:32px; font-weight:900; margin-bottom:15px;">${p.name}</h2>
            <p style="opacity:0.5; font-size:15px; line-height:1.7; margin-bottom:25px;">${p.desc}</p>
            <div style="font-size:10px; opacity:0.3; letter-spacing:2px; margin-bottom:15px;">ТЕСТЫ ПРОИЗВОДИТЕЛЬНОСТИ</div>
            ${p.tests.map(t => `
                <div class="fps-box">
                    <span>${t.n}</span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <b>${t.v}</b>
                        <div class="fps-bar"><div class="fps-fill" style="width:${t.p}%"></div></div>
                    </div>
                </div>
            `).join('')}
            <button class="btn-buy" onclick="addToCart('${p.name}', ${p.price})">ДОБАВИТЬ В КОРЗИНУ — ${p.price.toLocaleString()} ₽</button>`;
        navigate('item');
    }

    function updateDots(el) {
        const idx = Math.round(el.scrollLeft / el.offsetWidth);
        el.parentElement.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    function addToCart(name, price) {
        cart.push({name, price, uid: Date.now()});
        updateBadge();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function updateBadge() {
        const b = document.getElementById('cart-badge');
        b.innerText = cart.length;
        b.style.display = cart.length > 0 ? 'flex' : 'none';
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const empty = document.getElementById('cart-empty');
        list.innerHTML = '';
        if(cart.length === 0) { empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        let total = 0;
        cart.forEach(i => {
            total += i.price;
            list.innerHTML += `<div class="cart-card">
                <div><b>${i.name}</b><br><small style="opacity:0.4;">${i.price.toLocaleString()} ₽</small></div>
                <div onclick="removeCart(${i.uid})" style="color:var(--danger); font-weight:700; font-size:11px; padding:10px;">УДАЛИТЬ</div>
            </div>`;
        });
        list.innerHTML += `<div style="padding:20px; text-align:right;">
            <div style="opacity:0.4; font-size:11px; margin-bottom:5px;">ИТОГО</div>
            <div style="font-family:'Inter'; font-size:28px; font-weight:900;">${total.toLocaleString()} ₽</div>
        </div>
        <button class="btn-buy" style="background:#34c759; color:#fff;" onclick="alert('Заказ принят!')">ОФОРМИТЬ ДОСТАВКУ</button>`;
    }

    function removeCart(uid) {
        cart = cart.filter(x => x.uid !== uid);
        renderCart();
        updateBadge();
        tg.HapticFeedback.impactOccurred('medium');
    }
</script>

</body>
</html>
