<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0d0d0f; 
            --card: rgba(255, 255, 255, 0.04); 
            --brd: rgba(255, 255, 255, 0.08); 
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 380px; position: relative; display: flex; flex-direction: column; align-items: center; }

        /* Шапка nexTech (ЛОГО БОЛЬШЕ) */
        .header-area { display: flex; flex-direction: column; align-items: center; width: 100%; margin: 60px 0 30px 0; transition: 0.3s; }
        .logo-box { background: #fff; border-radius: 28px; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 30px rgba(0,0,0,0.6); margin-bottom: 15px; }
        .logo-box img { width: 60%; }
        h1 { font-size: 13px; letter-spacing: 5px; color: var(--text-sub); text-transform: uppercase; margin: 0; font-weight: 500; }

        /* Кнопки меню */
        .menu-list { width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .btn-io { 
            background: var(--card); border: 1px solid var(--brd); border-radius: 22px; 
            padding: 28px; width: 100%; cursor: pointer; text-align: center;
            transition: transform 0.1s; color: var(--text-main); text-decoration: none;
        }
        .btn-io:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        .btn-io b { font-size: 17px; letter-spacing: 1px; pointer-events: none; }

        /* Страницы */
        .page { display: none; width: 100%; flex-direction: column; position: relative; }
        .card-final { background: var(--card); border: 1px solid var(--brd); border-radius: 30px; padding: 25px; text-align: center; }
        .card-final img { width: 100%; border-radius: 20px; margin-bottom: 18px; border: 1px solid var(--brd); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        
        .btn-back { 
            background: none; border: none; color: var(--text-sub); 
            font-size: 16px; padding: 15px 0; cursor: pointer; align-self: flex-start;
        }
        .btn-back:active { color: var(--text-main); }

        .buy-btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 800; width: 100%; margin-top: 25px; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .price-tag { font-size: 28px; font-weight: 800; margin: 12px 0; color: #fff; }
        .info-text { font-size: 14px; color: var(--text-sub); line-height: 1.6; margin-bottom: 12px; }

        .cart-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 18px 25px; border-radius: 35px; font-weight: 800; display: none; width: auto; min-width: 80%; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.7); z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div id="m-screen" class="header-area">
        <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" alt="Logo"></div>
        <h1>NEXTECH // TERMINAL</h1>
        <div class="menu-list">
