<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --grid: rgba(255, 255, 255, 0.03);
            --card: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: 'Roboto Mono', monospace;
            height: 100vh; overflow: hidden;
        }

        #app-viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; overflow-x: hidden; padding-bottom: 110px;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; padding: 20px; animation: screenIn 0.4s ease forwards; }
        .screen.active { display: block; }

        @keyframes screenIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ПОИСК - ВЕРНУЛ */
        .search-box { margin-bottom: 20px; position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 5px 0; }
        .search-input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 16px 20px; color: #fff; font-family: 'Roboto Mono';
            font-size: 14px; outline: none; backdrop-filter: blur(10px);
        }

        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 30px; }
        .logo-box { 
            background: #fff; border-radius: 24px; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 15px;
        }
        .logo-box img { width: 55px; }
        .brand-label { font-size: 10px; letter-spacing: 6px; opacity: 0.4; text-transform: uppercase; font-weight: 700; }

        /* КАТЕГОРИИ */
        .btn-cat {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px; font-family: 'Inter';
            font-weight: 800; font-size: 18px; text-transform: uppercase;
            margin-bottom: 15px; cursor: pointer; text-align: center;
        }

        /* КАРТОЧКИ ТОВАРОВ */
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; margin-bottom: 20px; overflow: hidden; }
        .p-img { width: 100%; height: 210px; object-fit: cover; background: #161618; }
        .p-info { padding: 20px; }
        .p-name { font-family: 'Inter'; font-size: 20px; margin-bottom: 5px; }
        .p-price { font-size: 18px; font-weight: 700; color: #fff; }

        /* ТЕСТЫ FPS */
        .fps-row { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .fps-bar-container { width: 80px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; }
        .fps-bar-fill { height: 100%; background: #fff; border-radius: 2px; }

        /* СЛАЙДЕР */
        .slider-container { position: relative; border-radius: 28px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--border); }
        .slider-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-track::-webkit-scrollbar { display: none; }
        .slide-item { flex: 0 0 100%; height: 320px; scroll-snap-align: center; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; }
        .slider-dots { display: flex; justify-content: center; gap: 8px; margin-top: -35px; padding-bottom: 25px; position: relative; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.5); }

        /* ТАБ БАР */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 95px;
            background: rgba(0,0,0,0.96); backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
        }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: rgba(255,255,255,0.4); }
        .nav-tab.active { color: #fff; }
        .nav-pill { position: absolute; width: 65px; height: 38px; background: rgba(255,255,255,0.1); border-radius: 20px; top: 15px; opacity: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-tab.active .nav-pill { opacity: 1; }
        .nav-icon { width: 24px; height: 24px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 28px; }
        .nav-text { position: absolute; bottom: 18px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* КНОПКИ */
        .btn-buy {
            background: #fff; color: #000; border: none; padding: 24px; border-radius: 22px;
            font-family: 'Inter'; font-weight: 800; font-size: 17px; width: 100%; margin-top: 20px;
        }
        .btn-back { font-size: 11px; opacity: 0.4; padding: 15px 0; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* FLY ANIMATION */
        .fly-obj {
            position: fixed; z-index: 9999; pointer-events: none;
            width: 70px; height: 70px; border-radius: 20px;
            background-size: cover; background-position: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
    </style>
</head>
<body>

<div id="app-viewport">
    
    <div id="scr-home" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <div class="brand-label">NEXTECH // TERMINAL</div>
        </div>
        <div class="btn-cat" onclick="openCatalog('gpu')">GPU // Видеокарты</div>
        <div class="btn-cat" onclick="openCatalog('cpu')">CPU // Процессоры</div>
    </div>

    <div id="scr-catalog" class="screen">
        <div class="btn-back" onclick="navigate('home')">← НА ГЛАВНУЮ</div>
        <div class="search-box">
            <input type="text" class="search-input" id="q-search" placeholder="Поиск по названию..." oninput="renderList()">
        </div>
        <div id="catalog-list"></div>
    </div>

    <div id="scr-item" class="screen">
        <div class="btn-back" onclick="navigate('catalog')">← К СПИСКУ</div>
        <div id="item-content"></div>
    </div>

    <div id="scr-cart" class="screen">
        <div class="header"><div class="brand-label">STORAGE // КОРЗИНА</div></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; padding:60px; opacity:0.2;">[ ВАША КОРЗИНА ПУСТА ]</div>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-tab active" onclick="handleTab(this, 'home')">
        <div class="nav-pill"></div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="nav-text">Шоп</span>
    </div>
    <div id="tab-cart" class="nav-tab" onclick="handleTab(this, 'cart')">
        <div class="nav-pill"></div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="nav-text">Корзина</span>
    </div>
    <div class="nav-tab" onclick="handleTab(this, 'profile')">
        <div class="nav-pill"></div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="nav-text">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const db = {
        'gpu': [
            { id: 1, name: 'RX 580 4GB', price: 5800, imgs: ['photo_2026-04-01_13-15-04.jpg', 'https://via.placeholder.com/600x400/161618/fff?text=Backplate'], desc: 'Классическая видеокарта для бюджетного гейминга. Полностью обслужена: заменены термопрокладки и паста. Работает тихо, температуры в норме.', fps: [{n:'Dota 2 (Ultra)', v:'95 FPS', p:75}, {n:'CS2 (High)', v:'120 FPS', p:85}] },
            { id: 2, name: 'RTX 3060 12GB', price: 23500, imgs: ['https://via.placeholder.com/600x400/161618/fff?text=RTX+3060'], desc: 'Современная карта с поддержкой Ray Tracing и DLSS. 12GB видеопамяти хватит для любых задач на годы вперед. Идеальное состояние.', fps: [{n:'Cyberpunk', v:'65 FPS', p:90}, {n:'Warzone', v:'90 FPS', p:80}] }
        ],
        'cpu': [
            { id: 3, name: 'Ryzen 5 5600X', price: 13200, imgs: ['photo_2026-04-01_13-21-49.jpg'], desc: 'Мощный 6-ядерный процессор. Отлично подходит для игр и стриминга. Сокет AM4. BOX версия с родным кулером в комплекте.', fps: [{n:'Workload', v:'Elite', p:95}, {n:'Stability', v:'100%', p:100}] }
        ]
    };

    let cart = [];
    let curCat = '';

    function navigate(id) {
        document.getElementById('app-viewport').scrollTo(0,0);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-'+id).classList.add('active');
        if(id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function handleTab(el, id) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        navigate(id);
    }

    function openCatalog(cat) {
        curCat = cat;
        renderList();
        navigate('catalog');
    }

    function renderList() {
        const q = document.getElementById('q-search').value.toLowerCase();
        const list = document.getElementById('catalog-list');
        list.innerHTML = '';
        db[curCat].filter(p => p.name.toLowerCase().includes(q)).forEach(p => {
            list.innerHTML += `
                <div class="p-card" onclick="openItem('${curCat}', ${p.id})">
                    <img src="${p.imgs[0]}" class="p-img">
                    <div class="p-info">
                        <div class="p-name">${p.name}</div>
                        <div class="p-price">${p.price.toLocaleString()} ₽</div>
                    </div>
                </div>`;
        });
    }

    function openItem(cat, id) {
        const p = db[cat].find(x => x.id === id);
        const area = document.getElementById('item-content');
        let slides = p.imgs.map(s => `<div class="slide-item"><img src="${s}"></div>`).join('');
        let dots = p.imgs.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
        
        area.innerHTML = `
            <div class="slider-container">
                <div class="slider-track" onscroll="updateDots(this)">${slides}</div>
                <div class="slider-dots">${dots}</div>
            </div>
            <h2 style="font-family:'Inter'; font-size:28px; font-weight:800; margin-bottom:15px;">${p.name}</h2>
            <div style="font-size:10px; opacity:0.3; letter-spacing:2px; margin-bottom:10px;">ОПИСАНИЕ ТОВАРА</div>
            <p style="opacity:0.6; line-height:1.7; font-size:14px; margin-bottom:25px;">${p.desc}</p>
            <div style="font-size:10px; opacity:0.3; letter-spacing:2px; margin-bottom:15px;">РЕЗУЛЬТАТЫ ТЕСТОВ</div>
            ${p.fps.map(f => `
                <div class="fps-row">
                    <span>${f.n}</span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <b>${f.v}</b>
                        <div class="fps-bar-container"><div class="fps-bar-fill" style="width:${f.p}%"></div></div>
                    </div>
                </div>
            `).join('')}
            <button class="btn-buy" id="buy-action" onclick="flyToCart('${p.imgs[0]}', '${p.name}', ${p.price})">В КОРЗИНУ — ${p.price.toLocaleString()} ₽</button>`;
        navigate('item');
    }

    function updateDots(el) {
        const idx = Math.round(el.scrollLeft / el.offsetWidth);
        el.parentElement.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    function flyToCart(img, name, price) {
        const btn = document.getElementById('buy-action');
        const target = document.getElementById('tab-cart');
        const r1 = btn.getBoundingClientRect();
        const r2 = target.getBoundingClientRect();

        const fly = document.createElement('div');
        fly.className = 'fly-obj';
        fly.style.backgroundImage = `url(${img})`;
        fly.style.left = r1.left + (r1.width/2) - 35 + 'px';
        fly.style.top = r1.top + 'px';
        document.body.appendChild(fly);

        setTimeout(() => {
            fly.style.left = r2.left + (r2.width/2) - 35 + 'px';
            fly.style.top = r2.top + 'px';
            fly.style.transform = 'scale(0.2) rotate(720deg)';
            fly.style.opacity = '0';
        }, 50);

        setTimeout(() => {
            fly.remove();
            cart.push({name, price, uid: Date.now()});
            tg.HapticFeedback.notificationOccurred('success');
        }, 1250);
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        if(cart.length === 0) { document.getElementById('cart-empty').style.display = 'block'; return; }
        document.getElementById('cart-empty').style.display = 'none';
        let total = 0;
        cart.forEach(i => {
            total += i.price;
            list.innerHTML += `<div style="background:var(--card); padding:20px; border-radius:20px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <div><b>${i.name}</b><br><span style="opacity:0.4; font-size:12px;">${i.price} ₽</span></div>
                <div onclick="removeCart(${i.uid})" style="color:red; font-size:11px; font-weight:700;">УДАЛИТЬ</div>
            </div>`;
        });
        list.innerHTML += `<div style="padding:20px; text-align:right; font-size:20px; font-family:'Inter'; font-weight:800;">ИТОГО: ${total.toLocaleString()} ₽</div>`;
    }

    function removeCart(uid) {
        cart = cart.filter(x => x.uid !== uid);
        renderCart();
    }
</script>

</body>
</html>
