<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Базовые темные тона */
            --bg-deep: #000000;
            --bg-accent: #0a0a0d;
            
            /* Цвета интерфейса */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --accent-glow: #3182ce; /* Красивый синий акцент */
            
            --blur-val: blur(20px);
        }

        /* 1. СЛОЖНЫЙ ХАЙ-ТЕК ФОН */
        body {
            background-color: var(--bg-deep);
            background-image: 
                /* Тёмный неоновый градиент */
                radial-gradient(circle at top right, rgba(49, 130, 206, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(49, 130, 206, 0.08) 0%, transparent 35%),
                /* ТЕ САМЫЕ ДИАГОНАЛЬНЫЕ ПОЛОСКИ */
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 1px, transparent 1px, transparent 20px),
                /* Тонкая сетка */
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* 2. ЛОГОТИП С НЕОНОВЫМ СВЕЧЕНИЕМ */
        .logo-block {
            background: #ffffff;
            border-radius: 25px;
            padding: 15px;
            width: 100px; height: 100px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 25px;
            /* Белое свечение */
            box-shadow: 0 0 25px rgba(255,255,255,0.4), 0 0 50px rgba(255,255,255,0.1);
        }
        .logo-block img { width: 100%; height: auto; object-fit: contain; }

        h1 { font-weight: 200; letter-spacing: 3px; text-transform: uppercase; font-size: 12px; opacity: 0.5; margin-bottom: 30px; text-align: center; color: #fff; }

        .catalog-starter { width: 100%; display: grid; gap: 12px; }

        /* 3. КАРТОЧКИ С ГЛУБОКИМ БЛЮРОМ */
        .category-card {
            background: rgba(255,255,255,0.02);
            backdrop-filter: var(--blur-val);
            -webkit-backdrop-filter: var(--blur-val);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative; overflow: hidden;
        }
        /* Легкое неоновое свечение при наведении (на ПК) или долгом нажатии */
        .category-card:active { 
            transform: scale(0.97); 
            background: rgba(49, 130, 206, 0.05);
            box-shadow: 0 0 20px rgba(49, 130, 206, 0.15); /* Синий акцент */
            border-color: rgba(49, 130, 206, 0.2);
        }
        .category-card h2 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: 1px; color: #fff; pointer-events: none; }

        /* 4. АНИМАЦИЯ ТОВАРОВ (ПЛАВНОЕ ВЫПЛЫВАНИЕ) */
        @keyframes slideInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .product-section { 
            display: none; width: 100%; flex-direction: column; gap: 15px; 
            animation: slideInUp 0.
