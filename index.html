<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --grid-color: rgba(255, 255, 255, 0.03);
            --card-bg: rgba(255, 255, 255, 0.06); 
            --card-border: rgba(255, 255, 255, 0.1);
            --hotbar-bg: rgba(0, 0, 0, 0.95);
            --pill-color: rgba(255, 255, 255, 0.1);
            --font-premium: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden; /* Запрещаем скролл всему телу */
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР ДЛЯ СКРОЛЛА */
        .app-viewport {
            height: 100vh;
            overflow-y: auto; /* Скроллим только тут */
            padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .screen {
            display: none;
            padding: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* HEADER */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 40px 0 30px;
        }

        .logo-box { 
            background: #fff; border-radius: 22px; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px;
        }
        .logo-box img { width: 55px; height: auto; }
        h1 { font-size: 10px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

        /* КАРТОЧКА ТОВАРА */
        .product-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 25px; padding: 0; margin-bottom: 20px; overflow: hidden;
        }
        
        .product-img-box {
            width: 100%; height: 200px; overflow: hidden;
            background: #1a1a1c;
        }
        .product-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .product-info { padding: 18px; }

        .btn-main {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 22px; padding: 28px; font-family: var(--font-premium);
            font-weight: 700; font-size: 17px; text-align: center;
            text-transform: uppercase; color: #fff; margin-bottom: 15px; cursor: pointer;
        }

        /* ТЕСТЫ */
        .test-line {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 12px;
            border-radius: 12px; margin-bottom: 8px; font-size: 12px;
        }
        .bar-bg { width: 60px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .bar-fill { height: 100%; background: #fff; border-radius: 2px; }

        /* HOT BAR */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: var(--hotbar-bg); backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(255,255,255,0.1); display: flex;
            justify-content: space-around; z-index: 9999;
        }

        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative; color: rgba(255,255,255,0.4);
        }
        .tab-item.active { color: #fff; }
        .pill {
            position: absolute; width: 60px; height: 35px;
            background: var(--pill-color); border-radius: 20px;
            top: 15px; z-index: -1; opacity: 0; transition: 0.2s;
        }
        .tab-item.active .pill { opacity: 1; }
        .tab-icon {
            width: 24px; height: 24px; background: currentColor;
            mask-size: contain; -webkit-mask-size: contain; mask-repeat: no-repeat;
            mask-position: center; margin-bottom: 25px;
        }
        .tab-label { position: absolute; bottom: 15px; font-size: 10px; font-weight: 700; text-transform: uppercase; }

        .back-btn { font-size: 11px; opacity: 0.4; padding: 15px 0; cursor: pointer; display: inline-block; text-transform: uppercase; }
        .buy-btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; font-family: var(--font-premium); font-weight: 700; width: 100%; margin-top: 10px; font-size: 16px; }

        .cart-item {
            background: var(--card-bg); padding: 15px; border-radius: 20px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div class="app-viewport" id="scroll-container">
    
    <div id="shop" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>
        <div class="btn-main" onclick="openCatalog('gpu')">Видеокарты</div>
        <div class="btn-main" onclick="openCatalog('cpu')">Процессоры</div>
    </div>

    <div id="catalog" class="screen">
        <div class="back-btn" onclick="showScreen('shop')">← НАЗАД</div>
        <div class="header" style="margin: 10px 0;"><h1 id="cat-title">КАТАЛОГ</h1></div>
        <div id="catalog-list"></div>
    </div>

    <div id="details" class="screen">
        <div class="back-btn" onclick="showScreen('catalog')">← К СПИСКУ</div>
        <div id="details-content"></div>
    </div>

    <div id="cart" class="screen">
        <div class="header"><h1>STORAGE // CART</h1></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; opacity:0.2; margin-top:50px;">[ ПУСТО ]</div>
    </div>

    <div id="profile" class="screen">
        <div class="header"><h1>USER // PROFILE</h1></div>
        <div class="btn-main" style="padding: 20px; font-size: 14px;">Мои заказы</div>
        <div class="btn-main" style="padding: 20px; font-size: 14px; opacity: 0.5;">Поддержка</div>
    </div>

</div>

<div class="tab-bar">
    <div class="tab-item active" onclick="switchTab(this, 'shop')">
        <div class="pill"></div>
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="tab-label">Шоп</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'cart')">
        <div class="pill"></div>
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="tab-label">Корзина</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'profile')">
        <div class="pill"></div>
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="tab-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const data = {
        'gpu': [
            { 
                id: 1, name: 'RX 580 4GB', price: 5800, 
                img: 'photo_2026-04-01_13-15-04.jpg',
                desc: 'Бюджетный топ для Full HD.', 
                full: 'Проверенная временем карта. Тянет все современные киберспортивные дисциплины.', 
                tests: [{n:'CS2', v:'120 FPS', p:80}, {n:'Dota 2', v:'140 FPS', p:90}] 
            },
            { 
                id: 2, name: 'RTX 3060 12GB', price: 23000, 
                img: 'https://via.placeholder.com/400x250/1a1a1c/ffffff?text=RTX+3060', 
                desc: 'RTX + DLSS за свои деньги.', 
                full: 'Лучший выбор для комфортной игры с лучами в 1080p и 2K.', 
                tests: [{n:'Cyberpunk', v:'60 FPS', p:85}, {n:'RDR 2', v:'75 FPS', p:80}] 
            }
        ],
        'cpu': [
            { 
                id: 3, name: 'Ryzen 5 5600X', price: 13500, 
                img: 'photo_2026-04-01_13-21-49.jpg',
                desc: 'Король гейминга на AM4.', 
                full: '6 ядер, 12 потоков. Идеальный баланс между скоростью и температурой.', 
                tests: [{n:'Cinebench', v:'11500', p:85}, {n:'Gaming', v:'Elite', p:95}] 
            }
        ]
    };

    let cart = [];

    function showScreen(id) {
        // МГНОВЕННЫЙ СБРОС СКРОЛЛА
        const container = document.getElementById('scroll-container');
        container.scrollTo(0, 0); 
        
        // Переключаем экраны
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });

        const target = document.getElementById(id);
        target.style.display = 'block';
        
        // Небольшая задержка для запуска анимации появления
        setTimeout(() => {
            target.classList.add('active');
        }, 10);

        if(id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function switchTab(el, id) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        showScreen(id);
    }

    function openCatalog(cat) {
        const list = document.getElementById('catalog-list');
        document.getElementById('cat-title').innerText = cat.toUpperCase() + ' // КАТАЛОГ';
        list.innerHTML = '';
        data[cat].forEach(p => {
            list.innerHTML += `
                <div class="product-card" onclick="openDetails('${cat}', ${p.id})">
                    <div class="product-img-box"><img src="${p.img}"></div>
                    <div class="product-info">
                        <div style="font-family:var(--font-premium); font-size:18px; margin-bottom:5px;">${p.name}</div>
                        <div style="font-size:12px; opacity:0.5; margin-bottom:15px;">${p.desc}</div>
                        <div style="font-family:var(--font-premium); font-size:17px;">${p.price.toLocaleString()} ₽</div>
                    </div>
                </div>
            `;
        });
        showScreen('catalog');
    }

    function openDetails(cat, id) {
        const p = data[cat].find(x => x.id === id);
        const cont = document.getElementById('details-content');
        let tHtml = p.tests.map(t => `
            <div class="test-line">
                <span>${t.n}</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <b>${t.v}</b>
                    <div class="bar-bg"><div class="bar-fill" style="width:${t.p}%"></div></div>
                </div>
            </div>
        `).join('');

        cont.innerHTML = `
            <div class="product-card" style="border:none; margin-bottom:20px;">
                <div class="product-img-box" style="height:250px; border-radius:25px;"><img src="${p.img}"></div>
            </div>
            <h2 style="font-family:var(--font-premium); font-size:26px; margin-bottom:12px;">${p.name}</h2>
            <p style="font-size:14px; color:rgba(255,255,255,0.6); line-height:1.6; margin-bottom:25px;">${p.full}</p>
            <div style="font-size:10px; opacity:0.3; margin-bottom:12px; letter-spacing:2px;">BENCHMARK DATA</div>
            ${tHtml}
            <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">В КОРЗИНУ — ${p.price.toLocaleString()} ₽</button>
        `;
        showScreen('details');
    }

    function addToCart(name, price) {
        cart.push({name, price, uid: Date.now()});
        tg.HapticFeedback.notificationOccurred('success');
        tg.MainButton.setText(`ОФОРМИТЬ: ${cart.length} ТОВ.`).show();
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const empty = document.getElementById('cart-empty');
        list.innerHTML = '';
        if(cart.length === 0) { empty.style.display = 'block'; tg.MainButton.hide(); return; }
        empty.style.display = 'none';
        cart.forEach(i => {
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-family:var(--font-premium); font-size:14px;">${i.name}</div>
                        <div style="font-size:12px; opacity:0.5;">${i.price.toLocaleString()} ₽</div>
                    </div>
                    <div style="color:#ff453a; font-size:11px; font-weight:700;" onclick="removeItem(${i.uid})">УДАЛИТЬ</div>
                </div>
            `;
        });
    }

    function removeItem(uid) {
        cart = cart.filter(x => x.uid !== uid);
        renderCart();
        if(cart.length > 0) tg.MainButton.setText(`ОФОРМИТЬ: ${cart.length}`);
    }
</script>

</body>
</html>
