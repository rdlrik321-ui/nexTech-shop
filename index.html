<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #0d0d0f; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body { 
            background-color: var(--main-bg); 
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .logo-box { background: #fff; border-radius: 20px; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; margin: 30px 0; }
        .logo-box img { width: 60%; }
        h1 { font-size: 10px; letter-spacing: 4px; opacity: 0.3; text-transform: uppercase; margin-bottom: 25px; }

        .nav-btn { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 15px; 
            padding: 25px; width: 100%; margin-bottom: 12px; text-align: center; 
            cursor: pointer; position: relative; z-index: 999;
        }
        .nav-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        .nav-btn h2 { margin: 0; font-size: 15px; pointer-events: none; }

        .view-section { display: none; flex-direction: column; gap: 15px; width: 100%; }
        .product-card { background: var(--glass); border: 1px solid var(--border); border-radius: 22px; padding: 20px; text-align: center; }
        .product-card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        
        .buy-action { background: #fff; color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        .go-back { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 10px; margin-bottom: 15px; align-self: flex-start; display: none; cursor: pointer; }
        .cart-status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 15px; border-radius: 30px; font-weight: 800; display: none; width: 80%; text-align: center; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box" id="top-logo"><img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png"></div>
    <button class="go-back" id="back-nav" onclick="toHome()">← НАЗАД</button>
    <h1 id="screen-title">NEXTECH // TERMINAL</h1>
    
    <div id="home-menu" style="width: 100%;">
        <div class="nav-btn" onclick="toPage('gpu')"><h2>ВИДЕОКАРТЫ</h2></div>
        <div class="nav-btn" onclick="toPage('cpu')"><h2>ПРОЦЕССОРЫ</h2></div>
    </div>

    <div class="view-section" id="view-gpu">
        <div class="product-card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/gpu_photo.jpg">
            <h3>Sapphire Nitro+ RX 580</h3>
            <p>5,800 ₽</p>
            <button class="buy-action" onclick="pushToCart('RX 580', 5800)">В КОРЗИНУ</button>
        </div>
    </div>

    <div class="view-section" id="view-cpu">
        <div class="product-card">
            <h3>AMD Ryzen 5 5600X</h3>
            <p>12,500 ₽</p>
            <button class="buy-action" onclick="pushToCart('5600X', 12500)">В КОРЗИНУ</button>
        </div>
    </div>
</div>

<div class="cart-status" id="cart-bar" onclick="sendOrder()">ОФОРМИТЬ (<span id="cart-val">0</span>)</div>

<script>
    const webapp = window.Telegram.WebApp;
    webapp.expand();
    let orderList = [];

    function toPage(id) {
