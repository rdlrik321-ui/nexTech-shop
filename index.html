<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --card: #1c1c1e; /* Цвет карточек в iOS Dark Mode */
            --brd: #38383a; 
            --accent: #0a84ff; /* iOS Blue */
            --text-secondary: #8e8e93;
            --tab-bg: rgba(20, 20, 20, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            overflow: hidden;
            height: 100vh;
        }

        /* КОНТЕЙНЕР ДЛЯ ЭКРАНОВ */
        .app-content {
            position: absolute;
            top: 0; left: 0; right: 0;
            bottom: 84px; /* Место под Tab Bar */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px 20px 40px;
            display: none; 
            background: var(--bg);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active { display: block; z-index: 10; animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* NAVIGATION BAR */
        .nav-header {
            padding-top: env(safe-area-inset-top); /* Отступ под челку */
            margin-bottom: 20px;
        }

        .nav-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }

        /* TAB BAR (iOS Style) */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 84px;
            background: var(--tab-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid var(--brd);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
        }

        .tab-item.active-tab { color: var(--accent); }

        .tab-icon {
            width: 24px; height: 24px;
            margin-bottom: 4px;
            background: currentColor;
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
        }

        /* КАРТОЧКИ ТОВАРОВ */
        .card { 
            background: var(--card); 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 16px; 
        }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 12px; }
        .card h3 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .price { font-size: 17px; color: var(--text-secondary); margin-bottom: 12px; }
        
        .buy-btn { 
            background: var(--accent); color: #fff; border: none; 
            padding: 10px; border-radius: 8px; font-weight: 600; width: 100%; 
        }

        .buy-btn:active { opacity: 0.7; }

    </style>
</head>
<body>

<div class="app-content">
    <div id="shop" class="screen active">
        <div class="nav-header">
            <h1 class="nav-title">Магазин</h1>
        </div>
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg">
            <h3>Sapphire RX 580</h3>
            <div class="price">5,800 ₽</div>
            <button class="buy-btn" onclick="addToCart('RX 580', 5800)">Купить</button>
        </div>
    </div>

    <div id="search" class="screen">
        <div class="nav-header">
            <h1 class="nav-title">Поиск</h1>
        </div>
        <p style="color: var(--text-secondary)">Раздел в разработке...</p>
    </div>

    <div id="cart" class="screen">
        <div class="nav-header">
            <h1 class="nav-title">Корзина</h1>
        </div>
        <div id="cart-items"></div>
        <div id="total-price" style="margin-top: 20px; font-weight: 700; font-size: 20px;"></div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-item active-tab" onclick="switchTab(this, 'shop')">
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span>Шоп</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'search')">
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/622/622669.png')"></div>
        <span>Поиск</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'cart')">
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span>Корзина</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = '#000000';
    tg.headerColor = '#000000';

    let cartData = [];

    function switchTab(el, tabId) {
        // Управление классами табов
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active-tab'));
        el.classList.add('active-tab');

        // Переключение экранов
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        tg.HapticFeedback.impactOccurred('light');

        if(tabId === 'cart') renderCart();
    }

    function addToCart(name, price) {
        cartData.push({name, price});
        tg.HapticFeedback.notificationOccurred('success');
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const totalContainer = document.getElementById('total-price');
        container.innerHTML = '';
        let total = 0;

        if(cartData.length === 0) {
            container.innerHTML = '<p style="color: var(--text-secondary)">Тут пока пусто</p>';
            totalContainer.innerText = '';
            return;
        }

        cartData.forEach(item => {
            total += item.price;
            container.innerHTML += `
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid var(--brd)">
                    <span>${item.name}</span>
                    <span style="font-weight: 600">${item.price} ₽</span>
                </div>
            `;
        });
        totalContainer.innerText = `Итого: ${total} ₽`;
    }
</script>

</body>
</html>
