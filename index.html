<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
    --bg: #0d0d0f;
    --card: rgba(255,255,255,0.04);
    --brd: rgba(255,255,255,0.08);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; justify-content: center; min-height: 100vh; overflow: hidden;
}

.container { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; position: relative; padding: 20px; }

/* Logo / Header */
.logo-area { display: flex; flex-direction: column; align-items: center; margin-top: 40px; }
.logo-img { background: #fff; border-radius: 20px; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
h1 { font-size: 10px; letter-spacing: 4px; opacity: 0.3; text-transform: uppercase; margin-bottom: 30px; }

/* Menu Buttons */
.menu-grid { width: 100%; display: flex; flex-direction: column; gap: 12px; }
.btn-ios {
    background: var(--card); border: 1px solid var(--brd); border-radius: 20px;
    padding: 25px; width: 100%; cursor: pointer; text-align: center;
    transition: transform 0.1s ease, background 0.2s; position: relative; z-index: 10;
}
.btn-ios:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
.btn-ios b { font-size: 16px; letter-spacing: 1px; }

/* Page animations */
.page { display: none; width: 100%; flex-direction: column; position: absolute; top: 0; left: 0; transition: opacity 0.3s ease, transform 0.3s ease; opacity: 0; transform: translateY(50px); }
.page.active { display: flex; opacity: 1; transform: translateY(0); }

/* Card style */
.card-ios { background: var(--card); border: 1px solid var(--brd); border-radius: 28px; padding: 20px; text-align: center; width: 100%; margin-bottom: 20px; }
.card-ios img { width: 100%; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--brd); }
.desc-ios { font-size: 13px; opacity: 0.5; margin-bottom: 10px; }
.price-ios { font-size: 26px; font-weight: 800; margin-bottom: 15px; color: #fff; }
.buy-ios { background: #fff; color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; text-transform: uppercase; cursor: pointer; font-size: 14px; }
.buy-ios:active { transform: scale(0.96); }

/* Back button */
.back-nav { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 15px; }
.btn-back-ios { background: none; border: none; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; padding: 10px 0; display: flex; align-items: center; opacity: 0.6; }
.btn-back-ios:active { opacity: 1; }

/* Floating cart */
.cart-float {
    position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
    background: #fff; color: #000; padding: 18px; border-radius: 35px;
    font-weight: 800; display: flex; justify-content: center; text-align: center;
    width: 85%; z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); transition: bottom 0.3s ease;
}
.cart-float.show { bottom: 25px; }
</style>
</head>
<body>

<div class="container">

<!-- Home page -->
<div id="home" class="page active">
    <div class="logo-area">
        <div class="logo-img"><img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png" width="40"></div>
        <h1>NEXTECH // TERMINAL</h1>
    </div>
    <div class="menu-grid">
        <button class="btn-ios" data-page="gpu"><b>ВИДЕОКАРТЫ</b></button>
        <button class="btn-ios" data-page="cpu"><b>ПРОЦЕССОРЫ</b></button>
    </div>
</div>

<!-- GPU page -->
<div id="gpu" class="page">
    <div class="back-nav">
        <button class="btn-back-ios" data-page="home">← Назад</button>
    </div>
