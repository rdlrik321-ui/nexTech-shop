<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d0f; --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-image: radial-gradient(circle at top, #1a1a1c 0%, #0d0d0f 100%); }
        .container { width: 100%; max-width: 400px; }
        .user-bar { display: flex; justify-content: space-between; background: var(--card-bg); padding: 10px 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); font-size: 12px; opacity: 0.8; }
        .logo-block { background: #fff; border-radius: 20px; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; }
        .logo-block img { width: 70%; }
        h1 { font-size: 11px; letter-spacing: 3px; opacity: 0.4; text-transform: uppercase; text-align: center; }
        .btn-cat { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 25px; width: 100%; margin-bottom: 12px; text-align: center; cursor: pointer; box-sizing: border-box; }
        .btn-cat:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }
        .page { display: none; flex-direction: column; gap: 15px; width: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; }
        .desc { text-align: left; font-size: 13px; opacity: 0.7; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin: 15px 0; }
        .cart-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 15px; border-radius: 30px; font-weight: 800; display: none; width: 80%; text-align: center; z-index: 100; box-shadow: 0 10px 20px #000; }
        .buy { background: #fff; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .back { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 8px 15px; border-radius: 10px; margin-bottom: 15px; align-self: flex-start; display: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="user-bar"><span>ID: <span id="u-id">0</span></span><span id="u-name">USER</span></div>
    <div class="logo-block" id="logo"><img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png"></div>
    <button class="back" id="back" onclick="goHome()">← НАЗАД</button>
    <h1 id="title">NEXTECH // TERMINAL</h1>
    <div id="menu" style="width:100%">
        <div class="btn-cat" onclick="show('gpu')"><h2>ВИДЕОКАРТЫ</h2></div>
        <div class="btn-cat" onclick="show('cpu')"><h2>ПРОЦЕССОРЫ</h2></div>
    </div>
    <div class="page" id="p-gpu">
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/gpu_photo.jpg" style="width:100%;border-radius:12px">
            <div style="font-weight:600;margin-top:15px">Sapphire Nitro+ RX 580</div>
            <div class="desc">• 1411 МГц | 8GB<br>• FurMark: 72°C<br>• Обслужена (MX-4)</div>
            <video controls style="width:100%;border-radius:10px;margin-bottom:15px"><source src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/gpu_test.mp4" type="video/mp4"></video>
            <div style="font-size:24px;font-weight:800;margin-bottom:15px">5,800 ₽</div>
            <button class="buy" onclick="add('RX 580', 5800)">В КОРЗИНУ</button>
        </div>
    </div>
    <div class="page" id="p-cpu">
        <div class="card">
            <div style="font-weight:600">AMD Ryzen 5 5600X</div>
