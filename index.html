<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* БАЗА И ТВОЙ ФОН-СЕТКА */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            background-color: #0d0d0f; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            overflow: hidden; /* Запрещаем скролл боди, будем скроллить контейнер */
        }

        .container { 
            width: 100%; 
            max-width: 380px; 
            margin: 0 auto;
            height: 100vh;
            position: relative;
        }

        /* ПЛАВНЫЕ АНИМАЦИИ (iOS STYLE) */
        .page { 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px;
            padding-bottom: 110px;
            overflow-y: auto;
            opacity: 0;
            transform: scale(0.98) translateY(10px);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page.active { 
            opacity: 1; 
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* ТВОЙ ХЕДЕР */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 40px 0 30px 0;
        }

        .logo-box { 
            background: #fff;
            border-radius: 25px;
            width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        h1 { font-size: 11px; letter-spacing: 4px; opacity: 0.3; text-align: center; }

        /* ТВОИ КНОПКИ ТЕРМИНАЛА */
        .menu-btns { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 22px;
            padding: 22px;
            font-weight: 800; font-size: 16px;
            text-align: center;
            transition: 0.2s;
        }
        .btn:active { background: rgba(255,255,255,0.12); transform: scale(0.97); }

        /* КАРТОЧКА ТОВАРА */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .swiper { width: 100%; height: 180px; border-radius: 18px; margin-bottom: 12px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .price { font-size: 24px; font-weight: 900; margin: 10px 0; }
        .buy {
            background: #fff; color: #000; border: none;
            padding: 18px; border-radius: 18px;
            font-weight: 900; width: 100%;
        }

        /* ХОТБАР (НИЖНЕЕ МЕНЮ) */
        .hotbar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(20, 20, 22, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: rgba(255,255,255,0.2);
            transition: 0.3s;
            padding: 8px 15px;
        }

        .nav-item i { font-size: 24px; }
        .nav-item.active { color: #fff; }

        /* ПОИСК */
        .search {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px 15px;
            width: 100%; color: #fff;
            margin-bottom: 15px; outline: none;
        }

        /* ОТМЕНА ЗАКАЗА */
        .order-box {
            background: rgba(255,255,255,0.03);
            border-radius: 20px; padding: 15px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cancel {
            background: rgba(255, 60, 60, 0.1); color: #ff5e5e;
            border: none; padding: 10px; border-radius: 10px;
            width: 100%; margin-top: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="home" class="page active">
        <div class="header">
            <div class="logo-box">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="55">
            </div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>
        <div class="menu-btns">
            <div class="btn" onclick="openNav('shop')">ОТКРЫТЬ КАТАЛОГ</div>
            <div class="btn" onclick="tg.openLink('https://t.me/your_support')">ПОДДЕРЖКА</div>
        </div>
    </div>

    <div id="shop" class="page">
        <input type="text" class="search" placeholder="ПОИСК ПО КАТАЛОГУ...">
        
        <div class="card">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="gpu1.jpg"></div>
                    <div class="swiper-slide"><img src="gpu2.jpg"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <h2>RX 580 8GB NITRO+</h2>
            <div class="price">5.800₽</div>
            <button class="buy" onclick="addToCart()">В КОРЗИНУ</button>
        </div>
    </div>

    <div id="profile" class="page">
        <h2 style="margin-bottom: 20px;">ПРОФИЛЬ</h2>
        <div class="order-box" id="ord-1">
            <p>ЗАКАЗ #1 — 5 800 ₽</p>
            <button class="cancel" onclick="cancelOrder(1)">ОТМЕНИТЬ</button>
        </div>
    </div>

</div>

<div class="hotbar">
    <div class="nav-item active" onclick="openNav('home', this)">
        <i class="fa-solid fa-terminal"></i>
    </div>
    <div class="nav-item" onclick="openNav('shop', this)">
        <i class="fa-solid fa-house"></i>
    </div>
    <div class="nav-item" onclick="openNav('profile', this)">
        <i class="fa-solid fa-user-circle"></i>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Инициализация Swiper
    new Swiper(".mySwiper", {
        pagination: { el: ".swiper-pagination", dynamicBullets: true },
    });

    // iOS Переходы
    function openNav(id, el) {
        // Убираем активность со всех страниц
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // Включаем нужную страницу
        document.getElementById(id).classList.add('active');

        // Если нажали на иконку хотбара, меняем активную иконку
        if (el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        } else {
            // Если переход через кнопку внутри страницы, обновляем иконку в хотбаре
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(i => i.classList.remove('active'));
            if (id === 'home') navItems[0].classList.add('active');
            if (id === 'shop') navItems[1].classList.add('active');
            if (id === 'profile') navItems[2].classList.add('active');
        }

        tg.HapticFeedback.selectionChanged();
    }

    // Отмена заказа
    function cancelOrder(id) {
        tg.showConfirm("ОТМЕНИТЬ ЭТОТ ЗАКАЗ?", (res) => {
            if(res) {
                const el = document.getElementById(`ord-${id}`);
                el.style.opacity = "0.2";
                el.style.transform = "scale(0.9)";
                el.innerHTML = "<p style='text-align:center'>ОТМЕНЕНО</p>";
                tg.HapticFeedback.notificationOccurred('success');
            }
        });
    }

    function addToCart() {
        tg.HapticFeedback.impactOccurred('medium');
        tg.showAlert('ТОВАР ДОБАВЛЕН!');
    }
</script>

</body>
</html>
