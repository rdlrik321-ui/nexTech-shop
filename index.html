<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; font-size: 14px; opacity: 0.5; margin-bottom: 30px; text-align: center; }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        .card img { 
            width: 85%; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            margin-bottom: 15px;
        }
        
        .title { font-size: 16px; font-weight: 300; opacity: 0.9; margin-bottom: 10px; }
        .price { font-size: 22px; font-weight: 700; margin-bottom: 20px; letter-spacing: 1px; }
        
        .btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            color: #000;
            padding: 12px 40px;
            border-radius: 18px;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEXTECH // TERMINAL</h1>
        
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png">
            <div class="title">Sapphire Nitro+ RX 580</div>
            <div class="price">5,800 ₽</div>
            <button class="btn" onclick="sendOrder('RX 580', 5800)">В корзину</button>
        </div>

        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png">
            <div class="title">AMD Ryzen 5 5600X</div>
            <div class="price">12,500 ₽</div>
            <button class="btn" onclick="sendOrder('Ryzen 5 5600X', 12500)">В корзину</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendOrder(name, price) {
            const data = { item: name, total: price };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
