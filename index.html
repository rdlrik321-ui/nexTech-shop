<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --ios-bg: rgba(20, 20, 22, 0.85);
            --ios-active: #007AFF; /* Стандартный синий iOS */
            --ios-inactive: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            background-color: #0d0d0f; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden; /* Чтобы скроллился только контент */
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            height: calc(100vh - 84px); /* Оставляем место под таббар */
            overflow-y: auto;
            padding-bottom: 40px;
        }

        /* ТВОЙ СТАРЫЙ ДИЗАЙН ХЕДЕРА */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px 0 40px 0;
        }

        .logo-box { 
            background: #fff;
            border-radius: 25px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 11px;
            letter-spacing: 5px;
            opacity: 0.4;
            text-align: center;
        }

        /* ТВОЕ СТАРОЕ МЕНЮ */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 22px;
            padding: 25px;
            font-weight: 800;
            font-size: 17px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.96);
        }

        /* ТАБ БАР КАК В TELEGRAM IOS */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 84px; /* Стандартная высота с учетом Home Indicator */
            background: var(--ios-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            color: var(--ios-inactive);
            text-decoration: none;
            transition: color 0.2s;
        }

        .tab-item.active {
            color: var(--ios-active);
        }

        .tab-icon {
            width: 26px;
            height: 26px;
            margin-bottom: 4px;
            background: currentColor;
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            mask-position: center;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 500;
        }

        /* СТИЛЬ КАРТОЧКИ ТОВАРА ИЗ СТАРОГО КОДА */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
        }
        .card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .price { font-size: 24px; font-weight: 900; margin: 10px 0; color: #fff; }
        .buy { background: #fff; color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: 900; width: 100%; }

    </style>
</head>

<body>

<div class="container">
    <div id="home-page" class="page active">
        <div class="header">
            <div class="logo-box">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="60">
            </div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>

        <div class="menu">
            <div class="card">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg">
                <p>Sapphire RX 580</p>
                <div class="price">5,800 ₽</div>
                <button class="buy" onclick="addToCart('RX 580', 5800)">КУПИТЬ</button>
            </div>
        </div>
    </div>

    <div id="search-page" class="page">
        <div class="header"><h1>SEARCH // MODULE</h1></div>
        <div class="btn">ПОИСК ПО КАТЕГОРИЯМ</div>
    </div>

    <div id="cart-page" class="page">
        <div class="header"><h1>STORAGE // CART</h1></div>
        <div id="cart-content" style="text-align: center; opacity: 0.5;">Тут пока пусто</div>
    </div>
</div>
