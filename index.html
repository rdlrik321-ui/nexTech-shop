<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --grid-color: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.15);
            --tab-bg: rgba(10, 10, 10, 0.8);
            --accent: #ffffff;
            --ios-blue: #007AFF;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
        }

        body {
            background-color: var(--bg-color);
            /* Сетка как на скриншоте */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 35px 35px;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Контентная область с плавными переходами */
        .app-container {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding-bottom: 100px; /* Отступ под Tab Bar */
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.98);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* ЛОГОТИП ИЗ СКРИНШОТА */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            background: #fff;
            width: 100px;
            height: 100px;
            border-radius: 28px; /* iOS Squircle */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .logo-wrapper img {
            width: 65px;
            height: auto;
        }

        .terminal-text {
            font-size: 11px;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* КНОПКИ-ПЛИТКИ ИЗ СКРИНШОТА */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        .menu-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 35px 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .menu-btn:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.97);
        }

        /* ТАБ БАР В СТИЛЕ TELEGRAM/IOS */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 85px;
            background: var(--tab-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            padding-top: 8px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            flex: 1;
            transition: color 0.3s;
        }

        .tab-item.active {
            color: var(--ios-blue);
        }

        .tab-icon {
            width: 26px;
            height: 26px;
            margin-bottom: 4px;
            background: currentColor;
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 500;
        }

    </style>
</head>
<body>

<div class="app-container">
    <div id="catalog" class="screen active">
        <div class="header">
            <div class="logo-wrapper">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" alt="nexTech">
            </div>
            <div class="terminal-text">NEXTECH // TERMINAL</div>
        </div>

        <div class="main-menu">
            <div class="menu-btn">ВИДЕОКАРТЫ</div>
            <div class="menu-btn">ПРОЦЕССОРЫ</div>
        </div>
    </div>

    <div id="cart" class="screen">
        <div class="header">
            <div class="terminal-text">ВАША КОРЗИНА</div>
        </div>
        <p style="text-align: center; opacity: 0.5; margin-top: 50px;">Здесь будет список покупок</p>
    </div>

    <div id="profile" class="screen">
        <div class="header">
            <div class="terminal-text">ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ</div>
        </div>
        <div class="main-menu">
            <div class="menu-btn" style="padding: 20px;">ИСТОРИЯ ЗАКАЗОВ</div>
            <div class="menu-btn" style="padding: 20px;">НАСТРОЙКИ</div>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-item active" onclick="nav('catalog', this)">
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="tab-label">Каталог</span>
    </div>
    <div class="tab-item" onclick="nav('cart', this)">
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="tab-label">Корзина</span>
    </div>
    <div class="tab-item" onclick="nav('profile', this)">
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="tab-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = '#000000';
    tg.headerColor = '#000000';

    function nav(screenId, el) {
        // Убираем активный класс у кнопок
        document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');

        // Переключаем экраны с анимацией
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const activeScreen = document.getElementById(screenId);
        activeScreen.classList.add('active');

        // Легкая тактильная отдача iOS
        tg.HapticFeedback.impactOccurred('light');
    }
</script>

</body>
</html>
