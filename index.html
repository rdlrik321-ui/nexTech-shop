<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0d0d0f; 
            --card: rgba(255, 255, 255, 0.04); 
            --brd: rgba(255, 255, 255, 0.08); 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; overflow: hidden;
        }

        .container { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* Шапка nexTech */
        .logo-area { display: flex; flex-direction: column; align-items: center; width: 100%; transition: opacity 0.3s; margin-top: 40px; }
        .logo-img { background: #fff; border-radius: 20px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { font-size: 10px; letter-spacing: 4px; opacity: 0.3; text-transform: uppercase; margin-bottom: 30px; }

        /* Кнопки меню */
        .menu-grid { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .btn-ios { 
            background: var(--card); border: 1px solid var(--brd); border-radius: 20px; 
            padding: 25px; width: 100%; cursor: pointer; text-align: center;
            transition: transform 0.1s ease, background 0.2s; position: relative; z-index: 10;
        }
        .btn-ios:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .btn-ios b { font-size: 16px; letter-spacing: 1px; display: block; }

        /* Плавное всплытие страниц (iOS Style) */
        .page { display: none; width: 100%; flex-direction: column; position: absolute; top: 0; left: 0; animation: iosSlideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes iosSlideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .card-ios { background: var(--card); border: 1px solid var(--brd); border-radius: 28px; padding: 20px; text-align: center; width: 100%; }
        .card-ios img { width: 100%; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--brd); }
        
        /* Кнопка Назад (Frosted Glass effect) */
        .back-nav { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 15px; }
        .btn-back-ios { 
            background: none; border: none; color: #fff; 
            font-size: 15px; font-weight: 500; cursor: pointer; 
            padding: 10px 0; display: flex; align-items: center; opacity: 0.6;
        }
        .btn-back-ios:active { opacity: 1; }

        .buy-ios { background: #fff; color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; margin-top: 20px; text-transform: uppercase; cursor: pointer; font-size: 14px; }
        .price-ios { font-size: 26px; font-weight: 800; margin: 10px 0; color: #fff; }
        .desc-ios { font-size: 13px; opacity: 0.5; line-height: 1.5; margin-bottom: 12px; }

        .cart-float { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 18px; border-radius: 35px; font-weight: 800; display: none; width: 85%; text-align: center; z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="logo-area">
