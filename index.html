<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root { 
    --bg: #0d0d0f; 
    --card: rgba(255,255,255,0.03); 
    --brd: rgba(255,255,255,0.08); 
}

body {
    margin: 0;
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, sans-serif;
}

.container {
    max-width: 360px;
    margin: 0 auto;
    padding: 20px;
}

/* Страницы */
.page {
    display: none;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.page.active {
    display: flex;
    opacity: 1;
}

/* Логотип */
.logo-box {
    background: #fff;
    border-radius: 20px;
    width: 75px;
    height: 75px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 40px 0 15px;
}

h1 {
    font-size: 10px;
    letter-spacing: 4px;
    opacity: 0.4;
    margin-bottom: 30px;
}

/* Кнопки */
.menu-btn, .buy-btn {
    background: var(--card);
    border: 1px solid var(--brd);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 12px;
    width: 100%;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s;
}

.menu-btn:hover, .buy-btn:hover {
    background: rgba(255,255,255,0.08);
}

.menu-btn:active, .buy-btn:active {
    transform: scale(0.96);
}

/* Карточки */
.card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--brd);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    transition: transform 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
}

/* Кнопка назад */
.btn-back {
    align-self: flex-start;
    margin-bottom: 10px;
    background: none;
    border: none;
    color: #fff;
    opacity: 0.6;
    cursor: pointer;
}

.btn-back:hover {
    opacity: 1;
}

/* Цена */
.price {
    font-size: 22px;
    font-weight: bold;
}

/* Корзина */
.cart-bar {
    position: fixed;
    bottom: -80px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    color: #000;
    padding: 15px;
    border-radius: 30px;
    cursor: pointer;
    transition: bottom 0.3s ease;
}

.cart-bar.show {
    bottom: 20px;
}
</style>
</head>

<body>
<div class="container">

<!-- Главная -->
<div id="home-screen" class="page active">
    <div class="logo-box">
        <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="40">
    </div>
    <h1>NEXTECH // TERMINAL</h1>

    <button class="menu-btn" data-page="gpu">ВИДЕОКАРТЫ</button>
    <button class="menu-btn" data-page="cpu">ПРОЦЕССОРЫ</button>
</div>

<!-- GPU -->
<div id="pg-gpu" class="page">
    <button class="btn-back" data-page="home">← Назад</button>

    <div class="card">
        <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg">
        <div><b>RX 580</b></div>
        <div class="price">5800 ₽</div>
        <button class="buy-btn" data-name="RX 580" data-price="5800">Купить</button>
    </div>
</div>

<!-- CPU -->
<div id="pg-cpu" class="page">
    <button class="btn-back" data-page="home">← Назад</button>

    <div class="card">
        <div><b>Ryzen 5 5600X</b></div>
        <div class="price">12500 ₽</div>
        <button class="buy-btn" data-name="5600X" data-price="12500">Купить</button>
    </div>
</div>

</div>

<div class="cart-bar" id="cart-ui">
Оформить (<span id="count">0</span>)
</div>

    let tg = null;

        tg = window.Telegram.WebApp;
        tg.expand();

    function showPage(id){
        let next = (id==='home') ? 'home-screen' : 'pg-' + id;
        document.getElementById(current).classList.remove('active');
        document.getElementById(next).classList.add('active');
