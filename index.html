<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d0f; --card: rgba(255, 255, 255, 0.04); --brd: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 380px; position: relative; }

        /* Главный экран */
        #home { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .logo-img { background: #fff; border-radius: 20px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin-top: 40px; }
        h1 { font-size: 10px; letter-spacing: 4px; opacity: 0.3; text-transform: uppercase; margin-bottom: 30px; }

        .menu-grid { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .btn-ios { 
            background: var(--card); border: 1px solid var(--brd); border-radius: 20px; 
            padding: 25px; width: 100%; cursor: pointer; text-align: center;
            transition: transform 0.1s; color: #fff; text-decoration: none;
        }
        .btn-ios:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .btn-ios b { font-size: 16px; letter-spacing: 1px; pointer-events: none; }

        /* Страницы */
        .page { display: none; width: 100%; flex-direction: column; animation: iosUp 0.4s ease-out; }
        @keyframes iosUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .card-ios { background: var(--card); border: 1px solid var(--brd); border-radius: 28px; padding: 20px; text-align: center; }
        .card-ios img { width: 100%; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--brd); }
        
        .btn-back { 
            background: none; border: none; color: #fff; opacity: 0.5; 
            font-size: 15px; padding: 15px 0; cursor: pointer; align-self: flex-start;
        }

        .buy-btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; margin-top: 20px; cursor: pointer; }
        .price { font-size: 26px; font-weight: 800; margin: 10px 0; }
        .desc { font-size: 13px; opacity: 0.5; line-height: 1.5; margin-bottom: 12px; }

        .cart-float { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 18px; border-radius: 35px; font-weight: 800; display: none; width: 85%; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

<div class="container">
    <div id="home">
        <div class="logo-img"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="40"></div>
        <h1>NEXTECH // TERMINAL</h1>
        <div class="menu-grid">
            <div class="btn-ios" onclick="go('gpu')"><b>ВИДЕОКАРТЫ</b></div>
            <div class="btn-ios" onclick="go('cpu')"><b>ПРОЦЕССОРЫ</b></div>
        </div>
    </div>

    <div id="pg-gpu" class="page">
        <button class="btn-back" onclick="go('home')">← Назад</button>
        <div class="card-ios">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg">
            <h3>Sapphire Nitro+ RX 580</h3>
            <p class="desc">8GB GDDR5 | 1411 MHz</p>
