<div class="catalog-starter" id="catalog-starter">
            <div class="category-card" onclick="showSection('gpu-section')">
                <h2>ВИДЕОКАРТЫ</h2>
            </div>
            <div class="category-card" onclick="showSection('cpu-section')">
                <h2>ПРОЦЕССОРЫ</h2>
            </div>
        </div>

        <div class="product-section" id="gpu-section">
            <div class="card">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png">
                <div class="price">5,800 ₽</div>
                <button class="btn" onclick="sendOrder('RX 580', 5800)">В корзину</button>
            </div>
        </div>

        <div class="product-section" id="cpu-section">
            <div class="card">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png">
                <div class="price">12,500 ₽</div>
                <button class="btn" onclick="sendOrder('Ryzen 5600X', 12500)">В корзину</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Логика переключения (починено)
        function showSection(sectionId) {
            document.getElementById('catalog-starter').style.display = 'none';
            document.getElementById('logo-block').style.display = 'none';
            document.getElementById('gpu-section').style.display = 'none';
            document.getElementById('cpu-section').style.display = 'none';
            
            document.getElementById(sectionId).style.display = 'flex';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('main-title').innerText = sectionId === 'gpu-section' ? 'NEXTECH // GPU' : 'NEXTECH // CPU';
        }

        function showCatalog() {
            document.getElementById('gpu-section').style.display = 'none';
            document.getElementById('cpu-section').style.display = 'none';
            document.getElementById('catalog-starter').style.display = 'grid';
            document.getElementById('logo-block').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('main-title').innerText = 'NEXTECH // TERMINAL';
        }

        function sendOrder(name, price) {
            tg.sendData(JSON.stringify({item: name, total: price}));
            tg.close();
        }
    </script>
</body>
</html>
