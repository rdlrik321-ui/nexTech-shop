<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --grid-color: rgba(255, 255, 255, 0.03);
            --card-bg: rgba(255, 255, 255, 0.06); 
            --card-border: rgba(255, 255, 255, 0.1);
            --hotbar-bg: rgba(0, 0, 0, 0.92);
            --font-premium: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: var(--font-mono);
            height: 100vh; overflow: hidden;
        }

        /* Контейнер приложения с фиксом скролла */
        #app-viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; overflow-x: hidden; padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .screen {
            display: none; padding: 20px; opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .screen.active { display: block; opacity: 1; transform: translateY(0); }

        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 30px; }
        .logo-box { 
            background: #fff; border-radius: 22px; width: 85px; height: 85px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px;
        }
        .logo-box img { width: 50px; height: auto; }
        h1 { font-size: 10px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

        /* СЛАЙДЕР ФОТО */
        .slider-wrapper { position: relative; width: 100%; margin-bottom: 20px; border-radius: 25px; overflow: hidden; border: 1px solid var(--card-border); }
        .photo-slider {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            background: #1a1a1c; scrollbar-width: none;
        }
        .photo-slider::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; height: 280px; scroll-snap-align: center; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 8px; margin-top: -25px; position: relative; padding-bottom: 15px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.3); }

        /* UI */
        .btn-main {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 22px; padding: 28px; font-family: var(--font-premium);
            font-weight: 700; font-size: 17px; text-align: center;
            text-transform: uppercase; color: #fff; margin-bottom: 15px;
        }
        .product-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 25px; margin-bottom: 20px; overflow: hidden; }
        .preview-img { width: 100%; height: 180px; object-fit: cover; }
        .test-line { display: flex; justify-content: space-between; padding: 14px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; font-size: 12px; }

        /* TAB BAR */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: var(--hotbar-bg); backdrop-filter: blur(20px);
            border-top: 1px solid var(--card-border); display: flex; z-index: 999;
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); position: relative; }
        .tab-item.active { color: #fff; }
        .pill { position: absolute; width: 60px; height: 35px; background: rgba(255,255,255,0.1); border-radius: 18px; top: 15px; opacity: 0; transition: 0.3s; }
        .tab-item.active .pill { opacity: 1; }
        .tab-icon { width: 22px; height: 22px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 25px; }

        .action-btn { background: #fff; color: #000; border: none; padding: 22px; border-radius: 20px; font-family: var(--font-premium); font-weight: 700; width: 100%; font-size: 16px; margin-top: 15px; }
        .pay-btn { background: #34c759; color: #fff; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app-viewport">
    <div id="shop" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>
        <div class="btn-main" onclick="openCat('gpu')">Видеокарты</div>
        <div class="btn-main" onclick="openCat('cpu')">Процессоры</div>
    </div>

    <div id="catalog" class="screen">
        <div onclick="showScreen('shop')" style="opacity:0.4; font-size:11px; margin-bottom:10px;">← НАЗАД</div>
        <h1 id="cat-title" style="margin-bottom:20px;">КАТАЛОГ</h1>
        <div id="cat-list"></div>
    </div>

    <div id="details" class="screen">
        <div onclick="showScreen('catalog')" style="opacity:0.4; font-size:11px; margin-bottom:10px;">← К СПИСКУ</div>
        <div id="details-content"></div>
    </div>

    <div id="cart" class="screen">
        <div class="header"><h1>STORAGE // CART</h1></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; opacity:0.2; margin-top:50px;">ПУСТО</div>
    </div>

    <div id="profile" class="screen">
        <div class="header"><h1>USER // PROFILE</h1></div>
        <div class="btn-main" style="padding:20px; font-size:14px;">Мои заказы</div>
        <div class="btn-main" style="padding:20px; font-size:14px; opacity:0.5;">Поддержка</div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-item active" onclick="switchTab(this, 'shop')">
        <div class="pill"></div>
        <div class="tab-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span style="font-size:9px; position:absolute; bottom:15px; font-weight:700;">ШОП</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'cart')">
        <div class="pill"></div>
        <div class="tab-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span style="font-size:9px; position:absolute; bottom:15px; font-weight:700;">КОРЗИНА</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'profile')">
        <div class="pill"></div>
        <div class="tab-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span style="font-size:9px; position:absolute; bottom:15px; font-weight:700;">ПРОФИЛЬ</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const data = {
        'gpu': [{ id: 1, name: 'RX 580 4GB', price: 5800, imgs: ['photo_2026-04-01_13-15-04.jpg', 'https://via.placeholder.com/400x280/1a1a1c/ffffff?text=BACK'], desc: 'Бюджетный топ.', full: 'Отличное состояние, заменена термопаста.', tests: ['CS2: 120 FPS', 'Dota: 140 FPS'] }],
        'cpu': [{ id: 2, name: 'Ryzen 5 5600X', price: 13500, imgs: ['photo_2026-04-01_13-21-49.jpg', 'https://via.placeholder.com/400x280/1a1a1c/ffffff?text=AM4'], desc: 'Мощный камень.', full: '6 ядер, 12 потоков. Идеально для игр.', tests: ['Cinebench: 11000', 'Gaming: Ultra'] }]
    };

    let cart = [];

    function showScreen(id) {
        // ЖЕСТКИЙ СБРОС СКРОЛЛА
        const viewport = document.getElementById('app-viewport');
        viewport.scrollTo(0, 0); 

        document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
        const target = document.getElementById(id);
        target.style.display = 'block';
        setTimeout(() => target.classList.add('active'), 10);
        if(id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function switchTab(el, id) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        showScreen(id);
    }

    function openCat(cat) {
        const list = document.getElementById('cat-list');
        document.getElementById('cat-title').innerText = cat.toUpperCase();
        list.innerHTML = '';
        data[cat].forEach(p => {
            list.innerHTML += `<div class="product-card" onclick="openItem('${cat}', ${p.id})"><img src="${p.imgs[0]}" class="preview-img"><div style="padding:15px;"><b>${p.name}</b><br>${p.price} ₽</div></div>`;
        });
        showScreen('catalog');
    }

    function openItem(cat, id) {
        const p = data[cat].find(x => x.id === id);
        const cont = document.getElementById('details-content');
        let slides = p.imgs.map(img => `<div class="slide"><img src="${img}"></div>`).join('');
        let dots = p.imgs.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
        
        cont.innerHTML = `
            <div class="slider-wrapper">
                <div class="photo-slider" onscroll="updateDots(this)">${slides}</div>
                <div class="dots">${dots}</div>
            </div>
            <h2>${p.name}</h2>
            <p style="opacity:0.6; margin:15px 0;">${p.full}</p>
            ${p.tests.map(t => `<div class="test-line">${t}</div>`).join('')}
            <button class="action-btn" onclick="addToCart('${p.name}', ${p.price})">В КОРЗИНУ — ${p.price} ₽</button>`;
        showScreen('details');
    }

    function updateDots(el) {
        const i = Math.round(el.scrollLeft / el.offsetWidth);
        el.parentElement.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
    }

    function addToCart(name, price) {
        cart.push({name, price, id: Date.now()});
        tg.HapticFeedback.notificationOccurred('success');
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        if(cart.length === 0) { document.getElementById('cart-empty').style.display='block'; return; }
        document.getElementById('cart-empty').style.display='none';
        let total = 0;
        cart.forEach(i => {
            total += i.price;
            list.innerHTML += `<div style="background:var(--card-bg); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between;">${i.name} <b>${i.price} ₽</b></div>`;
        });
        list.innerHTML += `<div style="text-align:right; margin:15px 0;">ИТОГО: ${total} ₽</div><button class="action-btn pay-btn" onclick="alert('Оплата скоро!')">ОФОРМИТЬ ЗАКАЗ</button>`;
    }
</script>
</body>
</html>
