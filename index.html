<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d0f;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --danger: #ff3b30;
            --success: #34c759;
            --text-main: #f5f5f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 35px 35px;
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; overflow: hidden;
            letter-spacing: -0.3px;
        }

        #viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }

        /* Элементы интерфейса */
        .header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 30px; }
        .brand-text { font-size: 10px; letter-spacing: 5px; opacity: 0.4; font-weight: 700; text-transform: uppercase; }

        .btn-cat {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 25px; font-weight: 700; font-size: 16px; 
            margin-bottom: 12px; cursor: pointer; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }

        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; margin-bottom: 20px; overflow: hidden; }
        .p-img { width: 100%; height: 200px; object-fit: cover; }
        .p-info { padding: 20px; }

        .slider { position: relative; border-radius: 28px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--border); }
        .slider-inner { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slide { flex: 0 0 100%; height: 280px; scroll-snap-align: center; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Навигация */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: rgba(13, 13, 15, 0.96); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); position: relative; }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 22px; height: 22px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 25px; }
        .nav-label { position: absolute; bottom: 18px; font-size: 10px; font-weight: 600; }
        
        .badge { 
            position: absolute; top: 10px; right: 25%; background: var(--danger); 
            color: #fff; font-size: 9px; min-width: 17px; height: 17px; 
            border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid var(--bg);
        }

        .btn-buy { background: #fff; color: #000; border: none; padding: 22px; border-radius: 20px; font-weight: 700; width: 100%; margin-top: 15px; }
        .btn-back { font-size: 11px; opacity: 0.4; padding: 15px 0; cursor: pointer; text-transform: uppercase; }

        /* Стили для истории заказов */
        .order-item { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 10px; }
        .order-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; opacity: 0.5; }
        .order-status { color: var(--success); font-weight: 700; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="scr-home" class="screen active">
        <div class="header"><div class="brand-text">NEXTECH // КАТЕГОРИИ</div></div>
        <div class="btn-cat" onclick="openCat('gpu')">ВИДЕОКАРТЫ <span>→</span></div>
        <div class="btn-cat" onclick="openCat('cpu')">ПРОЦЕССОРЫ <span>→</span></div>
    </div>

    <div id="scr-catalog" class="screen">
        <div class="btn-back" onclick="navigate('home')">← НАЗАД</div>
        <div id="catalog-list"></div>
    </div>

    <div id="scr-item" class="screen">
        <div class="btn-back" onclick="navigate('catalog')">← К СПИСКУ</div>
        <div id="item-details"></div>
    </div>

    <div id="scr-cart" class="screen">
        <div class="header"><div class="brand-text">ВАША КОРЗИНА</div></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; padding:80px; opacity:0.2;">ПУСТО</div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><div class="brand-text">МОЙ ПРОФИЛЬ</div></div>
        <div class="btn-cat" onclick="navigate('history')">📦 История заказов <span>→</span></div>
        <div class="btn-cat" onclick="openSupport()">💬 Поддержка <span>→</span></div>
    </div>

    <div id="scr-history" class="screen">
        <div class="btn-back" onclick="navigate('profile')">← В ПРОФИЛЬ</div>
        <div id="history-list"></div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="tab(this, 'home')">
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="nav-label">Шоп</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'cart')">
        <div id="cart-badge" class="badge">0</div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="nav-label">Корзина</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'profile')">
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="nav-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const db = {
        'gpu': [{ id: 1, name: 'RX 580 4GB', price: 5800, imgs: ['photo_2026-04-01_13-15-04.jpg'], desc: 'Обслужена, новые прокладки.' }],
        'cpu': [{ id: 3, name: 'RYZEN 5 5600X', price: 13200, imgs: ['photo_2026-04-01_13-21-49.jpg'], desc: 'BOX версия, ножки целые.' }]
    };

    let cart = [];
    let orderHistory = JSON.parse(localStorage.getItem('nextech_orders')) || [];

    function navigate(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        if (id === 'history') renderHistory();
        tg.HapticFeedback.impactOccurred('light');
    }

    function tab(el, id) {
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        navigate(id);
    }

    function openCat(cat) {
        const list = document.getElementById('catalog-list');
        list.innerHTML = db[cat].map(p => `
            <div class="p-card" onclick="openItem('${cat}', ${p.id})">
                <img src="${p.imgs[0]}" class="p-img">
                <div class="p-info"><b>${p.name}</b><br><small>${p.price} ₽</small></div>
            </div>`).join('');
        navigate('catalog');
    }

    function openItem(cat, id) {
        const p = db[cat].find(x => x.id === id);
        document.getElementById('item-details').innerHTML = `
            <div class="slider"><div class="slide"><img src="${p.imgs[0]}"></div></div>
            <h2>${p.name}</h2>
            <p style="margin: 15px 0; opacity: 0.6;">${p.desc}</p>
            <button class="btn-buy" onclick="addToCart('${p.name}', ${p.price})">В КОРЗИНУ — ${p.price} ₽</button>`;
        navigate('item');
    }

    function addToCart(name, price) {
        cart.push({name, price, id: Date.now()});
        updateBadge();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function updateBadge() {
        const b = document.getElementById('cart-badge');
        b.innerText = cart.length; b.style.display = cart.length > 0 ? 'flex' : 'none';
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        if (cart.length === 0) { list.innerHTML = ''; document.getElementById('cart-empty').style.display = 'block'; return; }
        document.getElementById('cart-empty').style.display = 'none';
        
        let total = cart.reduce((sum, i) => sum + i.price, 0);
        list.innerHTML = cart.map(i => `
            <div style="background:var(--card); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between;">
                <span>${i.name}</span><b>${i.price} ₽</b>
            </div>`).join('') + `
            <div style="text-align:right; padding:20px;">ИТОГО: <b>${total} ₽</b></div>
            <button class="btn-buy" onclick="checkout()">ОФОРМИТЬ ЗАКАЗ</button>`;
    }

    function checkout() {
        if (cart.length === 0) return;
        const newOrder = {
            id: Math.floor(Math.random() * 10000),
            date: new Date().toLocaleDateString(),
            items: [...cart],
            total: cart.reduce((sum, i) => sum + i.price, 0)
        };
        orderHistory.unshift(newOrder);
        localStorage.setItem('nextech_orders', JSON.stringify(orderHistory));
        cart = [];
        updateBadge();
        tg.showAlert('Заказ принят! Информация сохранена в истории.');
        navigate('home');
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        if (orderHistory.length === 0) { list.innerHTML = '<p style="opacity:0.3; text-align:center; margin-top:50px;">История пуста</p>'; return; }
        
        list.innerHTML = orderHistory.map(o => `
            <div class="order-item">
                <div class="order-header"><span>ЗАКАЗ #${o.id}</span><span>${o.date}</span></div>
                <div style="font-weight:700; margin-bottom:5px;">${o.items.map(i => i.name).join(', ')}</div>
                <div class="order-header"><span class="order-status">ОЖИДАЕТ ОПЛАТЫ</span><b>${o.total} ₽</b></div>
            </div>`).join('');
    }

    function openSupport() {
        // Замени на ссылку на свой аккаунт или бота поддержки
        tg.openTelegramLink('https://t.me/твой_ник'); 
    }

    renderCart();
</script>
</body>
</html>
