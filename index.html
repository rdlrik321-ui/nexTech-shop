<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d0f; --card: rgba(255,255,255,0.03); --brd: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-cat { background: var(--card); border: 1px solid var(--brd); border-radius: 15px; padding: 20px; width: 100%; margin-bottom: 10px; text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn-cat:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }
        .page { display: none; width: 100%; }
        .back { display: none; background: #333; color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <button class="back" id="backBtn" onclick="location.reload()">← ПЕРЕЗАГРУЗИТЬ МЕНЮ</button>
    
    <div id="mainMenu" style="width: 100%;">
        <div class="btn-cat" onclick="openP('gpu')"><h2>ВИДЕОКАРТЫ</h2></div>
        <div class="btn-cat" onclick="openP('cpu')"><h2>ПРОЦЕССОРЫ</h2></div>
    </div>

    <div id="p-gpu" class="page">
        <div style="background: var(--card); padding: 20px; border-radius: 20px; text-align: center;">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg" style="width: 100%; border-radius: 10px;">
            <h3>RX 580 8GB</h3>
            <button style="width: 100%; padding: 15px; background: #fff; border-radius: 10px;" onclick="alert('Добавлено!')">КУПИТЬ</button>
        </div>
    </div>

    <div id="p-cpu" class="page">
        <div style="background: var(--card); padding: 20px; border-radius: 20px; text-align: center;">
            <h3>Ryzen 5 5600X</h3>
            <button style="width: 100%; padding: 15px; background: #fff; border-radius: 10px;" onclick="alert('Добавлено!')">КУПИТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openP(id) {
            // Если это сработает, ты увидишь окно
            console.log('Нажата кнопка:', id);
            
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('p-gpu').style.display = 'none';
            document.getElementById('p-cpu').style.display = 'none';
            
            const target = document.getElementById('p-' + id);
            if (target) {
                target.style.display = 'block';
                document.getElementById('backBtn').style.display = 'block';
            } else {
                alert('Ошибка: страница не найдена');
            }
        }
    </script>
</body>
</html>
