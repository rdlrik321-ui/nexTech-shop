<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d0f;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --danger: #ff3b30;
            --success: #34c759;
            --text-main: #f5f5f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 35px 35px;
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; overflow: hidden;
            letter-spacing: -0.3px;
        }

        #viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }

        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 30px; }
        .logo-box { 
            background: #fff; border-radius: 20px; width: 75px; height: 75px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); margin-bottom: 15px;
        }
        .logo-box img { width: 40px; }
        .brand-text { font-size: 9px; letter-spacing: 4px; opacity: 0.4; font-weight: 700; text-transform: uppercase; }

        /* КАТЕГОРИИ */
        .btn-cat {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 25px 20px; font-weight: 700; font-size: 16px; 
            text-transform: uppercase; margin-bottom: 12px; cursor: pointer; text-align: center;
        }

        /* ПОИСК */
        .search-input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; padding: 14px 18px; color: #fff; font-family: inherit;
            font-size: 14px; outline: none; margin-bottom: 20px;
        }

        /* КАРТОЧКИ */
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 25px; margin-bottom: 20px; overflow: hidden; }
        .p-img { width: 100%; height: 200px; object-fit: cover; }
        .p-info { padding: 18px; }
        .p-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
        .p-price { font-size: 15px; font-weight: 500; opacity: 0.6; }

        /* FPS БАР */
        .fps-box { background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .fps-bar { width: 50px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .fps-fill { height: 100%; background: #fff; }

        /* КНОПКИ (УМЕНЬШЕННЫЕ) */
        .btn-buy { background: #fff; color: #000; border: none; padding: 16px; border-radius: 16px; font-weight: 700; font-size: 14px; width: 100%; margin-top: 15px; cursor: pointer; }
        .btn-back { font-size: 10px; opacity: 0.4; padding: 10px 0; cursor: pointer; text-transform: uppercase; font-weight: 600; }

        /* НАВИГАЦИЯ */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: rgba(13, 13, 15, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); position: relative; }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 20px; height: 20px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 24px; }
        .nav-label { position: absolute; bottom: 18px; font-size: 9px; font-weight: 600; }
        
        .badge { 
            position: absolute; top: 10px; right: 26%; background: var(--danger); 
            color: #fff; font-size: 9px; min-width: 16px; height: 16px; 
            border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid var(--bg);
        }

        .order-item { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="scr-home" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <div class="brand-text">NEXTECH // PREMIUM</div>
        </div>
        <div class="btn-cat" onclick="openCat('gpu')">ВИДЕОКАРТЫ</div>
        <div class="btn-cat" onclick="openCat('cpu')">ПРОЦЕССОРЫ</div>
    </div>

    <div id="scr-catalog" class="screen">
        <div class="btn-back" onclick="navigate('home')">← НАЗАД</div>
        <input type="text" class="search-input" id="search-input" placeholder="Поиск..." oninput="renderCatalog()">
        <div id="catalog-list"></div>
    </div>

    <div id="scr-item" class="screen">
        <div class="btn-back" onclick="navigate('catalog')">← К СПИСКУ</div>
        <div id="item-details"></div>
    </div>

    <div id="scr-cart" class="screen">
        <div class="header"><div class="brand-text">КОРЗИНА</div></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; padding:100px; opacity:0.2;">ПУСТО</div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><div class="brand-text">ПРОФИЛЬ</div></div>
        <div class="btn-cat" style="font-size: 13px; text-align: left; padding: 20px;" onclick="navigate('history')">ИСТОРИЯ ЗАКАЗОВ</div>
        <div class="btn-cat" style="font-size: 13px; text-align: left; padding: 20px;" onclick="openSupport()">ПОДДЕРЖКА</div>
    </div>

    <div id="scr-history" class="screen">
        <div class="btn-back" onclick="navigate('profile')">← В ПРОФИЛЬ</div>
        <div id="history-list"></div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="tab(this, 'home')">
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="nav-label">Магазин</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'cart')">
        <div id="cart-badge" class="badge">0</div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="nav-label">Корзина</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'profile')">
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="nav-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const db = {
        'gpu': [
            { id: 1, name: 'RX 580 4GB NITRO+', price: 5800, imgs: ['photo_2026-04-01_13-15-04.jpg'], desc: 'Легендарная серия NITRO+ от Sapphire. Прошла полное ТО: заменены термопрокладки и паста MX-4.', tests: [{n:'Dota 2', v:'95 FPS', p:75}, {n:'CS2', v:'120 FPS', p:85}] },
            { id: 2, name: 'RTX 3060 12GB', price: 23500, imgs: ['https://via.placeholder.com/800x600/161618/fff?text=RTX+3060'], desc: 'Состояние новой вещи, пломбы на месте. 12GB видеопамяти для любых современных игр.', tests: [{n:'Cyberpunk', v:'65 FPS', p:90}, {n:'Warzone', v:'95 FPS', p:80}] }
        ],
        'cpu': [
            { id: 3, name: 'RYZEN 5 5600X', price: 13200, imgs: ['photo_2026-04-01_13-21-49.jpg'], desc: '6 ядер, 12 потоков. Идеальный игровой процессор. BOX версия с кулером.', tests: [{n:'Игры', v:'Топ', p:95}] }
        ]
    };

    let cart = [];
    let curCat = '';
    let orderHistory = JSON.parse(localStorage.getItem('nextech_orders')) || [];

    function navigate(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        if (id === 'history') renderHistory();
        if (id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function tab(el, id) {
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        navigate(id);
    }

    function openCat(cat) { curCat = cat; renderCatalog(); navigate('catalog'); }

    function renderCatalog() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const list = document.getElementById('catalog-list');
        list.innerHTML = db[curCat].filter(p => p.name.toLowerCase().includes(q)).map(p => `
            <div class="p-card" onclick="openItem('${curCat}', ${p.id})">
                <img src="${p.imgs[0]}" class="p-img">
                <div class="p-info"><div class="p-title">${p.name}</div><div class="p-price">${p.price.toLocaleString()} ₽</div></div>
            </div>`).join('');
    }

    function openItem(cat, id) {
        const p = db[cat].find(x => x.id === id);
        document.getElementById('item-details').innerHTML = `
            <div style="border-radius:25px; overflow:hidden; margin-bottom:20px; border:1px solid var(--border);"><img src="${p.imgs[0]}" style="width:100%;"></div>
            <h2 style="font-size:24px; font-weight:800; margin-bottom:10px;">${p.name}</h2>
            <p style="opacity:0.6; font-size:14px; line-height:1.5; margin-bottom:20px;">${p.desc}</p>
            <div style="font-size:10px; font-weight:700; opacity:0.3; margin-bottom:10px; letter-spacing:1px;">ТЕСТЫ В ИГРАХ</div>
            ${p.tests.map(t => `
                <div class="fps-box"><span>${t.n}</span><div style="display:flex; align-items:center; gap:10px;"><b>${t.v}</b><div class="fps-bar"><div class="fps-fill" style="width:${t.p}%"></div></div></div></div>
            `).join('')}
            <button class="btn-buy" onclick="addToCart('${p.name}', ${p.price})">В КОРЗИНУ — ${p.price.toLocaleString()} ₽</button>`;
        navigate('item');
    }

    function addToCart(name, price) { cart.push({name, price, id: Date.now()}); updateBadge(); tg.HapticFeedback.notificationOccurred('success'); }
    function updateBadge() { const b = document.getElementById('cart-badge'); b.innerText = cart.length; b.style.display = cart.length > 0 ? 'flex' : 'none'; }

    function renderCart() {
        const list = document.getElementById('cart-list');
        if (cart.length === 0) { list.innerHTML = ''; document.getElementById('cart-empty').style.display = 'block'; return; }
        document.getElementById('cart-empty').style.display = 'none';
        let total = cart.reduce((sum, i) => sum + i.price, 0);
        list.innerHTML = cart.map(i => `
            <div style="background:var(--card); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; border: 1px solid var(--border);">
                <span style="font-size:14px;">${i.name}</span><b>${i.price.toLocaleString()} ₽</b>
            </div>`).join('') + `<div style="text-align:right; padding:15px; font-size:20px; font-weight:800;">${total.toLocaleString()} ₽</div>
            <button class="btn-buy" onclick="checkout()">ОФОРМИТЬ ЗАКАЗ</button>`;
    }

    function checkout() {
        const order = { id: Math.floor(Math.random()*10000), date: new Date().toLocaleDateString(), items: [...cart], total: cart.reduce((s,i)=>s+i.price,0) };
        orderHistory.unshift(order);
        localStorage.setItem('nextech_orders', JSON.stringify(orderHistory));
        cart = []; updateBadge(); tg.showAlert('Заказ оформлен!'); navigate('home');
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        if (orderHistory.length === 0) { list.innerHTML = '<p style="text-align:center; opacity:0.2; margin-top:50px;">История пуста</p>'; return; }
        list.innerHTML = orderHistory.map(o => `
            <div class="order-item">
                <div style="display:flex; justify-content:space-between; opacity:0.4; font-size:11px; margin-bottom:6px;"><span>#${o.id}</span><span>${o.date}</span></div>
                <b style="font-size:13px;">${o.items.map(i=>i.name).join(', ')}</b>
                <div style="text-align:right; margin-top:8px; font-weight:700; color:var(--success); font-size:14px;">${o.total.toLocaleString()} ₽</div>
            </div>`).join('');
    }

    function openSupport() { tg.openTelegramLink('https://t.me/твой_ник'); }
</script>
</body>
</html>
