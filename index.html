<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --danger: #ff3b30;
            --text-main: #f0f0f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main); 
            font-family: 'Unbounded', sans-serif; /* ПРЕМИАЛЬНЫЙ ШРИФТ */
            height: 100vh; overflow: hidden;
        }

        #viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; padding: 20px; animation: screenFade 0.4s ease; }
        .screen.active { display: block; }
        @keyframes screenFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin: 50px 0 35px; }
        .logo-box { 
            background: #fff; border-radius: 30px; width: 85px; height: 85px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin-bottom: 20px;
        }
        .logo-box img { width: 45px; }
        .brand-text { font-size: 9px; letter-spacing: 8px; opacity: 0.3; font-weight: 700; text-transform: uppercase; }

        /* SEARCH */
        .search-wrap { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 5px 0 15px; }
        .search-input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px 25px; color: #fff; font-family: 'Unbounded';
            font-size: 12px; outline: none; backdrop-filter: blur(15px);
        }

        /* КАТЕГОРИИ */
        .btn-cat {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 28px; padding: 40px 25px; font-weight: 900; font-size: 18px; 
            text-transform: uppercase; margin-bottom: 16px; cursor: pointer; text-align: center;
            transition: 0.3s;
        }
        .btn-cat:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }

        /* ТОВАРЫ */
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 35px; margin-bottom: 25px; overflow: hidden; }
        .p-img { width: 100%; height: 220px; object-fit: cover; filter: brightness(0.9); }
        .p-info { padding: 25px; }
        .p-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; letter-spacing: -1px; }
        .p-price { font-size: 16px; font-weight: 400; opacity: 0.7; }

        /* СЛАЙДЕР */
        .slider { position: relative; border-radius: 35px; overflow: hidden; margin-bottom: 30px; border: 1px solid var(--border); }
        .slider-inner { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slide { flex: 0 0 100%; height: 320px; scroll-snap-align: center; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 10px; margin-top: -35px; position: relative; padding-bottom: 25px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.5); }

        /* FPS BOX */
        .fps-box { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 22px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .fps-bar { width: 50px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .fps-fill { height: 100%; background: #fff; }

        /* NAV BAR */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px;
            background: rgba(13, 13, 15, 0.9); backdrop-filter: blur(30px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
            padding-bottom: 20px;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); position: relative; }
        .nav-item.active { color: #fff; }
        .nav-pill { position: absolute; width: 55px; height: 34px; background: rgba(255,255,255,0.08); border-radius: 15px; top: 18px; opacity: 0; transition: 0.3s; }
        .nav-item.active .nav-pill { opacity: 1; }
        .nav-icon { width: 20px; height: 20px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 30px; z-index: 2; }
        .nav-label { position: absolute; bottom: 22px; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        
        .badge { 
            position: absolute; top: 15px; right: 25%; background: var(--danger); 
            color: #fff; font-size: 8px; font-weight: 900; min-width: 16px; height: 16px; 
            border-radius: 50%; display: none; align-items: center; justify-content: center; 
            border: 2px solid var(--bg); z-index: 5;
        }

        /* BUTTONS */
        .btn-buy { background: #fff; color: #000; border: none; padding: 26px; border-radius: 26px; font-family: 'Unbounded'; font-weight: 900; font-size: 14px; width: 100%; margin-top: 25px; text-transform: uppercase; }
        .btn-back { font-size: 10px; opacity: 0.3; padding: 15px 0; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }

        .cart-card { background: var(--card); padding: 22px; border-radius: 26px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="viewport">
    <div id="scr-home" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <div class="brand-text">NEXTECH // TERMINAL</div>
        </div>
        <div class="btn-cat" onclick="openCat('gpu')">VIDEO CARDS</div>
        <div class="btn-cat" onclick="openCat('cpu')">PROCESSORS</div>
    </div>

    <div id="scr-catalog" class="screen">
        <div class="btn-back" onclick="navigate('home')">← ESC</div>
        <div class="search-wrap">
            <input type="text" class="search-input" id="search-input" placeholder="SEARCH DATABASE..." oninput="renderCatalog()">
        </div>
        <div id="catalog-list"></div>
    </div>

    <div id="scr-item" class="screen">
        <div class="btn-back" onclick="navigate('catalog')">← BACK</div>
        <div id="item-details"></div>
    </div>

    <div id="scr-cart" class="screen">
        <div class="header"><div class="brand-text">STORAGE // CART</div></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; padding:100px; opacity:0.1; font-size:12px;">[ EMPTY ]</div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><div class="brand-text">AUTHORIZED // USER</div></div>
        <div class="btn-cat" style="padding: 25px; text-align: left; font-size: 12px;">ORDER HISTORY</div>
        <div class="btn-cat" style="padding: 25px; text-align: left; font-size: 12px;">LOYALTY SYSTEM</div>
        <div class="btn-cat" style="padding: 25px; text-align: left; font-size: 12px;">DIRECT SUPPORT</div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="tab(this, 'home')">
        <div class="nav-pill"></div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="nav-label">Shop</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'cart')">
        <div class="nav-pill"></div>
        <div id="cart-badge" class="badge">0</div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="nav-label">Cart</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'profile')">
        <div class="nav-pill"></div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="nav-label">User</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('#0d0d0f');

    const db = {
        'gpu': [
            { id: 1, name: 'RX 580 NITRO+', price: 5800, imgs: ['photo_2026-04-01_13-15-04.jpg', 'https://via.placeholder.com/800x600/161618/fff?text=BACKPLATE'], desc: 'Refurbished to perfection. New thermal pads, original BIOS. Great for 1080p gaming.', tests: [{n:'Dota 2', v:'95 FPS', p:75}, {n:'CS2', v:'120 FPS', p:85}] },
            { id: 2, name: 'RTX 3060 12GB', price: 23500, imgs: ['https://via.placeholder.com/800x600/161618/fff?text=RTX+3060'], desc: 'Factory sealed. Triple fan cooling system. Ray Tracing enabled.', tests: [{n:'Cyberpunk', v:'65 FPS', p:90}, {n:'RDR 2', v:'70 FPS', p:80}] }
        ],
        'cpu': [
            { id: 3, name: 'RYZEN 5 5600X', price: 13200, imgs: ['photo_2026-04-01_13-21-49.jpg'], desc: 'Zen 3 architecture. 6 cores / 12 threads. Gaming beast.', tests: [{n:'Multi-Core', v:'High', p:95}] }
        ]
    };

    let cart = [];
    let curCat = '';

    function navigate(id) {
        document.getElementById('viewport').scrollTo(0,0);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-'+id).classList.add('active');
        if(id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function tab(el, id) {
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        navigate(id);
    }

    function openCat(cat) {
        curCat = cat;
        renderCatalog();
        navigate('catalog');
    }

    function renderCatalog() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const list = document.getElementById('catalog-list');
        list.innerHTML = '';
        db[curCat].filter(p => p.name.toLowerCase().includes(q)).forEach(p => {
            list.innerHTML += `
                <div class="p-card" onclick="openItem('${curCat}', ${p.id})">
                    <img src="${p.imgs[0]}" class="p-img">
                    <div class="p-info">
                        <div class="p-title">${p.name}</div>
                        <div class="p-price">${p.price.toLocaleString()} ₽</div>
                    </div>
                </div>`;
        });
    }

    function openItem(cat, id) {
        const p = db[cat].find(x => x.id === id);
        const area = document.getElementById('item-details');
        let slides = p.imgs.map(s => `<div class="slide"><img src="${s}"></div>`).join('');
        let dots = p.imgs.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
        
        area.innerHTML = `
            <div class="slider"><div class="slider-inner" onscroll="updateDots(this)">${slides}</div><div class="dots">${dots}</div></div>
            <h2 style="font-size:28px; font-weight:900; margin-bottom:15px; letter-spacing:-1.5px;">${p.name}</h2>
            <p style="opacity:0.4; font-size:14px; line-height:1.6; margin-bottom:30px; font-family:'Roboto Mono'">${p.desc}</p>
            ${p.tests.map(t => `
                <div class="fps-box"><span>${t.n}</span><div style="display:flex; align-items:center; gap:12px;"><b>${t.v}</b><div class="fps-bar"><div class="fps-fill" style="width:${t.p}%"></div></div></div></div>
            `).join('')}
            <button class="btn-buy" onclick="addToCart('${p.name}', ${p.price})">ADD TO CART — ${p.price.toLocaleString()} ₽</button>`;
        navigate('item');
    }

    function updateDots(el) {
        const idx = Math.round(el.scrollLeft / el.offsetWidth);
        el.parentElement.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    function addToCart(name, price) {
        cart.push({name, price, uid: Date.now()});
        updateBadge();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function updateBadge() {
        const b = document.getElementById('cart-badge');
        b.innerText = cart.length; b.style.display = cart.length > 0 ? 'flex' : 'none';
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const empty = document.getElementById('cart-empty');
        list.innerHTML = '';
        if(cart.length === 0) { empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        let total = 0;
        cart.forEach(i => {
            total += i.price;
            list.innerHTML += `<div class="cart-card">
                <div><b style="font-size:14px;">${i.name}</b><br><small style="opacity:0.4; font-size:10px;">${i.price.toLocaleString()} ₽</small></div>
                <div onclick="removeCart(${i.uid})" style="color:var(--danger); font-weight:700; font-size:10px; padding:10px;">REMOVE</div>
            </div>`;
        });
        list.innerHTML += `<div style="padding:30px 10px; text-align:right;">
            <div style="opacity:0.3; font-size:10px; margin-bottom:8px; font-weight:700;">TOTAL PAYABLE</div>
            <div style="font-size:28px; font-weight:900;">${total.toLocaleString()} ₽</div>
        </div>
        <button class="btn-buy" style="background:#fff; color:#000;" onclick="alert('Order Processing...')">CHECKOUT</button>`;
    }

    function removeCart(uid) {
        cart = cart.filter(x => x.uid !== uid);
        renderCart(); updateBadge();
        tg.HapticFeedback.impactOccurred('medium');
    }
</script>
</body>
</html>
