<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --grid: rgba(255, 255, 255, 0.03);
            --card: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: 'Roboto Mono', monospace;
            height: 100vh; overflow: hidden;
        }

        #viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; overflow-x: hidden; padding-bottom: 110px;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease forwards; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 30px; }
        .logo-box { 
            background: #fff; border-radius: 26px; width: 95px; height: 95px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.8); margin-bottom: 20px;
        }
        .logo-box img { width: 55px; }
        .brand-label { font-size: 11px; letter-spacing: 7px; opacity: 0.4; text-transform: uppercase; font-weight: 700; }

        /* SEARCH СТИЛЬ ПРЕЖНИЙ */
        .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 5px 0 15px; }
        .search-bar {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 22px; padding: 18px 24px; color: #fff; font-family: 'Roboto Mono';
            font-size: 14px; outline: none; backdrop-filter: blur(15px);
        }

        /* КАТЕГОРИИ */
        .btn-main {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 28px; padding: 35px 25px; font-family: 'Inter';
            font-weight: 900; font-size: 20px; text-transform: uppercase;
            margin-bottom: 16px; cursor: pointer; text-align: center;
        }

        /* КАРТОЧКИ ТОВАРОВ */
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; margin-bottom: 24px; overflow: hidden; }
        .p-img { width: 100%; height: 230px; object-fit: cover; background: #161618; }
        .p-info { padding: 22px; }
        .p-title { font-family: 'Inter'; font-size: 24px; font-weight: 900; margin-bottom: 8px; }
        .p-price { font-size: 19px; font-weight: 700; }

        /* СЛАЙДЕР */
        .slider { position: relative; border-radius: 32px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--border); }
        .slider-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-track::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; height: 320px; scroll-snap-align: center; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 8px; margin-top: -35px; padding-bottom: 25px; position: relative; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.6); }

        /* FPS & SPECS */
        .spec-item { 
            background: rgba(255,255,255,0.03); padding: 18px; border-radius: 20px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .bar-bg { width: 70px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: #fff; }

        /* NAV BAR */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 95px;
            background: rgba(0,0,0,0.97); backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
        }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.35); position: relative; }
        .nav-tab.active { color: #fff; }
        .nav-pill { position: absolute; width: 65px; height: 38px; background: rgba(255,255,255,0.12); border-radius: 20px; top: 15px; opacity: 0; transition: 0.3s; }
        .nav-tab.active .nav-pill { opacity: 1; }
        .nav-icon { width: 24px; height: 24px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 28px; }
        .nav-label { position: absolute; bottom: 18px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .badge { position: absolute; top: 12px; right: 20%; background: #ff3b30; color: #fff; font-size: 9px; font-weight: 800; min-width: 17px; height: 17px; border-radius: 10px; display: none; align-items: center; justify-content: center; border: 2px solid #000; }

        /* КНОПКИ */
        .btn-buy {
            background: #fff; color: #000; border: none; padding: 25px; border-radius: 24px;
            font-family: 'Inter'; font-weight: 900; font-size: 18px; width: 100%; margin-top: 20px;
        }
        .btn-back { font-size: 11px; opacity: 0.4; padding: 15px 0; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        .cart-row { background: var(--card); padding: 22px; border-radius: 24px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="viewport">
    
    <div id="scr-home" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <div class="brand-label">NEXTECH // PREMIUM</div>
        </div>
        <div class="btn-main" onclick="openCat('gpu')">VIDEO CARDS // GPU</div>
        <div class="btn-main" onclick="openCat('cpu')">PROCESSORS // CPU</div>
    </div>

    <div id="scr-catalog" class="screen">
        <div class="btn-back" onclick="nav('home')">← НА ГЛАВНУЮ</div>
        <div class="search-container">
            <input type="text" class="search-bar" id="q" placeholder="Поиск в базе данных..." oninput="renderCat()">
        </div>
        <div id="cat-list"></div>
    </div>

    <div id="scr-item" class="screen">
        <div class="btn-back" onclick="nav('catalog')">← К СПИСКУ</div>
        <div id="item-content"></div>
    </div>

    <div id="scr-cart" class="screen">
        <div class="header"><div class="brand-label">STORAGE // КОРЗИНА</div></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; padding:100px; opacity:0.2; font-size:14px;">[ ПУСТО ]</div>
    </div>

</div>
