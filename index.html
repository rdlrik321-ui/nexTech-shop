<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --grid-color: rgba(255, 255, 255, 0.03);
            --card-bg: rgba(255, 255, 255, 0.05); 
            --card-border: rgba(255, 255, 255, 0.1);
            --hotbar-bg: rgba(0, 0, 0, 0.9);
            --hotbar-pill-bg: rgba(255, 255, 255, 0.1);
            --font-main: 'Roboto Mono', monospace;
            /* ШРИФТ ДЛЯ КНОПОК */
            --font-premium: 'Inter', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
        }

        .app-content {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .screens-wrapper {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        .screen {
            display: none;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px 0 40px 0;
        }

        .logo-box { 
            background: #fff;
            border-radius: 25px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        .logo-box img { width: 60px; height: auto; }

        h1 {
            font-size: 11px;
            letter-spacing: 5px;
            opacity: 0.4;
            text-align: center;
            text-transform: uppercase;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            padding: 28px;
            /* ПРИМЕНЕНИЕ ПРЕМИАЛЬНОГО ШРИФТА */
            font-family: var(--font-premium);
            font-weight: 700;
            font-size: 17px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            width: 100%;
        }

        .btn:active {
            background: rgba(255,255,255,0.12);
            transform: scale(0.97);
        }

        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 90px;
            background: var(--hotbar-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            position: relative;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .tab-item.active { color: #fff; }

        .tab-pill {
            position: absolute;
            width: 60px;
            height: 35px;
            background: var(--hotbar-pill-bg);
            border-radius: 20px;
            opacity: 0;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
            top: 15px;
        }

        .tab-item.active .tab-pill { opacity: 1; }

        .tab-icon {
            width: 24px;
            height: 24px;
            background: currentColor;
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            margin-bottom: 25px;
        }

        .tab-label {
            position: absolute;
            bottom: 15px;
            font-size: 10px;
            font-weight: 500;
            opacity: 0.6;
        }

    </style>
</head>
<body>

<div class="app-content">
    <div class="screens-wrapper">
        
        <div id="shop" class="screen active">
            <div class="header">
                <div class="logo-box">
                    <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" alt="logo">
                </div>
                <h1>NEXTECH // TERMINAL</h1>
            </div>
            <div class="menu">
                <div class="btn" onclick="openCategory('gpu')">Видеокарты</div>
                <div class="btn" onclick="openCategory('cpu')">Процессоры</div>
            </div>
        </div>

        <div id="cart" class="screen">
            <div class="header"><h1>STORAGE // CART</h1></div>
            <p style="text-align: center; opacity: 0.3; margin-top: 50px;">Корзина пуста</p>
        </div>

        <div id="profile" class="screen">
            <div class="header"><h1>USER // PROFILE</h1></div>
            <div class="btn" style="padding: 15px;">Мои заказы</div>
        </div>

    </div>
</div>

<div class="tab-bar">
    <div class="tab-item active" onclick="switchTab(this, 'shop')">
        <div class="tab-pill"></div>
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="tab-label">Шоп</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'cart')">
        <div class="tab-pill"></div>
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="tab-label">Корзина</span>
    </div>
    <div class="tab-item" onclick="switchTab(this, 'profile')">
        <div class="tab-pill"></div>
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="tab-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = '#0d0d0f';
    tg.headerColor = '#0d0d0f';

    function switchTab(el, screenId) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');

        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');

        tg.HapticFeedback.impactOccurred('light');
    }

    function openCategory(type) {
        tg.HapticFeedback.impactOccurred('medium');
    }
</script>

</body>
</html>
