<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212; 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-block {
            background: #ffffff;
            border-radius: 25px;
            padding: 15px;
            width: 120px; height: 120px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
        }
        .logo-block img { width: 100%; height: auto; }

        .catalog-starter { width: 100%; display: grid; gap: 15px; }
        
        .category-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .product-section { display: none; width: 100%; flex-direction: column; gap: 15px; }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
        }

        .btn {
            background: #fff; color: #000; border: none;
            padding: 12px 30px; border-radius: 15px;
            font-weight: 800; text-transform: uppercase; font-size: 11px;
        }
        
        .back-btn { background: none; border: none; color: #fff; font-size: 20px; align-self: flex-start; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="logo-block" id="logo">
        <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png">
    </div>
    
    <button class="back-btn" id="back" onclick="showHome()">← Назад</button>
    <h1 id="title" style="font-size: 14px; opacity: 0.5; letter-spacing: 2px;">NEXTECH // TERMINAL</h1>

    <div class="catalog-starter" id="home">
        <div class="category-card" onclick="openCat('gpu')">ВИДЕОКАРТЫ</div>
        <div class="category-card" onclick="openCat('cpu')">ПРОЦЕССОРЫ</div>
    </div>

    <div class="product-section" id="gpu">
        <div class="card">
            <div style="margin-bottom: 10px;">RX 580 8GB</div>
            <div style="font-weight: bold; margin-bottom: 15px;">5,800 ₽</div>
            <button class="btn" onclick="order('RX 580', 5800)">В корзину</button>
        </div>
    </div>

    <div class="product-section" id="cpu">
        <div class="card">
            <div style="margin-bottom: 10px;">Ryzen 5 5600X</div>
            <div style="font-weight: bold; margin-bottom: 15px;">12,500 ₽</div>
            <button class="btn" onclick="order('5600X', 12500)">В корзину</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openCat(id) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('logo').style.display = 'none';
            document.getElementById(id).style.display = 'flex';
            document.getElementById('back').style.display = 'block';
        }

        function showHome() {
            document.getElementById('gpu').style.display = 'none';
            document.getElementById('cpu').style.display = 'none';
            document.getElementById('home').style.display = 'grid';
            document.getElementById('logo').style.display = 'flex';
            document.getElementById('back').style.display = 'none';
