<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            /* Сетка на фоне для стиля */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }

        /* Логотип */
        .logo-block {
            background: #fff;
            border-radius: 22px;
            width: 90px; height: 90px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .logo-block img { width: 75%; height: auto; }

        h1 { font-size: 11px; letter-spacing: 4px; opacity: 0.4; text-transform: uppercase; margin-bottom: 30px; }

        /* Карточки меню */
        .menu-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 18px;
            padding: 35px 20px;
            width: 100%;
            margin-bottom: 12px;
            text-align: center;
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .menu-card:active { transform: scale(0.97); background: rgba(255,255,255,0.06); }
        .menu-card h2 { margin: 0; font-size: 16px; letter-spacing: 2px; }

        /* Кнопка Назад */
        .back-btn {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff; padding: 8px 16px; border-radius: 10px;
            font-size: 13px; margin-bottom: 20px; display: none;
            cursor: pointer;
        }

        /* Страницы товаров */
        .page { display: none; width: 100%; flex-direction: column; gap: 15px; }
        
        .item-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; text-align: center;
        }

        .item-img {
            width: 100%; border-radius: 15px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .buy-btn {
            background: #fff; color: #000; border: none;
            padding: 12px 35px; border-radius: 12px;
            font-weight: 800; text-transform: uppercase; font-size: 11px;
            margin-top: 15px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-block" id="logo-main">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png">
        </div>
        
        <button class="back-btn" id="btn-back" onclick="goHome()">← НАЗАД</button>
        <h1 id="header-title">NEXTECH // TERMINAL</h1>

        <div id="screen-home" style="width: 100%;">
            <div class="menu-card" onclick="openPage('gpu-page')">
                <h2>ВИДЕОКАРТЫ</h2>
            </div>
            <div class="menu-card" onclick="openPage('cpu-page')">
                <h2>ПРОЦЕССОРЫ</h2>
            </div>
        </div>

        <div class="page" id="gpu-page">
