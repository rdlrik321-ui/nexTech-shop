<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #0d0d0f; color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 20px; text-align: center;
        }
        .container { max-width: 380px; margin: 0 auto; }
        
        /* ЛОГОТИП (Центрированный и большой) */
        .logo-main { 
            background: #fff; border-radius: 25px; 
            width: 90px; height: 90px; 
            margin: 40px auto 10px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 11px; letter-spacing: 4px; opacity: 0.4; margin-bottom: 40px; text-transform: uppercase; }
        
        /* КНОПКИ (iOS Style) */
        .nav-btn { 
            display: block; background: rgba(255,255,255,0.06); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 22px; padding: 25px; margin-bottom: 15px; 
            color: #fff; text-decoration: none; font-weight: bold; font-size: 17px;
            -webkit-appearance: none; cursor: pointer; width: 100%;
        }
        .nav-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.97); }

        .page { display: none; }
        .back-btn { color: #fff; opacity: 0.5; padding: 15px; display: inline-block; cursor: pointer; margin-bottom: 10px; }
        
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; }
        .card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        
        .price { font-size: 26px; font-weight: 800; margin: 15px 0; }
        .buy-btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; }
        
        #cart-notif { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 18px; border-radius: 35px; font-weight: 800; display: none; width: 85%; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <div class="logo-main"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="55"></div>
        <h1>NEXTECH // TERMINAL</h1>
        <button class="nav-btn" onclick="openPage('gpu-page')">ВИДЕОКАРТЫ</button>
        <button class="nav-btn" onclick="openPage('cpu-page')">ПРОЦЕССОРЫ</button>
    </div>

    <div id="gpu-page" class="page">
        <div class="back-btn" onclick="openPage('home-screen')">← НАЗАД</div>
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg">
            <h3>Sapphire RX 580</h3>
            <div class="price">5,800 ₽</div>
            <button class="buy-btn" onclick="addItem('RX 580', 5800)">В КОРЗИНУ</button>
        </div>
    </div>

    <div id="cpu-page" class="page">
        <div class="back-btn" onclick="openPage('home-screen')">← НАЗАД</div>
        <div class="card">
            <h3>Ryzen 5 5600X</h3>
            <div class="price">12,500 ₽</div>
            <button class="buy-btn" onclick="addItem('5600X', 12500)">В КОРЗИНУ</button>
        </div>
    </div>
</div>

<div id="cart-notif" onclick="sendData()">ОФОРМИТЬ (<span id="cart-count">0</span>)</div>
