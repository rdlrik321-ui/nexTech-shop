<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            background-color: #0d0d0f; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 380px; padding: 20px; }

        /* ХЕДЕР */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px 0 40px 0;
        }

        .logo-box { 
            background: #fff;
            border-radius: 25px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }

        h1 { font-size: 12px; letter-spacing: 5px; opacity: 0.4; }

        /* ПОИСК (ВНУТРИ КАТЕГОРИЙ) */
        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 15px 20px;
            margin: 10px 0 20px 0;
            width: 100%;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        /* ГЛАВНОЕ МЕНЮ */
        .menu { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 22px;
            padding: 25px;
            font-weight: 800;
            font-size: 17px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active { background: rgba(255,255,255,0.15); transform: scale(0.96); }

        .page { display: none; }
        .page.active { display: block; }

        /* КАРТОЧКА */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .swiper { width: 100%; height: 200px; border-radius: 15px; margin-bottom: 15px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .price { font-size: 28px; font-weight: 900; margin: 15px 0; }

        .buy {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
        }

        .back { color: rgba(255,255,255,0.5); padding: 15px 0; display: block; cursor: pointer; text-align: center; font-size: 14px; font-weight: bold;}

        /* КОРЗИНА */
        #cart-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 40px;
            font-weight: 900;
            display: none;
            width: 85%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="page active">
        <div class="header">
            <div class="logo-box">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="60">
            </div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>

        <div class="menu">
            <div class="btn" onclick="openPage('gpu-list')">ВИДЕОКАРТЫ</div>
            <div class="btn" onclick="openPage('cpu-list')">ПРОЦЕССОРЫ</div>
        </div>
    </div>

    <div id="gpu-list" class="page">
        <div class="back" onclick="openPage('home')">← НАЗАД В ТЕРМИНАЛ</div>
        
        <input type="text" class="search-box" placeholder="ПОИСК ВИДЕОКАРТЫ...">
        
        <div class="card">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="gpu1.jpg"></div>
                    <div class="swiper-slide"><img src="gpu2.jpg"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <h2>Sapphire Nitro+ RX 580</h2>
            <div class="price">5 800 ₽</div>
            <button class="buy" onclick="addToCart()">В КОРЗИНУ</button>
        </div>
    </div>

    <div id="cpu-list" class="page">
        <div class="back" onclick="openPage('home')">← НАЗАД В ТЕРМИНАЛ</div>
        
        <input type="text" class="search-box" placeholder="ПОИСК ПРОЦЕССОРА...">
        
        <div class="card">
            <p style="opacity: 0.5;">ПРОЦЕССОРЫ В ПУТИ...</p>
        </div>
    </div>
</div>

<div id="cart-bar" onclick="tg.showAlert('Оформление заказа скоро будет доступно!')">
    КОРЗИНА: <span id="cart-count">0</span> ТОВАРОВ
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let count = 0;

    new Swiper(".mySwiper", {
        pagination: { el: ".swiper-pagination", dynamicBullets: true },
    });

    function openPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    function addToCart() {
        count++;
        document.getElementById('cart-count').innerText = count;
        document.getElementById('cart-bar').style.display = 'block';
        tg.HapticFeedback.impactOccurred('medium');
    }
</script>

</body>
</html>
