<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0d0f; --card: rgba(255, 255, 255, 0.03); --brd: rgba(255, 255, 255, 0.08); }
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .logo-block { background: #fff; border-radius: 20px; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; margin: 40px 0 20px 0; }
        .logo-block img { width: 70%; }
        h1 { font-size: 11px; letter-spacing: 3px; opacity: 0.4; text-transform: uppercase; text-align: center; margin-bottom: 30px; }

        .btn-cat { 
            background: var(--card); border: 1px solid var(--brd); border-radius: 18px; 
            padding: 22px; width: 100%; margin-bottom: 12px; text-align: center; 
            cursor: pointer; box-sizing: border-box; transition: 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .btn-cat:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.07); }
        .btn-cat h2 { margin: 0; font-size: 16px; pointer-events: none; }

        .page { display: none; flex-direction: column; gap: 15px; width: 100%; }
        .card { background: var(--card); border: 1px solid var(--brd); border-radius: 24px; padding: 20px; text-align: center; box-sizing: border-box; }
        .card img { width: 100%; border-radius: 16px; margin-bottom: 15px; }
        .desc { text-align: left; font-size: 13px; opacity: 0.7; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 14px; margin: 15px 0; line-height: 1.5; }
        
        .buy-btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--brd); color: #fff; padding: 10px 18px; border-radius: 12px; margin-bottom: 20px; align-self: flex-start; display: none; cursor: pointer; }
        .cart-float { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 16px; border-radius: 30px; font-weight: 800; display: none; width: 80%; text-align: center; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-block" id="logo-top"><img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png"></div>
    <button class="back-btn" id="btn-back" onclick="goHome()">← НАЗАД</button>
    <h1 id="header-main">NEXTECH // TERMINAL</h1>
    
    <div id="menu-box" style="width: 100%;">
        <div class="btn-cat" onclick="showPage('gpu')"><h2>ВИДЕОКАРТЫ</h2></div>
        <div class="btn-cat" onclick="showPage('cpu')"><h2>ПРОЦЕССОРЫ</h2></div>
    </div>

    <div class="page" id="page-gpu">
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/gpu_photo.jpg">
            <h3>Sapphire Nitro+ RX 580</h3>
            <div class="desc">• 8GB GDDR5 | 72°C<br>• Обслужена, заменена паста.</div>
            <div style="font-size: 24px; font-weight: 800; margin-bottom: 15px;">5,800 ₽</div>
            <button class="buy-btn" onclick="add('RX 580', 5800)">В КОРЗИНУ</button>
        </div>
    </div>

    <div class="page" id="page-cpu">
        <div class="card">
            <h3>AMD Ryzen 5 5600X</h3>
