<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #0d0d0f; color: #fff; font-family: sans-serif; 
            margin: 0; padding: 20px; text-align: center;
        }
        .logo-img { background: #fff; border-radius: 15px; width: 65px; height: 65px; margin: 20px auto; display: flex; justify-content: center; align-items: center; }
        h1 { font-size: 10px; letter-spacing: 3px; opacity: 0.4; margin-bottom: 30px; }

        /* КНОПКИ МЕНЮ - СДЕЛАЛИ МАКСИМАЛЬНО ПРОСТЫМИ */
        .menu-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; padding: 20px; margin-bottom: 10px; width: 100%;
            cursor: pointer; display: block; -webkit-tap-highlight-color: transparent;
        }
        .menu-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.98); }
        .menu-btn b { font-size: 16px; pointer-events: none; }

        .page { display: none; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; }
        .buy-btn { background: #fff; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; margin-top: 15px; }
        .back-btn { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="home">
        <div class="logo-img"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="40"></div>
        <h1>NEXTECH // TERMINAL</h1>
        
        <div class="menu-btn" onclick="openP('gpu')"><b>ВИДЕОКАРТЫ</b></div>
        <div class="menu-btn" onclick="openP('cpu')"><b>ПРОЦЕССОРЫ</b></div>
    </div>

    <div id="pg-gpu" class="page">
        <button class="back-btn" onclick="openP('home')">← НАЗАД</button>
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg" style="width:100%; border-radius:10px;">
            <h3>Sapphire RX 580</h3>
            <p>5,800 ₽</p>
            <button class="buy-btn" onclick="add('RX 580', 5800)">В КОРЗИНУ</button>
        </div>
    </div>

    <div id="pg-cpu" class="page">
        <button class="back-btn" onclick="openP('home')">← НАЗАД</button>
        <div class="card">
            <h3>Ryzen 5 5600X</h3>
            <p>12,500 ₽</p>
            <button class="buy-btn" onclick="add('5600X', 12500)">В КОРЗИНУ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openP(id) {
            // Скрываем всё
            document.getElementById('home').style.display = 'none';
            document.getElementById('pg-gpu').style.display = 'none';
            document.getElementById('pg-cpu').style.display = 'none';

            // Показываем нужное
            if (id === 'home') {
                document.getElementById('home').style.display = 'block';
            } else {
                document.getElementById('pg-' + id).style.display = 'block';
            }
        }

        function add(name, price) {
            tg.HapticFeedback.impactOccurred('medium');
            alert('Добавлено: ' + name);
        }
    </script>
</body>
</html>
