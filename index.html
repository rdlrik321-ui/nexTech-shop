<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d0f;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --danger: #ff3b30;
            --success: #34c759;
            --text-main: #f5f5f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 35px 35px;
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; overflow: hidden;
            letter-spacing: -0.3px;
        }

        #viewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }

        /* HEADER С ЛОГОТИПОМ */
        .header { display: flex; flex-direction: column; align-items: center; margin: 50px 0 35px; }
        .logo-box { 
            background: #fff; border-radius: 24px; width: 85px; height: 85px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); margin-bottom: 20px;
        }
        .logo-box img { width: 45px; }
        .brand-text { font-size: 10px; letter-spacing: 5px; opacity: 0.4; font-weight: 700; text-transform: uppercase; }

        /* ПОИСК */
        .search-wrap { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 5px 0 15px; }
        .search-input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 18px 22px; color: #fff; font-family: inherit;
            font-size: 15px; outline: none; backdrop-filter: blur(15px);
        }

        /* КАТЕГОРИИ */
        .btn-cat {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 35px 25px; font-weight: 700; font-size: 19px; 
            text-transform: uppercase; margin-bottom: 16px; cursor: pointer; text-align: center;
        }

        /* КАРТОЧКИ */
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 30px; margin-bottom: 25px; overflow: hidden; }
        .p-img { width: 100%; height: 220px; object-fit: cover; }
        .p-info { padding: 22px; }
        .p-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .p-price { font-size: 17px; font-weight: 500; opacity: 0.6; }

        /* СЛАЙДЕР */
        .slider { position: relative; border-radius: 30px; overflow: hidden; margin-bottom: 30px; border: 1px solid var(--border); }
        .slider-inner { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slide { flex: 0 0 100%; height: 320px; scroll-snap-align: center; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 8px; margin-top: -30px; position: relative; padding-bottom: 25px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.4); }

        /* НАВИГАЦИЯ */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 95px;
            background: rgba(13, 13, 15, 0.95); backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); position: relative; }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 22px; height: 22px; background: currentColor; mask-size: contain; -webkit-mask-image: var(--i); margin-bottom: 28px; }
        .nav-label { position: absolute; bottom: 20px; font-size: 10px; font-weight: 600; }
        
        .badge { 
            position: absolute; top: 12px; right: 24%; background: var(--danger); 
            color: #fff; font-size: 9px; min-width: 17px; height: 17px; 
            border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid var(--bg);
        }

        .btn-buy { background: #fff; color: #000; border: none; padding: 24px; border-radius: 22px; font-weight: 700; font-size: 16px; width: 100%; margin-top: 20px; }
        .btn-back { font-size: 11px; opacity: 0.4; padding: 15px 0; cursor: pointer; text-transform: uppercase; font-weight: 600; }

        .order-item { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="scr-home" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <div class="brand-text">NEXTECH // PREMIUM</div>
        </div>
        <div class="btn-cat" onclick="openCat('gpu')">ВИДЕОКАРТЫ</div>
        <div class="btn-cat" onclick="openCat('cpu')">ПРОЦЕССОРЫ</div>
    </div>

    <div id="scr-catalog" class="screen">
        <div class="btn-back" onclick="navigate('home')">← НАЗАД</div>
        <div class="search-wrap">
            <input type="text" class="search-input" id="search-input" placeholder="Поиск в базе..." oninput="renderCatalog()">
        </div>
        <div id="catalog-list"></div>
    </div>

    <div id="scr-item" class="screen">
        <div class="btn-back" onclick="navigate('catalog')">← К СПИСКУ</div>
        <div id="item-details"></div>
    </div>

    <div id="scr-cart" class="screen">
        <div class="header"><div class="brand-text">КОРЗИНА</div></div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; padding:100px; opacity:0.2;">ПУСТО</div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><div class="brand-text">ПРОФИЛЬ</div></div>
        <div class="btn-cat" style="font-size: 14px; text-align: left;" onclick="navigate('history')">ИСТОРИЯ ЗАКАЗОВ</div>
        <div class="btn-cat" style="font-size: 14px; text-align: left;" onclick="openSupport()">ПОДДЕРЖКА</div>
    </div>

    <div id="scr-history" class="screen">
        <div class="btn-back" onclick="navigate('profile')">← В ПРОФИЛЬ</div>
        <div id="history-list"></div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="tab(this, 'home')">
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
        <span class="nav-label">Магазин</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'cart')">
        <div id="cart-badge" class="badge">0</div>
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="nav-label">Корзина</span>
    </div>
    <div class="nav-item" onclick="tab(this, 'profile')">
        <div class="nav-icon" style="--i: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
        <span class="nav-label">Профиль</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const db = {
        'gpu': [
            { id: 1, name: 'RX 580 4GB NITRO+', price: 5800, imgs: ['photo_2026-04-01_13-15-04.jpg'], desc: 'Легендарная серия NITRO+ от Sapphire. Прошла полное ТО: заменены термопрокладки и паста MX-4. Идеальна для онлайн-проектов.' },
            { id: 2, name: 'RTX 3060 12GB', price: 23500, imgs: ['https://via.placeholder.com/800x600/161618/fff?text=RTX+3060'], desc: 'Современная видеокарта с 12GB видеопамяти. Поддержка Ray Tracing и DLSS. Состояние новой вещи, пломбы на месте.' }
        ],
        'cpu': [
            { id: 3, name: 'RYZEN 5 5600X', price: 13200, imgs: ['photo_2026-04-01_13-21-49.jpg'], desc: '6 ядер, 12 потоков, архитектура Zen 3. Идеальный игровой процессор. BOX версия с кулером в комплекте.' }
        ]
    };

    let cart = [];
    let curCat = '';
    let orderHistory = JSON.parse(localStorage.getItem('nextech_orders')) || [];

    function navigate(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        if (id === 'history') renderHistory();
        if (id === 'cart') renderCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function tab(el, id) {
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        navigate(id);
    }

    function openCat(cat) {
        curCat = cat;
        renderCatalog();
        navigate('catalog');
    }

    function renderCatalog() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const list = document.getElementById('catalog-list');
        list.innerHTML = db[curCat].filter(p => p.name.toLowerCase().includes(q)).map(p => `
            <div class="p-card" onclick="openItem('${curCat}', ${p.id})">
                <img src="${p.imgs[0]}" class="p-img">
                <div class="p-info"><div class="p-title">${p.name}</div><div class="p-price">${p.price.toLocaleString()} ₽</div></div>
            </div>`).join('');
    }

    function openItem(cat, id) {
        const p = db[cat].find(x => x.id === id);
        document.getElementById('item-details').innerHTML = `
            <div class="slider"><div class="slide"><img src="${p.imgs[0]}"></div></div>
            <h2 style="font-size:28px; font-weight:800; margin-bottom:12px;">${p.name}</h2>
            <p style="opacity:0.6; font-size:15px; line-height:1.6; margin-bottom:30px;">${p.desc}</p>
            <button class="btn-buy" onclick="addToCart('${p.name}', ${p.price})">В КОРЗИНУ — ${p.price.toLocaleString()} ₽</button>`;
        navigate('item');
    }

    function addToCart(name, price) {
        cart.push({name, price, id: Date.now()});
        updateBadge();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function updateBadge() {
        const b = document.getElementById('cart-badge');
        b.innerText = cart.length; b.style.display = cart.length > 0 ? 'flex' : 'none';
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        if (cart.length === 0) { list.innerHTML = ''; document.getElementById('cart-empty').style.display = 'block'; return; }
        document.getElementById('cart-empty').style.display = 'none';
        let total = cart.reduce((sum, i) => sum + i.price, 0);
        list.innerHTML = cart.map(i => `
            <div style="background:var(--card); padding:20px; border-radius:20px; margin-bottom:10px; display:flex; justify-content:space-between; border: 1px solid var(--border);">
                <span>${i.name}</span><b>${i.price.toLocaleString()} ₽</b>
            </div>`).join('') + `<div style="text-align:right; padding:20px; font-size:24px; font-weight:800;">${total.toLocaleString()} ₽</div>
            <button class="btn-buy" onclick="checkout()">ОФОРМИТЬ ЗАКАЗ</button>`;
    }

    function checkout() {
        const order = { id: Math.floor(Math.random()*10000), date: new Date().toLocaleDateString(), items: [...cart], total: cart.reduce((s,i)=>s+i.price,0) };
        orderHistory.unshift(order);
        localStorage.setItem('nextech_orders', JSON.stringify(orderHistory));
        cart = []; updateBadge();
        tg.showAlert('Заказ оформлен!'); navigate('home');
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        if (orderHistory.length === 0) { list.innerHTML = '<p style="text-align:center; opacity:0.2; margin-top:50px;">История пуста</p>'; return; }
        list.innerHTML = orderHistory.map(o => `
            <div class="order-item">
                <div style="display:flex; justify-content:space-between; opacity:0.4; font-size:12px; margin-bottom:8px;"><span>#${o.id}</span><span>${o.date}</span></div>
                <b>${o.items.map(i=>i.name).join(', ')}</b>
                <div style="text-align:right; margin-top:10px; font-weight:700; color:var(--success);">${o.total.toLocaleString()} ₽</div>
            </div>`).join('');
    }

    function openSupport() { tg.openTelegramLink('https://t.me/твой_ник'); }
</script>
</body>
</html>
