            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openP(id) {
            document.getElementById('h-m').style.display = 'none';
            document.getElementById('l-b').style.display = 'none';
            document.getElementById('gpu').style.display = 'none';
            document.getElementById('cpu').style.display = 'none';
            
            document.getElementById(id).style.display = 'flex';
            document.getElementById('b-b').style.display = 'block';
            document.getElementById('t-m').innerText = 'NEXTECH // ' + id.toUpperCase();
        }

        function toHome() {
            document.getElementById('gpu').style.display = 'none';
            document.getElementById('cpu').style.display = 'none';
            document.getElementById('b-b').style.display = 'none';
            document.getElementById('h-m').style.display = 'block';
            document.getElementById('l-b').style.display = 'flex';
            document.getElementById('t-m').innerText = 'NEXTECH // TERMINAL';
        }

        function order(n, p) {
            tg.sendData(JSON.stringify({item: n, total: p}));
            tg.close();
        }
    </script>
</body>
</html>
