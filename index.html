<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* ТВОЙ СТИЛЬ: ТЕРМИНАЛ */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background-color: #0d0d0f; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        .container { width: 100%; max-width: 380px; margin: 0 auto; height: 100vh; position: relative; }

        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; padding-bottom: 110px;
            opacity: 0; transform: translateY(15px);
            pointer-events: none; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        .page.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .header { display: flex; flex-direction: column; align-items: center; margin: 50px 0 40px 0; }
        .logo-box { 
            background: #fff; border-radius: 25px; width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 15px;
        }
        h1 { font-size: 11px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px; padding: 20px;
            text-align: center; margin-bottom: 20px;
            cursor: pointer;
        }
        .card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }

        .price { font-size: 24px; font-weight: 900; margin-top: 10px; }
        .buy { background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; width: 100%; cursor: pointer; }

        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 15px; width: 100%; color: #fff; margin-bottom: 25px; outline: none; }
        .back { color: rgba(255,255,255,0.5); padding: 15px 0; display: block; text-align: center; font-weight: 800; font-size: 13px; cursor: pointer; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0d0f; z-index: 3000; display: none;
            padding: 20px; overflow-y: auto;
        }
        .modal.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .profile-section {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px; padding: 20px; margin-bottom: 15px; text-align: left;
        }
        .section-label { font-weight: 900; font-size: 12px; opacity: 0.4; text-transform: uppercase; margin-bottom: 8px; display: block; }

        .hotbar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(15, 15, 17, 0.95); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 35px;
            display: flex; justify-content: space-around; padding: 12px; z-index: 2000;
        }
        .nav-item { color: rgba(255,255,255,0.2); font-size: 22px; transition: 0.3s; }
        .nav-item.active { color: #fff; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="home" class="page active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="60"></div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>
        <div class="card" style="padding: 25px;" onclick="openPage('gpu-list')"><b>ВИДЕОКАРТЫ</b></div>
        <div class="card" style="padding: 25px;" onclick="openPage('cpu-list')"><b>ПРОЦЕССОРЫ</b></div>
    </div>

    <div id="gpu-list" class="page">
        <div class="back" onclick="openPage('home')">← ТЕРМИНАЛ</div>
        <input type="text" class="search-box" placeholder="ПОИСК...">
        <div class="card" onclick="openProduct('RX 580 Nitro+', 5800, 'gpu1.jpg', '<b>Технические характеристики:</b><br>• Объем памяти: 8GB GDDR5<br>• Шина: 256-bit (Samsung чипы)<br>• Частота ядра: 1411 MHz<br><br><b>Состояние и тесты:</b><br>• Полностью обслужена, заменена термопаста на Arctic MX-4.<br>• В стресс-тесте FurMark держит стабильные 67°C при умеренных оборотах.<br>• В играх (CS2, Dota 2) показывает отличный FPS и плавную картинку.<br>• Визуально в идеале, кулеры не шумят, без посторонних звуков.')">
            <img src="gpu1.jpg">
            <h3>Sapphire Nitro+ RX 580</h3>
            <div class="price">5 800 ₽</div>
        </div>
    </div>

    <div id="cpu-list" class="page">
        <div class="back" onclick="openPage('home')">← ТЕРМИНАЛ</div>
        <input type="text" class="search-box" placeholder="ПОИСК...">
        <div class="card" onclick="openProduct('Ryzen 5 5600X', 12500, 'cpu1.jpg', '<b>Технические характеристики:</b><br>• Ядер: 6 | Потоков: 12<br>• Базовая частота: 3.7 GHz<br>• Turbo Boost: до 4.6 GHz<br>• Сокет: AM4 | L3 Кэш: 32MB<br><br><b>Особенности:</b><br>• Топовый процессор для гейминга и рабочих задач.<br>• Разблокированный множитель для легкого разгона.<br>• Холодный и производительный, протестирован в OCCT на стабильность вольтажа.<br>• Ножки все ровные, состояние нового.')">
            <img src="cpu1.jpg">
            <h3>AMD Ryzen 5 5600X</h3>
            <div class="price">12 500 ₽</div>
        </div>
    </div>

    <div id="cart" class="page">
        <h2 style="margin-bottom: 20px; font-weight: 800;">КОРЗИНА</h2>
        <div class="profile-section" id="cart-content">
            <p style="opacity: 0.4;">Тут пока пусто...</p>
        </div>
        <div id="cart-footer" style="display:none;">
            <div class="price" id="total-price" style="margin-bottom:20px;">0 ₽</div>
            <button class="buy" onclick="tg.showAlert('Заказ оформлен!')">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <div id="profile" class="page">
        <h2 style="margin-bottom: 20px; font-weight: 800;">ПРОФИЛЬ</h2>
        <div class="profile-section">
            <span class="section-label">О нас</span>
            <p style="font-size: 14px;">Тестируем всё в OCCT и FurMark. Гарантия на проверку — 3 дня.</p>
        </div>
        <div class="profile-section">
            <span class="section-label">Заказы</span>
            <p style="font-size: 14px; opacity: 0.4;">История пуста.</p>
        </div>
        <div class="profile-section">
            <span class="section-label">Поддержка</span>
            <button class="buy" style="margin-top: 10px; padding: 15px;" onclick="tg.openTelegramLink('https://t.me/support')">СВЯЗАТЬСЯ</button>
        </div>
    </div>
</div>

<div id="product-modal" class="modal">
    <div class="back" onclick="closeProduct()">✕ ЗАКРЫТЬ</div>
    <div id="modal-content"></div>
</div>

<div class="hotbar">
    <div class="nav-item active" id="nav-home" onclick="openPage('home')"><i class="fa-solid fa-terminal"></i></div>
    <div class="nav-item" id="nav-cart" onclick="openPage('cart')"><i class="fa-solid fa-cart-shopping"></i></div>
    <div class="nav-item" id="nav-profile" onclick="openPage('profile')"><i class="fa-solid fa-user"></i></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let cartItems = [];

    function openPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(['home', 'gpu-list', 'cpu-list'].includes(id)) document.getElementById('nav-home').classList.add('active');
        else document.getElementById('nav-' + id).classList.add('active');
        if(id === 'cart') renderCart();
        tg.HapticFeedback.selectionChanged();
    }

    function openProduct(name, price, img, desc) {
        document.getElementById('modal-content').innerHTML = `
            <img src="${img}" style="width:100%; border-radius:25px; margin-top:20px;">
            <h2 style="font-size:28px; margin-top:20px; text-align:center;">${name}</h2>
            <div class="profile-section" style="margin:20px 0; font-size: 14px; line-height: 1.6;">${desc}</div>
            <div class="price" style="text-align:center; font-size:32px; margin-bottom:20px;">${price} ₽</div>
            <button class="buy" onclick="addToCart('${name}', ${price})">ДОБАВИТЬ В КОРЗИНУ</button>
        `;
        document.getElementById('product-modal').classList.add('active');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function closeProduct() { document.getElementById('product-modal').classList.remove('active'); }

    function addToCart(name, price) {
        cartItems.push({name, price});
        tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert(name + ' добавлен!');
        closeProduct();
    }

    function renderCart() {
        const container = document.getElementById('cart-content');
        const footer = document.getElementById('cart-footer');
        if(cartItems.length === 0) {
            container.innerHTML = '<p style="opacity: 0.4;">Тут пока пусто...</p>';
            footer.style.display = 'none';
        } else {
            let total = 0;
            container.innerHTML = cartItems.map((item, index) => {
                total += item.price;
                return `<div class="cart-item"><span>${item.name}</span><b>${item.price} ₽</b></div>`;
            }).join('');
            document.getElementById('total-price').innerText = total + ' ₽';
            footer.style.display = 'block';
        }
    }
</script>
</body>
</html>
