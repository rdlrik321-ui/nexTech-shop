<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0d0d0f; 
            --card: rgba(255, 255, 255, 0.04); 
            --brd: rgba(255, 255, 255, 0.1); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 380px; padding: 20px; }

        /* ЭКРАНЫ */
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* ЛОГО И ГЛАВНАЯ */
        .header { margin: 50px 0 30px 0; text-align: center; }
        .logo-box { background: #fff; border-radius: 22px; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .logo-box img { width: 60%; }
        h1 { font-size: 11px; letter-spacing: 4px; opacity: 0.3; text-transform: uppercase; }

        /* КНОПКИ МЕНЮ */
        .menu { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .btn-main { 
            background: var(--card); border: 1px solid var(--brd); border-radius: 20px; 
            padding: 24px; color: #fff; font-size: 16px; font-weight: 500; 
            letter-spacing: 1px; cursor: pointer; text-align: center; transition: 0.2s;
        }
        .btn-main:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.97); }

        /* КАРТОЧКИ ТОВАРА */
        .card { background: var(--card); border: 1px solid var(--brd); border-radius: 28px; padding: 20px; width: 100%; text-align: center; }
        .card img { width: 100%; border-radius: 18px; margin-bottom: 15px; }
        
        .btn-back { align-self: flex-start; background: none; border: none; color: #fff; opacity: 0.5; padding: 10px 0; margin-bottom: 10px; font-size: 15px; cursor: pointer; }
        .price { font-size: 26px; font-weight: 700; margin: 10px 0; }
        .buy-btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 15px; }

        #cart-panel { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 18px; border-radius: 35px; font-weight: 700; display: none; width: 85%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>
        <div class="menu">
            <div class="btn-main" onclick="showPage('gpu')">ВИДЕОКАРТЫ</div>
            <div class="btn-main" onclick="showPage('cpu')">ПРОЦЕССОРЫ</div>
        </div>
    </div>

    <div id="gpu" class="screen">
        <button class="btn-back" onclick="showPage('home')">← НАЗАД</button>
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg">
            <h2 style="font-weight: 500;">Sapphire RX 580</h2>
            <div class="price">5,800 ₽</div>
            <button class="buy-btn" onclick="add('RX 580', 5800)">В КОРЗИНУ</button>
        </div>
    </div>

    <div id="cpu" class="screen">
