<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --accent: #0088cc; /* Цвет Telegram Blue */
            --grid-color: rgba(0, 255, 255, 0.05);
            --tab-bg: rgba(22, 22, 22, 0.75);
            --brd: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; 
            overflow: hidden;
            height: 100vh;
            /* Сетка на фоне как в старой версии */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* КОНТЕЙНЕР ДЛЯ ЭКРАНОВ */
        .app-content {
            position: absolute;
            top: 0; left: 0; right: 0;
            bottom: 84px; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
        }

        .screen { 
            display: none; 
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active { display: block; }

        /* ЛОГОТИП (Верхняя часть) */
        .header-logo {
            text-align: center;
            padding: 40px 0 20px;
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 136, 204, 0.8);
        }

        /* КАРТОЧКИ ТОВАРОВ */
        .card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--brd);
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 16px; 
            backdrop-filter: blur(10px);
        }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 12px; }
        .card h3 { font-size: 18px; margin-bottom: 6px; }
        .price { font-size: 16px; color: var(--accent); font-weight: bold; margin-bottom: 12px; }
        
        .buy-btn { 
            background: var(--accent); color: #fff; border: none; 
            padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; 
            transition: transform 0.1s;
        }
        .buy-btn:active { transform: scale(0.97); }

        /* TAB BAR (iOS Telegram Style) */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 84px;
            background: var(--tab-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-top: 0.3px solid var(--brd);
            display: flex;
            justify-content: space-around;
            padding-top: 6px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93; /* Цвет неактивных иконок iOS */
            flex: 1;
            transition: color 0.2s;
        }

        .tab-item.active-tab {
            color: var(--accent);
        }

        .tab-icon {
            width: 26px; height: 26px;
            margin-bottom: 3px;
            background: currentColor;
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            mask-position: center;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 500;
        }

        /* Стили для пустых разделов */
        .placeholder {
            text-align: center;
            color: #8e8e93;
            margin-top: 50px;
        }

    </style>
</head>
<body>

<div class="app-content">
    <div id="shop" class="screen active">
        <div class="header-logo">
            <div class="logo-text">NEXTECH</div>
        </div>
        
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg" alt="GPU">
            <h3>Sapphire RX 580</h3>
            <div class="price">5,800 ₽</div>
            <button class="buy-btn" onclick="addToCart('RX 580', 5800)">В корзину</button>
        </div>
    </div>

    <div id="search" class="screen">
        <div class="header-logo"><div class="logo-text">ПОИСК</div></div>
        <div class="placeholder">Начните вводить название...</div>
    </div>

    <div id="cart" class="screen">
        <div class="header-logo"><div class="logo-text">КОРЗИНА</div></div>
        <div id="cart-items"></div>
        <div id="total-price" style="margin-top: 20px; font-weight: 700; font-size: 20px; text-align: center; color: var(--accent);"></div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-item active-tab" onclick="switchTab(this, 'shop')">
        <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
        <span class="tab-label">Магазин</span>
    </div>
