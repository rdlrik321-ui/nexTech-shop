<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root { 
    --bg: #0d0d0f; 
    --card: rgba(255,255,255,0.03); 
    --brd: rgba(255,255,255,0.08); 
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, sans-serif;
}

/* КОНТЕЙНЕР */
.container {
    max-width: 360px;
    margin: 0 auto;
    padding: 20px;
}

/* СТРАНИЦЫ */
.page {
    display: none;
    flex-direction: column;
    align-items: center;
}

.page.active {
    display: flex;
}

/* ЛОГО */
.logo-box {
    background: #fff;
    border-radius: 20px;
    width: 75px;
    height: 75px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 40px 0 15px;
}

h1 {
    font-size: 10px;
    letter-spacing: 4px;
    opacity: 0.4;
    margin-bottom: 30px;
}

/* КНОПКИ */
.menu-btn {
    background: var(--card);
    border: 1px solid var(--brd);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 12px;
    width: 100%;
    text-align: center;
    cursor: pointer;
}

.menu-btn:active {
    transform: scale(0.96);
}

.menu-btn b {
    font-size: 15px;
}

/* КАРТОЧКИ */
.card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--brd);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
}

/* КНОПКА НАЗАД */
.btn-back {
    align-self: flex-start;
    margin-bottom: 10px;
    background: none;
    border: none;
    color: #fff;
    opacity: 0.6;
    cursor: pointer;
}

/* ЦЕНА */
.price {
    font-size: 22px;
    font-weight: bold;
}

/* КНОПКА КУПИТЬ */
.buy-btn {
    margin-top: 15px;
    padding: 15px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #fff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

/* КОРЗИНА */
.cart-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    color: #000;
    padding: 15px;
    border-radius: 30px;
    display: none;
}
</style>
</head>

<body>

<div class="container">

<!-- ГЛАВНАЯ -->
<div id="home-screen" class="page active">
    <div class="logo-box">
        <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/logo.png" width="40">
    </div>

    <h1>NEXTECH // TERMINAL</h1>

    <div class="menu-btn" onclick="nav('gpu')"><b>ВИДЕОКАРТЫ</b></div>
    <div class="menu-btn" onclick="nav('cpu')"><b>ПРОЦЕССОРЫ</b></div>
</div>

<!-- GPU -->
<div id="pg-gpu" class="page">
    <button class="btn-back" onclick="nav('home')">← Назад</button>

    <div class="card">
        <img src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/gpu_photo.jpg">
        <div><b>RX 580</b></div>
        <div class="price">5800 ₽</div>
        <button class="buy-btn" onclick="add('RX 580',5800)">Купить</button>
    </div>
</div>

<!-- CPU -->
<div id="pg-cpu" class="page">
    <button class="btn-back" onclick="nav('home')">← Назад</button>

    <div class="card">
        <div><b>Ryzen 5 5600X</b></div>
        <div class="price">12500 ₽</div>
        <button class="buy-btn" onclick="add('5600X',12500)">Купить</button>
    </div>
</div>

</div>

<div class="cart-bar" id="cart-ui" onclick="checkout()">
Оформить (<span id="count">0</span>)
</div>

<script>
let tg = window.Telegram?.WebApp;
if (tg) tg.expand();

let cart = [];
let current = 'home-screen';

function nav(id) {
    let next = (id === 'home') ? 'home-screen' : 'pg-' + id;

    let currentEl = document.getElementById(current);
    let nextEl = document.getElementById(next);

    if (!nextEl) {
        console.error("НЕ НАЙДЕН:", next);
        return;
    }

    currentEl.classList.remove('active');
    nextEl.classList.add('active');

    current = next;
}

function add(name, price) {
    cart.push({name, price});
    document.getElementById('count').innerText = cart.length;
    document.getElementById('cart-ui').style.display = 'block';
}

function checkout() {
    let total = cart.reduce((s, i) => s + i.
