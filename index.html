<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* ПРЕМИАЛЬНЫЙ ТЕМНО-СЕРЫЙ ФОН */
            --bg-color: #121212; 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --blur-val: blur(20px);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; }

        /* СКРУГЛЕННЫЙ БЛОК ЛОГОТИПА */
        .logo-block {
            background: #fff;
            border-radius: 25px; /* Мягкие углы */
            padding: 15px;
            width: 150px; height: 150px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .logo-block img { width: 100%; height: auto; object-fit: contain; }

        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; font-size: 14px; opacity: 0.5; margin-bottom: 30px; }

        /* СТИЛЬ ВКЛАДОК КАТАЛОГА */
        .catalog-starter {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .category-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-val);
            -webkit-backdrop-filter: var(--blur-val);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            position: relative; overflow: hidden;
        }

        .category-card:active { transform: scale(0.97); background: rgba(255,255,255,0.05); }

        .category-card h2 { font-size: 18px; font-weight: 600; margin: 0; letter-spacing: 1px; }
        .category-card p { font-size: 12px; opacity: 0.5; margin: 5px 0 0 0; text-transform: uppercase; letter-spacing: 1px;}

        /* СЕКЦИИ ТОВАРОВ (СКРЫТЫ ПО УМОЛЧАНИЮ) */
        .product-section { display: none; width: 100%; flex-direction: column; gap: 20px; }

        .card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-val);
            -webkit-backdrop-filter: var(--blur-val);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card img { 
            width: 80%; max-height: 120px; object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            margin-bottom: 15px;
        }

        .title { font-size: 15px; font-weight: 300; opacity: 0.9; margin-bottom: 8px; }
        .price { font-size: 20px; font-weight: 700; margin-bottom: 18px; letter-spacing: 1px; }

        .btn {
            background: #fff;
            border: none;
            color: #000;
            padding: 12px 35px;
            border-radius: 15px;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:active { transform: scale(0.95); opacity: 0.9; }

        /* КНОПКА "НАЗАД" */
        .back-btn {
            align-self: flex-start;
            background: none; border: none; color: #fff;
