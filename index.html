<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            background-color: #0d0d0f; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px 0 40px 0;
        }

        .logo-box { 
            background: #fff;
            border-radius: 25px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 12px;
            letter-spacing: 5px;
            opacity: 0.4;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 22px;
            padding: 25px;
            font-weight: 800;
            font-size: 17px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }

        .btn:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.96);
        }

        .page {
            display: none;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .back {
            color: rgba(255,255,255,0.5);
            padding: 15px 0;
            display: inline-block;
            cursor: pointer;
        }

        .price {
            font-size: 28px;
            font-weight: 900;
            margin: 15px 0;
        }

        .buy {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
        }

        #cart-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 40px;
            font-weight: 900;
            display: none;
            width: 80%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ГЛАВНАЯ -->
    <div id="home">
        <div class="header">
            <div class="logo-box">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="60">
            </div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>

        <div class="menu">
            <div class="btn" id="btn-gpu">ВИДЕОКАРТЫ</div>
            <div class="btn" id="btn-cpu">ПРОЦЕССОРЫ</div>
        </div>
