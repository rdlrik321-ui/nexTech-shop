<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* БАЗОВЫЙ СТИЛЬ ТЕРМИНАЛА */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            background-color: #0d0d0f; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            overflow: hidden; /* Чтобы не дергалось при анимации */
        }

        .container { width: 100%; max-width: 380px; margin: 0 auto; height: 100vh; position: relative; }

        /* ПЛАВНЫЕ АНИМАЦИИ iOS */
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; padding-bottom: 110px;
            opacity: 0;
            transform: translateY(15px) scale(0.98);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .page.active { 
            opacity: 1; 
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* ХЕДЕР */
        .header { display: flex; flex-direction: column; align-items: center; margin: 50px 0 40px 0; }
        .logo-box { 
            background: #fff; border-radius: 25px; width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 15px;
        }
        h1 { font-size: 11px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

        /* КАРТОЧКИ И КНОПКИ */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px; padding: 20px;
            text-align: center; margin-bottom: 20px;
        }
        .btn-menu { padding: 25px; font-weight: 800; cursor: pointer; }
        .swiper { width: 100%; height: 200px; border-radius: 15px; margin-bottom: 15px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .price { font-size: 28px; font-weight: 900; margin: 15px 0; }
        .buy { background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; width: 100%; cursor: pointer; }

        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 15px; width: 100%; color: #fff; margin-bottom: 25px; outline: none; }
        .back { color: rgba(255,255,255,0.5); padding: 15px 0; display: block; text-align: center; cursor: pointer; font-weight: 800; font-size: 13px; }

        /* ПРОФИЛЬ */
        .profile-section { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 22px; padding: 20px; margin-bottom: 15px; text-align: left; }
        .section-label { font-weight: 900; font-size: 12px; opacity: 0.4; text-transform: uppercase; margin-bottom: 8px; display: block; }

        /* ХОТБАР */
        .hotbar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(15, 15, 17, 0.95); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 35px;
            display: flex; justify-content: space-around; padding: 12px; z-index: 2000;
        }
        .nav-item { color: rgba(255,255,255,0.2); font-size: 22px; transition: 0.3s; }
        .nav-item.active { color: #fff; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="home" class="page active">
        <div class="header">
            <div class="logo-box">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="60">
            </div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>
        <div class="card btn-menu" onclick="openPage('gpu-list')">ВИДЕОКАРТЫ</div>
        <div class="card btn-menu" onclick="openPage('cpu-list')">ПРОЦЕССОРЫ</div>
    </div>

    <div id="gpu-list" class="page">
        <div class="back" onclick="openPage('home')">← ТЕРМИНАЛ</div>
        <input type="text" class="search-box" placeholder="ПОИСК...">
        <div class="card">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="gpu1.jpg"></div>
                </div>
            </div>
            <h2 style="font-weight: 800;">Sapphire Nitro+ RX 580</h2>
            <div class="price">5 800 ₽</div>
            <button class="buy" onclick="add('RX 580')">В КОРЗИНУ</button>
        </div>
    </div>

    <div id="cpu-list" class="page">
        <div class="back" onclick="openPage('home')">← ТЕРМИНАЛ</div>
        <div class="card">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="cpu1.jpg"></div>
                </div>
            </div>
            <h2 style="font-weight: 800;">Ryzen 5 5600X</h2>
            <div class="price">12 500 ₽</div>
            <button class="buy" onclick="add('R5 5600X')">В КОРЗИНУ</button>
        </div>
    </div>

    <div id="cart" class="page">
        <h2 style="margin-bottom: 20px; font-weight: 800;">КОРЗИНА</h2>
        <div class="profile-section" id="cart-items">
            <p style="opacity: 0.4;">Пусто...</p>
        </div>
    </div>

    <div id="profile" class="page">
        <h2 style="margin-bottom: 20px; font-weight: 800;">ПРОФИЛЬ</h2>
        <div class="profile-section">
            <span class="section-label">О нас</span>
            <p style="font-size: 14px;">Тестим в OCCT/FurMark. Гарантия — 3 дня.</p>
        </div>
        <div class="profile-section">
            <span class="section-label">Заказы</span>
            <p style="font-size: 14px; opacity: 0.4;">Нет активных заказов.</p>
        </div>
        <div class="profile-section">
            <span class="section-label">Поддержка</span>
            <button class="buy" style="margin-top: 10px; padding: 15px;" onclick="tg.openTelegramLink('https://t.me/support')">Написать</button>
        </div>
    </div>

</div>

<div class="hotbar">
    <div class="nav-item active" id="nav-home" onclick="openPage('home')"><i class="fa-solid fa-terminal"></i></div>
    <div class="nav-item" id="nav-cart" onclick="openPage('cart')"><i class="fa-solid fa-cart-shopping"></i></div>
    <div class="nav-item" id="nav-profile" onclick="openPage('profile')"><i class="fa-solid fa-user"></i></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    new Swiper(".mySwiper", { pagination: { el: ".swiper-pagination", dynamicBullets: true } });

    function openPage(id) {
        // Убираем активный класс со всех страниц
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // Включаем новую страницу (сработает CSS transition)
        document.getElementById(id).classList.add('active');
        
        // Хотбар
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if (['home', 'gpu-list', 'cpu-list'].includes(id)) document.getElementById('nav-home').classList.add('active');
        else if (id === 'cart') document.getElementById('nav-cart').classList.add('active');
        else if (id === 'profile') document.getElementById('nav-profile').classList.add('active');

        tg.HapticFeedback.selectionChanged();
    }

    function add(name) {
        tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert(name + ' добавлен!');
        document.getElementById('cart-items').innerHTML = '<p>Товар: ' + name + '</p>';
    }
</script>
</body>
</html>
