<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #0d0d0f; color: #fff; font-family: sans-serif; 
            margin: 0; padding: 20px; text-align: center;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .logo { background: #fff; border-radius: 15px; width: 60px; height: 60px; margin: 30px auto 10px; display: flex; align-items: center; justify-content: center; }
        h1 { font-size: 10px; letter-spacing: 3px; opacity: 0.4; margin-bottom: 30px; }
        
        .btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; padding: 20px; margin-bottom: 10px; width: 100%;
            cursor: pointer; color: #fff; font-weight: bold; font-size: 16px;
        }
        .btn:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }

        .page { display: none; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
        .back { background: none; border: none; color: #fff; opacity: 0.5; float: left; padding: 10px 0; cursor: pointer; }
        .buy { background: #fff; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="m">
        <div class="logo"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="40"></div>
        <h1>NEXTECH // TERMINAL</h1>
        <button class="btn" onclick="sh('g')">ВИДЕОКАРТЫ</button>
        <button class="btn" onclick="sh('c')">ПРОЦЕССОРЫ</button>
    </div>

    <div id="g" class="page">
        <button class="back" onclick="sh('m')">← НАЗАД</button>
        <div style="clear:both"></div>
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg" width="100%" style="border-radius:10px">
            <h2>Sapphire RX 580</h2>
            <p>5,800 ₽</p>
            <button class="buy" onclick="at('RX 580', 5800)">В КОРЗИНУ</button>
        </div>
    </div>

    <div id="c" class="page">
        <button class="back" onclick="sh('m')">← НАЗАД</button>
        <div style="clear:both"></div>
        <div class="card">
            <h2>Ryzen 5 5600X</h2>
            <p>12,500 ₽</p>
            <button class="buy" onclick="at('5600X', 12500)">В КОРЗИНУ</button>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function sh(id) {
        document.getElementById('m').style.display = 'none';
        document.getElementById('g').style.display = 'none';
        document.getElementById('c').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function at(n, p) {
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        tg.sendData(JSON.stringify({item: n, price: p}));
    }
</script>

</body>
</html>
