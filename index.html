<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* ТВОЙ ОРИГИНАЛЬНЫЙ ДИЗАЙН */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            background-color: #0d0d0f; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 120px; /* Чтобы меню не закрывало кнопки */
        }

        /* ТВОЙ ХЕДЕР */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px 0 40px 0;
        }

        .logo-box { 
            background: #fff;
            border-radius: 25px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 12px;
            letter-spacing: 5px;
            opacity: 0.4;
            text-align: center;
        }

        /* КАТАЛОГ (ТВОИ КНОПКИ) */
        .page { display: none; }
        .page.active { display: block; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* КАРТОЧКА ТОВАРА В ТВОЕМ СТИЛЕ */
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 22px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ИНТЕГРИРОВАННАЯ ЛИСТАЛКА */
        .swiper { width: 100%; height: 140px; background: #000; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 12px; flex-grow: 1; }
        .card-info h3 { font-size: 14px; margin-bottom: 5px; }
        .price { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 8px; }
        
        /* ИНФО ДЛЯ ПОКУПАТЕЛЯ (ТЕСТЫ И Т.Д.) */
        .item-spec { font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.3; margin-bottom: 10px; }

        .buy-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 12px;
            width: 100%;
        }

        /* ТВОЕ НИЖНЕЕ МЕНЮ С БОЛЬШИМИ ИКОНКАМИ */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            padding: 10px;
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
        }
        .nav-item i { font-size: 26px; } /* КРУПНЫЕ ИКОНКИ */
        .nav-item.active { color: #fff; }

        /* ПРОФИЛЬ И ОТМЕНА ЗАКАЗА */
        .order-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
            margin-top: 10px;
        }
        .cancel-btn {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header">
        <div class="logo-box">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" width="60">
        </div>
        <h1>NEXTECH // TERMINAL</h1>
    </div>

    <div id="shop" class="page active">
        <div class="menu-grid">
            
            <div class="card">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide"><img src="gpu1.jpg"></div>
                        <div class="swiper-slide"><img src="gpu2.jpg"></div>
                    </div>
                    <div class="swiper-pagination"></div>
                </div>
                <div class="card-info">
                    <h3>RX 580 8GB</h3>
                    <div class="price">5.800₽</div>
                    <div class="item-spec">
                        Samsung / 67°C / MX-4<br>
                        Гарантия 3 дня
                    </div>
                    <button class="buy-btn" onclick="add()">КУПИТЬ</button>
                </div>
            </div>

            <div class="card">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide"><img src="cpu1.jpg"></div>
                    </div>
                </div>
                <div class="card-info">
                    <h3>RYZEN 5 3600</h3>
                    <div class="price">7.200₽</div>
                    <div class="item-spec">
                        BOX / Ножки идеал<br>
                        Любые тесты
                    </div>
                    <button class="buy-btn" onclick="add()">КУПИТЬ</button>
                </div>
            </div>

        </div>
    </div>

    <div id="profile" class="page">
        <h1>АКТИВНЫЕ ЗАКАЗЫ</h1>
        <div class="order-card" id="order-1">
            <p>ЗАКАЗ #101 — RX 580</p>
            <button class="cancel-btn" onclick="cancelOrder(1)">ОТМЕНИТЬ</button>
        </div>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="nav('shop', this)">
        <i class="fa-solid fa-terminal"></i>
    </div>
    <div class="nav-item" onclick="nav('profile', this)">
        <i class="fa-solid fa-circle-user"></i>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Листалка
    new Swiper(".mySwiper", {
        pagination: { el: ".swiper-pagination", dynamicBullets: true },
    });

    // Навигация
    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    // Отмена заказа
    function cancelOrder(id) {
        tg.showConfirm("ОТМЕНИТЬ ЗАКАЗ?", (confirm) => {
            if(confirm) {
                const card = document.getElementById(`order-${id}`);
                card.style.opacity = "0.2";
                card.innerHTML = "ОТМЕНЕНО";
                tg.HapticFeedback.notificationOccurred('success');
            }
        });
    }

    function add() {
        tg.HapticFeedback.impactOccurred('medium');
        alert("ДОБАВЛЕНО В КОРЗИНУ");
    }
</script>

</body>
</html>
