<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --grid-color: rgba(255, 255, 255, 0.05);
            /* Новые стили для кнопок: тонированные и прозрачные */
            --card-bg: rgba(255, 255, 255, 0.04); 
            --card-border: rgba(255, 255, 255, 0.1);
            /* Стили для хот-бара в стиле фото */
            --hotbar-bg: rgba(0, 0, 0, 0.95);
            --hotbar-blur: blur(25px);
            --hotbar-pill-bg: rgba(255, 255, 255, 0.08); /* Овальная подложка */
            --text-active: #ffffff;
            --text-inactive: rgba(255, 255, 255, 0.6);
            --text-label: rgba(255, 255, 255, 0.4);
            --font-main: 'Roboto Mono', monospace;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 35px 35px;
            color: #fff;
            /* Применение нового шрифта */
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Контентная область с плавными переходами */
        .app-container {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding-bottom: 120px; /* Отступ под новый массивный хот-бар */
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.98);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* ЛОГОТИП ИЗ СКРИНШОТА */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            background: #fff;
            width: 100px;
            height: 100px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255,255,255,0.08);
        }

        .logo-wrapper img {
            width: 65px;
            height: auto;
        }

        .terminal-text {
            font-size: 11px;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* КНОПКИ-ПЛИТКИ ИЗ СКРИНШОТА С УЛУЧШЕННЫМ ФОНОМ */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        .menu-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 35px 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px); /* Легкий блюр фона кнопки */
        }

        .menu-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.97);
            border-color: rgba(255,255,255,0.2);
        }

        /* ХОТ-БАР В СТИЛЕ ПРИЛОЖЕННОГО ФОТО */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 95px; /* Немного выше для массивности */
            background: var(--hotbar-bg);
            backdrop-filter: blur(30px) saturate(160%); /* Сильный блюр и сатурация */
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border-top: 0.5px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: center; /* Центрирование */
            padding-top: 10px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .tab-items-wrapper {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            padding: 5px 0;
            cursor: pointer;
            transition: color 0.3s;
        }

        /* Цвета текста и иконок */
        .tab-item { color: var(--text-inactive); }
        .tab-item.active { color: var(--text-active); }
        .tab-item.active .tab-label { color: var(--text-label); } /* Лейбл тусклый даже у активного */

        /* Эффект овальной подложки (Pill effect) */
        .tab-item .tab-pill {
            position: absolute;
            top: -2px; left: -10px; right: -10px; bottom: -2px; /* Чуть шире */
            background: var(--hotbar-pill-bg);
            border-radius: 40px; /* Сильное скругление */
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .tab-item.active .tab-pill {
            opacity: 1;
            transform: scale(1);
        }

        .tab-icon {
            width: 28px; /* Чуть крупнее */
            height: 28px;
            margin-bottom: 5px;
            background: currentColor;
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }

        .tab-label {
            font-size: 9px; /* Чуть меньше */
            font-weight: 500;
            color: rgba(255,255,255,0.3); /* Тусклый лейбл */
            transition: color 0.3s;
        }

    </style>
</head>
<body>

<div class="app-container">
    <div id="catalog" class="screen active">
        <div class="header">
            <div class="logo-wrapper">
                <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png" alt="nexTech">
            </div>
            <div class="terminal-text">NEXTECH // TERMINAL</div>
        </div>

        <div class="main-menu">
            <div class="menu-btn">ВИДЕОКАРТЫ</div>
            <div class="menu-btn">ПРОЦЕССОРЫ</div>
        </div>
    </div>

    <div id="cart" class="screen">
        <div class="header">
            <div class="terminal-text">STORAGE // CART</div>
        </div>
        <p style="text-align: center; opacity: 0.5; margin-top: 50px; font-size: 14px;">[ В разработке... ]</p>
    </div>

    <div id="profile" class="screen">
        <div class="header">
            <div class="terminal-text">ACCESS // PROFILE</div>
        </div>
        <div class="main-menu">
            <div class="menu-btn" style="padding: 20px;">ЗАКАЗЫ</div>
            <div class="menu-btn" style="padding: 20px;">ВЫХОД</div>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-items-wrapper">
        <div class="tab-item active" onclick="nav('catalog', this)">
            <div class="tab-pill"></div> <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')"></div>
            <span class="tab-label">Шоп</span>
        </div>
        <div class="tab-item" onclick="nav('cart', this)">
            <div class="tab-pill"></div>
            <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/263/263142.png')"></div>
            <span class="tab-label">Корзина</span>
        </div>
        <div class="tab-item" onclick="nav('profile', this)">
            <div class="tab-pill"></div>
            <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/1077/1077063.png')"></div>
            <span class="tab-label">Профиль</span>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = '#000000';
    tg.headerColor = '#000000';

    function nav(screenId, el) {
        // Убираем активный класс у кнопок (подложки исчез
