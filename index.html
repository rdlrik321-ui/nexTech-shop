<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0d0d0f; 
            --card: rgba(255, 255, 255, 0.06); 
            --brd: rgba(255, 255, 255, 0.1); 
            --ios-blue: #007aff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #1a1a1f 0%, #0d0d0f 100%);
            color: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            overflow: hidden; height: 100vh;
        }

        .container { width: 100%; height: 100vh; position: relative; }

        /* iOS ANIMATION ENGINE */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; display: none; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            background: var(--bg);
        }

        .active { display: flex; z-index: 10; animation: iosSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes iosSlideIn {
            from { transform: translateX(100%); opacity: 0.8; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* HEADER */
        .header { margin: 40px 0 20px; text-align: center; }
        .logo-box { background: #fff; border-radius: 20px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .logo-box img { width: 60%; }
        h1 { font-size: 10px; letter-spacing: 3px; opacity: 0.4; text-transform: uppercase; }

        /* MENU & BUTTONS */
        .menu { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-main { 
            background: var(--card); border: 1px solid var(--brd); border-radius: 16px; 
            padding: 20px; color: #fff; font-size: 17px; font-weight: 500; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-main::after { content: '›'; opacity: 0.3; font-size: 24px; }
        .btn-main:active { background: rgba(255, 255, 255, 0.12); transform: scale(0.98); }

        /* CARDS */
        .card { background: var(--card); border: 1px solid var(--brd); border-radius: 24px; padding: 15px; margin-top: 10px; }
        .card img { width: 100%; border-radius: 16px; margin-bottom: 15px; }
        .price { font-size: 24px; font-weight: 700; margin: 8px 0; color: var(--ios-blue); }

        .btn-back { background: none; border: none; color: var(--ios-blue); font-size: 17px; padding: 10px 0; cursor: pointer; align-self: flex-start; }
        
        .buy-btn { background: #fff; color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; margin-top: 10px; }

        /* FLOATING CART PANEL */
        #cart-panel { 
            position: fixed; bottom: 30px; left: 5%; width: 90%; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            color: #000; padding: 18px; border-radius: 20px; font-weight: 600; 
            display: none; justify-content: center; align-items: center;
            z-index: 100; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            animation: panelPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes panelPop { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* CART CONTENT */
        .cart-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--brd); }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="screen active">
        <div class="header">
            <div class="logo-box"><img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/logo.png"></div>
            <h1>NEXTECH // TERMINAL</h1>
        </div>
        <div class="menu">
            <div class="btn-main" onclick="nav('gpu')">Видеокарты</div>
            <div class="btn-main" onclick="nav('cpu')">Процессоры</div>
        </div>
    </div>

    <div id="gpu" class="screen">
        <button class="btn-back" onclick="nav('home')">‹ Назад</button>
        <h2 style="margin-bottom: 15px;">Видеокарты</h2>
        <div class="card">
            <img src="https://raw.githubusercontent.com/rdlrik321-ui/nexTech-shop/main/gpu_photo.jpg">
            <h3>Sapphire RX 580</h3>
            <div class="price">5,800 ₽</div>
            <button class="buy-btn" onclick="addToCart('RX 580', 5800)">Добавить</button>
        </div>
    </div>

    <div id="cart-screen" class="screen">
        <button class="btn-back" onclick="nav('home')">‹ Закрыть</button>
        <h2 style="margin-bottom: 20px;">Ваш заказ</h2>
        <div id="cart-list" style="flex-grow: 1;"></div>
        <div id="cart-total" style="font-size: 22px; font-weight: 700; padding: 20px 0; text-align: right;"></div>
    </div>

    <div id="cart-panel" onclick="nav('cart-screen')">
        ПОСМОТРЕТЬ КОРЗИНУ (<span id="cart-count">0</span>)
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let cart = [];

    function nav(pageId) {
        // Убираем актив со всех
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        // Включаем нужный
        document.getElementById(pageId).classList.add('active');
        
        tg.HapticFeedback.impactOccurred('light');

        if(pageId === 'cart-screen') renderCart();
    }

    function addToCart(name, price) {
        cart.push({name, price});
        updatePanel();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function updatePanel() {
        const panel = document.getElementById('cart-panel');
        const count = document.getElementById('cart-count');
        if(cart.length > 0) {
            panel.style.display = 'flex';
            count.innerText = cart.length;
        }
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const totalDiv = document.getElementById('cart-total');
        list.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            list.innerHTML += `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price} ₽</span>
                </div>
            `;
        });

        totalDiv.innerText = `Итого: ${total} ₽`;
        
        // Показываем главную кнопку TG для оплаты
        tg.MainButton.text = "ОПЛАТИТЬ ЧЕРЕЗ BOT";
        tg.MainButton.show();
    }

    tg.onEvent('mainButtonClicked', () => {
        tg.showAlert("Заказ отправлен! Ожидайте подтверждения.");
    });
</script>

</body>
</html>
