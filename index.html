            <div class="desc-box">
                • Частота: 1411 МГц<br>• FurMark: 72°C (макс)<br>• Идеальна для CS2.
            </div>
            <video controls style="width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border);">
                <source src="https://raw.githubusercontent.com/rdlrik321-ui/NexTech-shop/main/gpu_test.mp4" type="video/mp4">
            </video>
            <div style="font-size: 24px; font-weight: 800; margin-bottom: 15px; color: #fff;">5,800 ₽</div>
            <button class="buy" onclick="addToCart('RX 580 Nitro+', 5800)">В КОРЗИНУ</button>
        </div>
    </div>

    <div class="page" id="page-cpu">
        <div class="card">
            <div style="font-weight: 700; font-size: 18px; color: #fff;">AMD Ryzen 5 5600X</div>
            <div class="desc-box">
                • 6 ядер / 12 потоков<br>• Частота до 4.6 ГГц<br>• Состояние: новый.
            </div>
            <div style="font-size: 24px; font-weight: 800; margin-bottom: 15px; color: #fff;">12,500 ₽</div>
            <button class="buy" onclick="addToCart('Ryzen 5 5600X', 12500)">В КОРЗИНУ</button>
        </div>
    </div>
</div>

<div class="cart-btn" id="cart-float" onclick="checkout()">ОФОРМИТЬ ЗАКАЗ (<span id="cart-count">0</span>)</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    let cart = [];

    function openCat(type) {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('main-logo').style.display = 'none';
        document.getElementById('page-gpu').style.display = 'none';
        document.getElementById('page-cpu').style.display = 'none';
        document.getElementById('page-' + type).style.display = 'flex';
        document.getElementById('back-link').style.display = 'block';
        document.getElementById('title-text').innerText = 'NEXTECH // ' + type.toUpperCase();
    }

    function goHome() {
        document.getElementById('page-gpu').style.display = 'none';
        document.getElementById('page-cpu').style.display = 'none';
        document.getElementById('back-link').style.display = 'none';
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('main-logo').style.display = 'flex';
        document.getElementById('title-text').innerText = 'NEXTECH // TERMINAL';
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-float').style.display = 'block';
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function checkout() {
        let total = cart.reduce((sum, item) => sum + item.price, 0);
        let itemsSummary = cart.map(i => i.name).join(', ');
        tg.sendData(JSON.stringify({action: 'order', items: itemsSummary, total: total}));
    }
</script>
</body>
</html>
